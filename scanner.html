<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <title>方舟植物展覽｜QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-dark: #2c4c3b; --primary-light: #729075; }
    /* ★ 加入 text-size-adjust 防 Chrome 字體暴走 */
    html, body { margin: 0; padding: 0; font-family: "Noto Sans TC", sans-serif; color: var(--primary-dark); background-color:#111a13; touch-action: manipulation; -webkit-text-size-adjust: 100%; text-size-adjust: 100%;}
    
    /* ★ 絕對網址：發光蕨類 */
    .bg-fixed { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; background: url('https://i.imgur.com/8QoN3Wl.jpeg') center/cover no-repeat; z-index: -1; }

    .page { position: relative; min-height: 100vh; padding: 24px 16px 32px; box-sizing: border-box; }
    
    .hero { max-width: 400px; margin: 0 auto 24px auto; padding: 30px 25px; border-radius: 20px; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    .hero h1 { margin: 0 0 10px; font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    .hero p { margin: 0; line-height: 1.6; color: rgba(255,255,255,.9); font-size: 15px;}

    .solid-card { width: 100%; box-sizing: border-box; max-width: 400px; margin: 0 auto 20px auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0, 0.6); border: 1px solid #e0e0e0; transform: translateZ(0); will-change: transform; }
    .section-title { font-size: 14px; letter-spacing: 2px; color: var(--primary); margin-bottom: 10px; font-weight: 700; }
    h2 { margin: 0 0 15px; font-size: 24px; font-weight: 700; color: var(--primary-dark); }
    
    #reader { width: 100%; min-height: 280px; border-radius: 16px; overflow: hidden; border: 2px dashed #ccc; transition: 0.3s; display: none; background:#000;}
    .status { margin-top: 20px; padding: 16px; border-radius: 14px; background: #e8f0e8; color: var(--primary-dark); font-weight: 700; line-height: 1.6; text-align: center; }
    
    input { width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px; border: 2px solid #ddd; background: #fff; margin-top: 10px; color: var(--primary-dark); letter-spacing: 1px; text-align:center;}
    input:focus { border-color: var(--primary); outline: none; }
    
    .actions { display: grid; gap: 12px; margin-top: 20px; }
    button.btn, a.btn { width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px; font-weight: 700; text-decoration: none; border: 0; text-align: center; display: block; cursor: pointer; transition: all 0.3s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    .btn.primary { background: var(--primary); color: #fff !important; box-shadow: 0 4px 15px rgba(74, 124, 89, 0.3); }
    .btn.primary:active { transform: scale(0.96); }
    .btn.secondary { background: #fff; color: var(--primary-dark) !important; border: 2px solid #ddd; }
    
    #ar-container { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    #ar-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    #ar-overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
    
    .ar-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 10; }
    .btn-capture { background: #d4a373; color: white; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.5); touch-action: manipulation; }
    .btn-capture:active { transform: scale(0.9); }
    
    .btn-close-ar { position: absolute; top: 30px; left: 20px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; z-index: 15; font-weight: bold; cursor: pointer;}
    .btn-switch-cam { position: absolute; top: 30px; right: 20px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; z-index: 15; font-weight: bold; cursor: pointer;}
    
    #ar-result-screen { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; padding:20px; text-align:center;}
    #result-image { width: 100%; max-width: 400px; max-height: 60vh; object-fit: contain; border-radius: 10px; margin-bottom: 20px; }

    #global-loader { display: none; position: fixed; inset: 0; background: rgba(17, 26, 19, 1); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4a7c59; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>
  <div class="page">

      <div class="hero">
        <h1>🔍 展區掃描站</h1>
        <p>請掃描展區內的植物與 AR 專屬 QR Code<br>系統將自動為您處理動作。</p>
      </div>

      <div class="solid-card">
        <div class="section-title">SCANNER</div>
        <div id="manualBox" style="display:none; margin-bottom: 25px;">
          <input id="phoneInput" type="tel" placeholder="請先輸入手機號碼：09..." maxlength="10" autocomplete="off" name="phone-no-autofill">
          <button class="btn primary" id="savePhoneBtn" style="margin-top: 15px;">套用並就緒</button>
        </div>

        <div id="reader"></div>
        <div class="status" id="status">相機已待命，請點擊下方按鈕啟動。</div>

        <div class="actions" id="scanActions">
          <button class="btn primary" id="startBtn">📷 點擊允許啟動相機</button>
          <button class="btn secondary" id="stopBtn" style="display:none;">暫停掃描</button>
        </div>
      </div>

      <div class="solid-card" style="padding: 20px;">
        <div class="actions" style="margin-top: 0;">
          <button class="btn primary gas-link" id="queryBtn">🏆 查看我的進度</button>
          <button class="btn primary gas-link" id="rewardBtn">🎁 查看可兌換獎勵</button>
          <a class="btn secondary" id="homeBtn" href="index.html">🏠 回展場首頁</a>
        </div>
      </div>

  </div>

  <div id="global-loader"><div class="spinner"></div><h3 id="loader-text">載入中...</h3></div>

  <!-- AR 拍立得視窗 -->
  <div id="ar-container">
    <button class="btn-close-ar" onclick="closeAr()">✖ 關閉</button>
    <button class="btn-switch-cam" onclick="switchArCam()">🔄 翻轉</button>
    <video id="ar-video" autoplay playsinline></video>
    <img id="ar-overlay" src="" crossorigin="anonymous">
    
    <div id="ar-controls" class="ar-controls">
      <button class="btn-capture" onclick="takeArPhoto()">📸</button>
    </div>
    
    <div id="ar-result-screen">
      <div style="color:#fff; font-weight:bold; margin-bottom:15px; font-size:18px;">✨ 拍照成功！長按圖片即可儲存 ✨</div>
      <img id="result-image" src="">
      <div style="width:100%; max-width:300px; display:grid; gap:10px;">
        <button class="btn secondary" onclick="retakeAr()">🔄 重新拍攝</button>
        <button class="btn primary" onclick="closeAr()">✅ 完成並返回掃描</button>
      </div>
    </div>
    <canvas id="ar-canvas" style="display:none;"></canvas>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    function normalizePhone(phone) { return String(phone || "").replace(/\D/g, "").trim(); }
    function isValidMobile(phone) { return /^09\d{8}$/.test(String(phone || "").trim()); }
    function buildUrl(base, params) { const u = new URL(base); Object.keys(params).forEach(function(key) { if (params[key] !== undefined && params[key] !== null && params[key] !== "") { u.searchParams.set(key, params[key]); } }); return u.toString(); }
    function getParam(name) { const url = new URL(window.location.href); return url.searchParams.get(name) || ""; }

    function jsonpMarkPlant(plant, phone) {
      return new Promise((resolve, reject) => {
        const cbName = "__cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const url = new URL(APP_URL); 
        url.searchParams.set("mode", "plant_mark_jsonp"); 
        url.searchParams.set("plant", plant); 
        url.searchParams.set("phone", phone); 
        url.searchParams.set("callback", cbName);
        url.searchParams.set("t", Date.now()); 

        const script = document.createElement("script"); let done = false;
        function clean() { try{delete window[cbName];}catch(e){} if(script.parentNode) script.parentNode.removeChild(script); }
        const timer = setTimeout(() => { if(!done){ done=true; clean(); reject(new Error("Timeout")); } }, 15000);
        window[cbName] = (data) => { if(!done){ done=true; clearTimeout(timer); clean(); resolve(data); } };
        script.onerror = () => { if(!done){ done=true; clearTimeout(timer); clean(); reject(new Error("Error")); } };
        script.src = url.toString(); document.body.appendChild(script);
      });
    }

    const statusEl = document.getElementById("status");
    let html5QrCode = null; let currentPhone = "";
    let useFrontCam = false; let arStream = null;

    // ★ 關鍵：從植物頁上一頁回來時，強制重新載入，並觸發靜默重啟相機
    window.addEventListener("pageshow", function(e) {
      if (e.persisted || sessionStorage.getItem('justVisitedPlant') === 'true') {
        sessionStorage.removeItem('justVisitedPlant');
        window.location.reload(); 
      }
    });

    window.onload = () => {
      let savedPhone = getParam("phone") || sessionStorage.getItem("savedPhone");
      if(savedPhone && isValidMobile(savedPhone)) {
        currentPhone = savedPhone; sessionStorage.setItem("savedPhone", currentPhone);
        document.getElementById("manualBox").style.display = "none"; 
        refreshActionLinks(); 
        
        // ★ 自動啟動相機防護：只要你之前按過允許，進來這頁就自動開相機
        if (sessionStorage.getItem('camAllowed') === 'true') {
          startScanner();
        }
      } else {
        document.getElementById("manualBox").style.display = "block";
        statusEl.textContent = "請先輸入正確手機號碼。";
      }
    };

    function refreshActionLinks() {
      document.getElementById("queryBtn").dataset.href = buildUrl(APP_URL, { mode: "query", phone: currentPhone });
      document.getElementById("rewardBtn").dataset.href = buildUrl(APP_URL, { mode: "rewards", phone: currentPhone });
    }

    document.querySelectorAll('.gas-link').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loader-text').innerHTML = "正在前往系統...";
        document.getElementById('global-loader').style.display = 'flex';
        setTimeout(() => { window.location.href = btn.dataset.href; }, 50);
      });
    });

    async function stopScanner(silent) {
      if (html5QrCode) { try { await html5QrCode.stop(); await html5QrCode.clear(); } catch(e){} html5QrCode = null; }
      document.getElementById("reader").style.display = "none";
      document.getElementById("startBtn").style.display = "block"; document.getElementById("stopBtn").style.display = "none";
      if (!silent) { statusEl.innerHTML = "已暫停相機。<br>點擊上方按鈕可再次啟動。"; statusEl.style.background = "#e8f0e8"; }
    }

    async function handleScanResult(rawUrl) {
      if (!isValidMobile(currentPhone)) return;
      let urlObj, mode, plantId, spotId, picNum;
      try { 
        urlObj = new URL(rawUrl.trim()); 
        mode = urlObj.searchParams.get("mode"); 
        plantId = urlObj.searchParams.get("plant");
        spotId = urlObj.searchParams.get("spot");
        picNum = urlObj.searchParams.get("pic");
      } catch (err) { return; }

      // 掃到 AR 拍立得 
      if (mode === "ar" && picNum) {
        if (navigator.vibrate) navigator.vibrate(100);
        await stopScanner(true);
        openAr(picNum);
        return;
      }

      if (mode !== "plant_go" && mode !== "stamp") return;

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      
      document.getElementById("loader-text").innerHTML = "正在存入點數...<br><span style='font-size:14px;color:#aaa;'>(請稍候約 2 秒鐘)</span>";
      document.getElementById("global-loader").style.display = "flex";

      await stopScanner(true);
      document.getElementById("scanActions").style.display = "none"; 
      
      try {
        if (mode === "plant_go") {
          let resp; try { resp = await jsonpMarkPlant(plantId, currentPhone); } catch(e) { resp = await jsonpMarkPlant(plantId, currentPhone); }
          const target = resp.redirectUrl || COLLECTION_URL;
          
          if (navigator.vibrate) navigator.vibrate(200); 
          document.getElementById("global-loader").style.display = "none";
          statusEl.innerHTML = `🎉 <b>${resp.message || "已完成記點"}</b><br><br><span style='color:#729075; font-weight:bold;'>正在為您跳轉至植物介紹...</span>`;
          statusEl.style.background = "#d4edda";
          
          // ★ 標記準備跳轉，這樣從植物頁按上一頁回來時，程式就知道要重啟相機
          sessionStorage.setItem('justVisitedPlant', 'true');
          setTimeout(() => { window.location.href = target; }, 1500);

        } else if (mode === "stamp" && spotId) {
          if (navigator.vibrate) navigator.vibrate(200);
          document.getElementById("loader-text").innerHTML = "✅ 掃描展區成功！<br><span style='font-size:14px;color:#aaa;'>準備前往紀錄頁面...</span>";
          urlObj.searchParams.set("phone", currentPhone);
          setTimeout(() => { window.location.replace(urlObj.toString()); }, 500);
        }
      } catch (err) {
        document.getElementById("global-loader").style.display = "none";
        statusEl.innerHTML = "<b>系統連線失敗 💦</b><br>請點擊下方按鈕重新啟動相機。"; statusEl.style.background = "#f8d7da";
        document.getElementById("scanActions").style.display = "grid"; document.getElementById("startBtn").style.display = "block";
      }
    }

    async function startScanner() {
      if (!isValidMobile(currentPhone)) { statusEl.textContent = "請先輸入手機號碼喔！"; return; }
      try {
        statusEl.innerHTML = "正在啟動相機...<br><span style='font-size:12px;color:#888;'>(若跳出提示請點擊「允許」)</span>";
        statusEl.style.background = "#e8f0e8";
        document.getElementById("reader").style.display = "block"; 
        
        const cameras = await Html5Qrcode.getCameras();
        const rearCamera = cameras.find(c => /back|rear|environment|後/i.test(c.label || "")) || cameras[0];
        
        await stopScanner(true);
        document.getElementById("reader").style.display = "block";
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(rearCamera.id, { fps: 5, qrbox: { width: 250, height: 250 }, aspectRatio: 1.333 }, handleScanResult, () => {});
        
        sessionStorage.setItem('camAllowed', 'true'); // ★ 記住相機已允許
        document.getElementById("startBtn").style.display = "none"; document.getElementById("stopBtn").style.display = "block";
        statusEl.textContent = "✅ 相機已啟動，請掃描 QR Code。";
      } catch (err) {
        document.getElementById("reader").style.display = "none";
        statusEl.innerHTML = "<b>無法啟動相機 📷</b><br>請確認瀏覽器是否允許相機權限。";
        statusEl.style.background = "#f8d7da";
        document.getElementById("startBtn").style.display = "block";
      }
    }

    document.getElementById("savePhoneBtn").addEventListener("click", () => {
      const p = normalizePhone(document.getElementById("phoneInput").value);
      if (!isValidMobile(p)) { statusEl.textContent = "請輸入正確的 09 開頭十碼數字。"; return; }
      setCurrentPhone(p); document.getElementById("manualBox").style.display = "none";
      startScanner();
    });

    document.getElementById("startBtn").addEventListener("click", startScanner);
    document.getElementById("stopBtn").addEventListener("click", () => stopScanner(false));

    // =======================================
    // AR 拍立得系統
    // =======================================
    async function openAr(picNum) {
      document.getElementById('ar-container').style.display = 'flex';
      document.getElementById('ar-overlay').src = `./ar_${picNum}.png`;
      
      const video = document.getElementById('ar-video');
      try {
        arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCam ? "user" : "environment", width: {ideal: 1280}, height: {ideal: 720} } });
        video.srcObject = arStream;
        video.style.transform = useFrontCam ? "scaleX(-1)" : "scaleX(1)";
        await video.play();
        document.getElementById('ar-overlay').style.display = 'block';
        document.getElementById('ar-controls').style.display = 'flex';
      } catch (err) {
        alert("無法開啟相機進行拍攝！");
        closeAr();
      }
    }

    function switchArCam() {
      useFrontCam = !useFrontCam;
      if (arStream) { arStream.getTracks().forEach(t => t.stop()); }
      openAr(document.getElementById('ar-overlay').src.match(/ar_(\d+)/)[1]);
    }

    function closeAr() {
      if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
      document.getElementById('ar-container').style.display = 'none';
      document.getElementById('ar-overlay').style.display = 'none';
      document.getElementById('ar-controls').style.display = 'none';
      document.getElementById('ar-result-screen').style.display = 'none';
      startScanner(); // 拍完照回到掃描頁自動開啟相機
    }

    function drawCover(ctx, source, cw, ch, isMirror) {
      const sw = source.videoWidth || source.naturalWidth; const sh = source.videoHeight || source.naturalHeight;
      if(!sw || !sh) return;
      const sRatio = sw / sh; const cRatio = cw / ch;
      let dw, dh, sx, sy;
      if (sRatio > cRatio) { dh = ch; dw = sw * (ch / sh); sx = (cw - dw) / 2; sy = 0; } 
      else { dw = cw; dh = sh * (cw / sw); sx = 0; sy = (ch - dh) / 2; }
      ctx.save();
      if (isMirror) { ctx.translate(cw, 0); ctx.scale(-1, 1); }
      ctx.drawImage(source, sx, sy, dw, dh);
      ctx.restore();
    }

    function takeArPhoto() {
      const video = document.getElementById('ar-video');
      const canvas = document.getElementById('ar-canvas');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('ar-overlay');
      
      canvas.width = video.offsetWidth; canvas.height = video.offsetHeight;
      drawCover(ctx, video, canvas.width, canvas.height, useFrontCam);
      drawCover(ctx, overlay, canvas.width, canvas.height, false);

      document.getElementById('result-image').src = canvas.toDataURL('image/png', 0.9);
      document.getElementById('ar-controls').style.display = 'none';
      document.getElementById('ar-overlay').style.display = 'none';
      document.getElementById('ar-result-screen').style.display = 'flex';
    }

    function retakeAr() {
      document.getElementById('ar-result-screen').style.display = 'none';
      document.getElementById('ar-controls').style.display = 'flex';
      document.getElementById('ar-overlay').style.display = 'block';
    }
  </script>
</body>
</html>
