<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>方舟植物展覽｜QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #2c4c3b;
      --primary-light: #729075;
      --bg-color: #f7f9f7;
    }
    html, body {
      margin: 0; padding: 0; background: var(--bg-color);
      font-family: "Noto Sans TC", sans-serif; color: var(--primary-dark);
    }
    .page { min-height: 100vh; padding: 24px 16px 32px; box-sizing: border-box; }
    .wrap { max-width: 600px; margin: 0 auto; }
    
    .hero {
      margin-bottom: 24px; padding: 30px 25px; border-radius: 20px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      color: #fff; box-shadow: 0 10px 25px rgba(44, 76, 59, 0.2); text-align: center;
    }
    .hero h1 { margin: 0 0 10px; font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    .hero p { margin: 0; line-height: 1.6; color: rgba(255,255,255,.9); font-size: 15px;}

    .glass-card {
      background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 25px;
      box-shadow: 0 15px 40px rgba(44, 76, 59, 0.05); margin-bottom: 20px;
    }
    .section-title { font-size: 14px; letter-spacing: 2px; color: var(--primary-light); margin-bottom: 10px; font-weight: 700; }
    h2 { margin: 0 0 15px; font-size: 24px; font-weight: 700; color: var(--primary-dark); }
    
    #reader { width: 100%; min-height: 280px; border-radius: 16px; overflow: hidden; border: 2px dashed #ccc; }
    
    .status {
      margin-top: 20px; padding: 16px; border-radius: 14px; background: #e8f0e8;
      color: var(--primary-dark); font-weight: 700; line-height: 1.6; text-align: center;
    }
    
    input {
      width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px;
      border: 2px solid #ddd; background: #fff; margin-top: 10px; color: var(--primary-dark); letter-spacing: 1px;
    }
    input:focus { border-color: var(--primary-light); outline: none; }
    
    .actions { display: grid; gap: 12px; margin-top: 20px; }
    .btn {
      width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px;
      font-weight: 700; text-decoration: none; border: 0; text-align: center; display: block; cursor: pointer; transition: all 0.3s;
    }
    .btn.primary { background: var(--primary-light); color: #fff; box-shadow: 0 4px 15px rgba(114, 144, 117, 0.3); }
    .btn.primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .btn.secondary { background: #fff; color: var(--primary-dark); border: 2px solid #ddd; }
    .btn.secondary:hover { background: #f0f5f0; }

    .result-box { display: none; margin-top: 16px; padding: 20px; border-radius: 16px; background: #fafcfb; border: 2px solid var(--primary-light); text-align: center; }
    .result-url { margin-top: 10px; font-size: 13px; line-height: 1.5; color: #888; word-break: break-all; }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="hero">
        <h1>🔍 QR 掃描站</h1>
        <p>請開啟相機對準植物旁的 QR Code，<br>點數將自動存入您的紀錄中。</p>
      </div>

      <div class="glass-card">
        <div class="section-title">SCANNER</div>
        <h2>啟動相機</h2>

        <div id="manualBox" style="display:block; margin-bottom: 25px;">
          <input id="phoneInput" type="tel" placeholder="請先輸入手機號碼：09..." maxlength="10">
          <button class="btn primary" id="savePhoneBtn" style="margin-top: 15px;">套用號碼並就緒</button>
        </div>

        <div id="reader"></div>
        <div class="status" id="status">請先輸入正確手機號碼，再按啟動掃描。</div>

        <div class="actions">
          <button class="btn primary" id="startBtn">📷 啟動掃描</button>
          <button class="btn secondary" id="stopBtn">暫停掃描</button>
        </div>

        <div class="result-box" id="resultBox">
          <h3 id="resultText" style="color: var(--primary-dark); margin-top:0;">已掃描成功。</h3>
          <button class="btn primary" id="goBtn">前往植物頁</button>
          <div class="result-url" id="resultUrl"></div>
        </div>
      </div>

      <div class="glass-card" style="padding: 20px;">
        <div class="actions" style="margin-top: 0;">
          <a class="btn primary" id="queryBtn" href="#">🏆 查看我的進度</a>
          <a class="btn secondary" id="rewardBtn" href="#">🎁 查看可兌換獎勵</a>
          <a class="btn secondary" id="homeBtn" href="#">🏠 回展場首頁</a>
          <a class="btn secondary" id="logoutBtn" href="#" style="color: #aaa; border-color: #eee;">登出切換號碼</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 這裡完全保留你原本的 Html5Qrcode 與 API 邏輯
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    function normalizePhone(phone) { return String(phone || "").replace(/\D/g, "").trim(); }
    function isValidMobile(phone) { return /^09\d{8}$/.test(String(phone || "").trim()); }
    function getParam(name) { const url = new URL(window.location.href); return url.searchParams.get(name) || ""; }
    function safeUrl(url) { try { return new URL(url).toString(); } catch (e) { return ""; } }
    function buildUrl(base, params) { const u = new URL(base); Object.keys(params).forEach(function(key) { if (params[key] !== undefined && params[key] !== null && params[key] !== "") { u.searchParams.set(key, params[key]); } }); return u.toString(); }
    function cleanDecodedText(raw) { return String(raw || "").replace(/[\u200B-\u200D\uFEFF]/g, "").replace(/\u00A0/g, " ").trim(); }
    function parsePlantQrUrl(rawUrl) { try { const cleaned = cleanDecodedText(rawUrl); const u = new URL(cleaned); const mode = u.searchParams.get("mode"); const plant = u.searchParams.get("plant"); if (mode !== "plant_go" || !plant) return null; return { plant: plant }; } catch (e) { return null; } }

    function jsonpMarkPlantAndGetRedirect(plant, phone) {
      return new Promise(function(resolve, reject) {
        const callbackName = "__plantCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const url = new URL(APP_URL); url.searchParams.set("mode", "plant_mark_jsonp"); url.searchParams.set("plant", plant); url.searchParams.set("phone", phone); url.searchParams.set("callback", callbackName);
        const script = document.createElement("script"); let done = false;
        function cleanup() { try { delete window[callbackName]; } catch (e) {} if (script.parentNode) script.parentNode.removeChild(script); }
        const timer = setTimeout(function() { if (done) return; done = true; cleanup(); reject(new Error("jsonp timeout")); }, 10000);
        window[callbackName] = function(data) { if (done) return; done = true; clearTimeout(timer); cleanup(); resolve(data || {}); };
        script.onerror = function() { if (done) return; done = true; clearTimeout(timer); cleanup(); reject(new Error("jsonp load error")); };
        script.src = url.toString(); document.body.appendChild(script);
      });
    }

    const homeParam = safeUrl(getParam("home"));
    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");
    const goBtn = document.getElementById("goBtn");
    const resultUrl = document.getElementById("resultUrl");

    let html5QrCode = null; let isStartingScanner = false; let isStoppingScanner = false; let hasScannerStarted = false; let currentCameraId = ""; let currentPhone = ""; let pendingTargetUrl = "";

    // 自動讀取 LocalStorage 記憶的號碼
    window.onload = () => {
      const savedPhone = localStorage.getItem("savedPhone");
      if(savedPhone && isValidMobile(savedPhone)) {
        phoneInput.value = savedPhone;
        setCurrentPhone(savedPhone);
        statusEl.textContent = "已載入您的手機號碼，請按「啟動掃描」。";
      }
    };

    function getCurrentPhone() { return normalizePhone(currentPhone); }
    function setCurrentPhone(phone) { currentPhone = normalizePhone(phone); localStorage.setItem("savedPhone", currentPhone); refreshActionLinks(); }

    function refreshActionLinks() {
      const phone = getCurrentPhone();
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      homeBtn.href = homeParam || buildUrl(APP_URL, { mode: "home", phone: phone });
      logoutBtn.href = "#";
    }

    function resetResultBox() { pendingTargetUrl = ""; resultBox.style.display = "none"; resultUrl.textContent = ""; }

    async function stopScanner(silent) {
      if (!html5QrCode || isStoppingScanner) return; isStoppingScanner = true;
      try { if (hasScannerStarted) { await html5QrCode.stop(); } } catch (e) {}
      try { await html5QrCode.clear(); } catch (e) {}
      html5QrCode = null; hasScannerStarted = false; isStoppingScanner = false;
      if (!silent) { statusEl.textContent = "已暫停相機。"; }
    }

    async function chooseCameraId_() {
      const cameras = await Html5Qrcode.getCameras();
      if (!cameras || !cameras.length) throw new Error("找不到可用相機");
      const rearCamera = cameras.find(function (camera) { return /back|rear|environment|後|背面/i.test(camera.label || ""); });
      return (rearCamera || cameras[0]).id;
    }

    async function handleScanResult(rawUrl) {
      const phone = getCurrentPhone();
      if (!isValidMobile(phone)) { await stopScanner(true); statusEl.textContent = "目前手機號碼無效，請重新輸入 09xxxxxxxx。"; return; }
      const parsed = parsePlantQrUrl(rawUrl);
      await stopScanner(true);
      if (!parsed) { statusEl.textContent = "這似乎不是植物的 QR code，請重新對準。"; return; }
      try {
        statusEl.textContent = "✅ 掃描成功！正在記錄點數…";
        const resp = await jsonpMarkPlantAndGetRedirect(parsed.plant, phone);
        const target = resp.redirectUrl || COLLECTION_URL;
        pendingTargetUrl = target;
        resultText.textContent = (resp.message || "已完成記點");
        resultUrl.textContent = target;
        resultBox.style.display = "block";
        statusEl.textContent = "紀錄完成！請點擊上方按鈕觀看介紹。";
      } catch (err) {
        const msg = err && err.message ? err.message : String(err || "unknown error");
        statusEl.textContent = "記點失敗：" + msg;
      }
    }

    async function startScanner() {
      if (isStartingScanner) return; isStartingScanner = true;
      const phone = getCurrentPhone(); refreshActionLinks(); resetResultBox();
      if (!isValidMobile(phone)) { statusEl.textContent = "請先輸入您的手機號碼喔！"; isStartingScanner = false; return; }
      try {
        statusEl.textContent = "正在請求相機權限…";
        currentCameraId = await chooseCameraId_();
        await stopScanner(true);
        html5QrCode = new Html5Qrcode("reader");
        statusEl.textContent = "啟動中…";
        await html5QrCode.start(currentCameraId, { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.333334 }, async function(decodedText) { await handleScanResult(decodedText); }, function() {});
        hasScannerStarted = true; statusEl.textContent = "相機已啟動，請對準植物的 QR code！";
      } catch (err) {
        const msg = err && err.message ? err.message : String(err || "unknown error");
        statusEl.textContent = "相機啟動失敗：" + msg;
      }
      isStartingScanner = false;
    }

    savePhoneBtn.addEventListener("click", function() {
      const phone = normalizePhone(phoneInput.value);
      if (!isValidMobile(phone)) { statusEl.textContent = "格式錯誤，請輸入 09 開頭的十碼數字。"; return; }
      setCurrentPhone(phone);
      statusEl.textContent = "號碼套用成功！請點擊「啟動掃描」。"; resetResultBox();
    });

    startBtn.addEventListener("click", function() { startScanner(); });
    stopBtn.addEventListener("click", function() { stopScanner(false); });
    goBtn.addEventListener("click", function() {
      if (!pendingTargetUrl) { statusEl.textContent = "目前沒有可前往的植物頁網址。"; return; }
      statusEl.textContent = "準備前往植物介紹頁…"; window.location.assign(pendingTargetUrl);
    });
    logoutBtn.addEventListener("click", async function(e) {
      e.preventDefault(); await stopScanner(true);
      currentPhone = ""; phoneInput.value = ""; localStorage.removeItem("savedPhone"); resetResultBox();
      statusEl.textContent = "已登出。如要掃描請重新輸入號碼。"; refreshActionLinks();
    });
    window.addEventListener("pagehide", function() { stopScanner(true); });
    refreshActionLinks();
  </script>
</body>
</html>
