<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>方舟植物展覽｜QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-dark: #2c4c3b; --primary-light: #729075; --bg-color: #f7f9f7; }
    html, body { margin: 0; padding: 0; background: var(--bg-color); font-family: "Noto Sans TC", sans-serif; color: var(--primary-dark); }
    .page { min-height: 100vh; padding: 24px 16px 32px; box-sizing: border-box; }
    .wrap { max-width: 600px; margin: 0 auto; }
    
    .hero { margin-bottom: 24px; padding: 30px 25px; border-radius: 20px; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); color: #fff; box-shadow: 0 10px 25px rgba(44, 76, 59, 0.2); text-align: center; }
    .hero h1 { margin: 0 0 10px; font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    .hero p { margin: 0; line-height: 1.6; color: rgba(255,255,255,.9); font-size: 15px;}

    .glass-card {
      background: rgba(255, 255, 255, 0.98); border-radius: 20px; padding: 25px;
      box-shadow: 0 15px 40px rgba(44, 76, 59, 0.05); margin-bottom: 20px;
      transform: translateZ(0); will-change: transform;
    }
    .section-title { font-size: 14px; letter-spacing: 2px; color: var(--primary-light); margin-bottom: 10px; font-weight: 700; }
    h2 { margin: 0 0 15px; font-size: 24px; font-weight: 700; color: var(--primary-dark); }
    
    #reader { width: 100%; min-height: 280px; border-radius: 16px; overflow: hidden; border: 2px dashed #ccc; transition: 0.3s; }
    .status { margin-top: 20px; padding: 16px; border-radius: 14px; background: #e8f0e8; color: var(--primary-dark); font-weight: 700; line-height: 1.6; text-align: center; }
    
    input { width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px; border: 2px solid #ddd; background: #fff; margin-top: 10px; color: var(--primary-dark); letter-spacing: 1px; }
    input:focus { border-color: var(--primary-light); outline: none; }
    
    .actions { display: grid; gap: 12px; margin-top: 20px; }
    .btn {
      width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px;
      font-weight: 700; text-decoration: none; border: 0; text-align: center; display: block; cursor: pointer; transition: all 0.3s;
      touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .btn.primary { background: var(--primary-light); color: #fff; box-shadow: 0 4px 15px rgba(114, 144, 117, 0.3); }
    .btn.primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .btn.secondary { background: #fff; color: var(--primary-dark); border: 2px solid #ddd; }
    .btn.secondary:hover { background: #f0f5f0; }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="hero">
        <h1>🔍 QR 掃描站</h1>
        <p>請開啟相機對準植物旁的 QR Code，<br>點數將自動存入您的紀錄中。</p>
      </div>

      <div class="glass-card">
        <div class="section-title">SCANNER</div>
        <h2>啟動相機</h2>

        <!-- ★ 預設隱藏，防止閃爍 -->
        <div id="manualBox" style="display:none; margin-bottom: 25px;">
          <input id="phoneInput" type="tel" placeholder="請先輸入手機號碼：09..." maxlength="10" autocomplete="off" name="phone-no-autofill">
          <button class="btn primary" id="savePhoneBtn" style="margin-top: 15px;">套用號碼並就緒</button>
        </div>

        <div id="reader"></div>
        <div class="status" id="status">準備就緒，請按下方按鈕啟動相機。</div>

        <div class="actions" id="scanActions">
          <button class="btn primary" id="startBtn">📷 啟動掃描</button>
          <button class="btn secondary" id="stopBtn" style="display:none;">暫停掃描</button>
        </div>
      </div>

      <div class="glass-card" style="padding: 20px;">
        <div class="actions" style="margin-top: 0;">
          <a class="btn primary" id="queryBtn" href="#">🏆 查看我的進度</a>
          <a class="btn secondary" id="rewardBtn" href="#">🎁 查看可兌換獎勵</a>
          <a class="btn secondary" id="homeBtn" href="index.html">🏠 回展場首頁</a>
          <a class="btn secondary" id="logoutBtn" href="#" style="color: #aaa; border-color: #eee;">登出切換號碼</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    function normalizePhone(phone) { return String(phone || "").replace(/\D/g, "").trim(); }
    function isValidMobile(phone) { return /^09\d{8}$/.test(String(phone || "").trim()); }
    function cleanDecodedText(raw) { return String(raw || "").replace(/[\u200B-\u200D\uFEFF]/g, "").replace(/\u00A0/g, " ").trim(); }
    function buildUrl(base, params) { const u = new URL(base); Object.keys(params).forEach(function(key) { if (params[key] !== undefined && params[key] !== null && params[key] !== "") { u.searchParams.set(key, params[key]); } }); return u.toString(); }
    function getParam(name) { const url = new URL(window.location.href); return url.searchParams.get(name) || ""; }

    function jsonpMarkPlantAndGetRedirect(plant, phone) {
      return new Promise(function(resolve, reject) {
        const callbackName = "__plantCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const url = new URL(APP_URL); url.searchParams.set("mode", "plant_mark_jsonp"); url.searchParams.set("plant", plant); url.searchParams.set("phone", phone); url.searchParams.set("callback", callbackName);
        const script = document.createElement("script"); let done = false;
        function cleanup() { try { delete window[callbackName]; } catch (e) {} if (script.parentNode) script.parentNode.removeChild(script); }
        const timer = setTimeout(function() { if (done) return; done = true; cleanup(); reject(new Error("連線超時")); }, 15000);
        window[callbackName] = function(data) { if (done) return; done = true; clearTimeout(timer); cleanup(); resolve(data || {}); };
        script.onerror = function() { if (done) return; done = true; clearTimeout(timer); cleanup(); reject(new Error("載入失敗")); };
        script.src = url.toString(); document.body.appendChild(script);
      });
    }

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const phoneInput = document.getElementById("phoneInput");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let html5QrCode = null; let isStartingScanner = false; let isStoppingScanner = false; let hasScannerStarted = false; let currentPhone = "";

    function resetScannerUI() {
      if (getCurrentPhone()) {
        document.getElementById("reader").style.display = "block";
        document.getElementById("scanActions").style.display = "grid";
        statusEl.innerHTML = "準備就緒，請按下方按鈕啟動相機。";
        statusEl.style.background = "#e8f0e8";
        startBtn.style.display = "block"; stopBtn.style.display = "none";
      }
    }

    window.addEventListener("pageshow", function(e) {
      stopScanner(true);
      resetScannerUI();
    });

    window.onload = () => {
      // ★ 優先抓取網址上的手機號碼 (從 Google 返回時會用到)
      let phoneParam = getParam("phone");
      let savedPhone = phoneParam || sessionStorage.getItem("savedPhone");
      
      if(savedPhone && isValidMobile(savedPhone)) {
        currentPhone = savedPhone;
        sessionStorage.setItem("savedPhone", currentPhone); // 確保寫入暫存
        manualBox.style.display = "none";
        refreshActionLinks();
        resetScannerUI();
      } else {
        manualBox.style.display = "block";
      }
    };

    function getCurrentPhone() { return normalizePhone(currentPhone); }
    function setCurrentPhone(phone) { currentPhone = normalizePhone(phone); sessionStorage.setItem("savedPhone", currentPhone); refreshActionLinks(); }

    function refreshActionLinks() {
      const phone = getCurrentPhone();
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
    }

    async function stopScanner(silent) {
      if (!html5QrCode || isStoppingScanner) return; isStoppingScanner = true;
      try { if (hasScannerStarted) { await html5QrCode.stop(); } } catch (e) {}
      try { await html5QrCode.clear(); } catch (e) {}
      html5QrCode = null; hasScannerStarted = false; isStoppingScanner = false;
      startBtn.style.display = "block"; stopBtn.style.display = "none";
      if (!silent) { statusEl.textContent = "已暫停相機。"; }
    }

    async function chooseCameraId_() {
      const cameras = await Html5Qrcode.getCameras();
      if (!cameras || !cameras.length) throw new Error("找不到相機");
      const rearCamera = cameras.find(c => /back|rear|environment|後|背面/i.test(c.label || ""));
      return (rearCamera || cameras[0]).id;
    }

    async function handleScanResult(rawUrl) {
      const phone = getCurrentPhone();
      if (!isValidMobile(phone)) { await stopScanner(true); statusEl.textContent = "無效的手機號碼。"; return; }
      
      let urlObj, mode;
      try {
        urlObj = new URL(cleanDecodedText(rawUrl));
        mode = urlObj.searchParams.get("mode");
        if (mode !== "plant_go" && mode !== "stamp") return;
      } catch (err) { return; }

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      await stopScanner(true);
      document.getElementById("reader").style.display = "none"; 
      document.getElementById("scanActions").style.display = "none"; 
      
      statusEl.innerHTML = `<div style="font-size:30px; margin-bottom:10px;">⏳</div>正在與展覽系統連線...<br><span style="font-size:13px; color:#888;">(請稍候約 2~5 秒鐘)</span>`;
      statusEl.style.background = "#fff3cd"; 
      
      try {
        if (mode === "plant_go" && urlObj.searchParams.get("plant")) {
          const parsedPlant = urlObj.searchParams.get("plant");
          let resp;
          
          try {
            resp = await jsonpMarkPlantAndGetRedirect(parsedPlant, phone);
          } catch(e) {
            console.log("第一次連線超時，系統自動重試中...");
            resp = await jsonpMarkPlantAndGetRedirect(parsedPlant, phone);
          }

          const target = resp.redirectUrl || COLLECTION_URL;
          if (navigator.vibrate) navigator.vibrate(200); 
          statusEl.innerHTML = `🎉 <b>${resp.message || "已完成記點"}</b><br><br>即將前往介紹頁...`;
          statusEl.style.background = "#d4edda";
          
          window.location.assign(target);

        } else if (mode === "stamp" && urlObj.searchParams.get("spot")) {
          if (navigator.vibrate) navigator.vibrate(200);
          statusEl.innerHTML = "✅ <b>掃描展區成功！</b><br><br>即將前往紀錄頁面...";
          statusEl.style.background = "#d4edda";
          urlObj.searchParams.set("phone", phone);
          window.location.assign(urlObj.toString());
        }
      } catch (err) {
        resetScannerUI(); 
        statusEl.innerHTML = "<b>系統連線失敗 💦</b><br>展場網路可能較弱，請確認網路後重新掃描。";
        statusEl.style.background = "#f8d7da";
      }
    }

    async function startScanner() {
      if (isStartingScanner) return; isStartingScanner = true;
      const phone = getCurrentPhone(); refreshActionLinks(); 
      if (!isValidMobile(phone)) { statusEl.textContent = "請先輸入您的手機號碼喔！"; isStartingScanner = false; return; }
      try {
        statusEl.textContent = "正在啟動相機…";
        const currentCameraId = await chooseCameraId_();
        await stopScanner(true);
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(currentCameraId, { fps: 5, qrbox: { width: 250, height: 250 }, aspectRatio: 1.333334 }, async function(decodedText) { await handleScanResult(decodedText); }, function() {});
        hasScannerStarted = true; 
        startBtn.style.display = "none"; stopBtn.style.display = "block";
        statusEl.textContent = "相機已啟動，請對準展場中的 QR code！";
      } catch (err) {
        statusEl.textContent = "相機啟動失敗，請確認是否允許相機權限。";
      }
      isStartingScanner = false;
    }

    document.getElementById("savePhoneBtn").addEventListener("click", function() {
      const phone = normalizePhone(phoneInput.value);
      if (!isValidMobile(phone)) { statusEl.textContent = "請輸入正確的 09 開頭十碼數字。"; return; }
      setCurrentPhone(phone);
      manualBox.style.display = "none";
      resetScannerUI();
    });

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", () => stopScanner(false));

    document.getElementById("logoutBtn").addEventListener("click", async function(e) {
      e.preventDefault(); await stopScanner(true);
      currentPhone = ""; phoneInput.value = ""; 
      sessionStorage.removeItem("savedPhone"); 
      manualBox.style.display = "block"; 
      statusEl.textContent = "已登出。如要掃描請重新輸入號碼。"; refreshActionLinks();
    });
  </script>
</body>
</html>
