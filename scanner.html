<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    html,body{
      margin:0;
      padding:0;
      background:#edf5ec;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      color:#27352a;
    }
    .page{
      min-height:100vh;
      padding:24px 16px 32px;
      box-sizing:border-box;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
    }
    .hero{
      margin-bottom:18px;
      padding:28px 22px 24px;
      border-radius:26px;
      background:linear-gradient(145deg, rgba(89,124,94,.96), rgba(123,157,116,.94));
      color:#fff;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
      border:2px solid rgba(255,255,255,.18);
    }
    .hero h1{
      margin:0 0 10px;
      font-size:32px;
      font-weight:900;
    }
    .hero p{
      margin:0;
      line-height:1.8;
      color:rgba(255,255,255,.96);
    }
    .card{
      background:#fffef9;
      border:2px solid #d6e3d3;
      border-radius:22px;
      padding:20px;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
      margin-bottom:16px;
    }
    .section-title{
      font-size:13px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#71826f;
      margin-bottom:8px;
      font-weight:800;
    }
    h2{
      margin:0 0 12px;
      font-size:28px;
      font-weight:800;
      color:#2b3b2f;
    }
    p{
      margin:0 0 12px;
      line-height:1.8;
      color:#627063;
      font-size:17px;
    }
    #reader{
      width:100%;
      min-height:280px;
      border-radius:16px;
      overflow:hidden;
      background:#f4f8f2;
    }
    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:14px;
      background:#f8fbf6;
      border:2px solid #d6e3d3;
      color:#405842;
      font-weight:700;
      line-height:1.7;
      word-break:break-word;
    }
    .manual{
      display:block;
      margin-top:16px;
    }
    .result-box{
      display:none;
      margin-top:16px;
      padding:16px;
      border-radius:16px;
      background:#f8fbf6;
      border:2px solid #d6e3d3;
    }
    .result-url{
      margin-top:10px;
      font-size:13px;
      line-height:1.7;
      color:#627063;
      word-break:break-all;
    }
    input{
      width:100%;
      box-sizing:border-box;
      border-radius:16px;
      padding:16px 14px;
      font-size:18px;
      border:2px solid #d6e3d3;
      background:#fffefb;
      margin-top:10px;
    }
    .actions{
      display:grid;
      gap:12px;
      margin-top:18px;
    }
    a.btn,button.btn{
      width:100%;
      box-sizing:border-box;
      border-radius:16px;
      padding:16px 14px;
      font-size:18px;
      font-weight:800;
      text-decoration:none;
      border:0;
      text-align:center;
      display:block;
      cursor:pointer;
    }
    a.btn.primary,button.btn.primary{
      background:linear-gradient(135deg,#55795c,#3f5d45);
      color:#fff;
    }
    a.btn.secondary,button.btn.secondary{
      background:#eef5ea;
      color:#27352a;
      border:2px solid #d6e3d3;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="hero">
        <h1>QR 探索掃描站</h1>
        <p>請先輸入手機號碼，再點「啟動掃描」。掃描成功後，再點按鈕前往植物介紹頁。</p>
      </div>

      <div class="card">
        <div class="section-title">Scanner</div>
        <h2>開始掃描</h2>
        <p>每位參觀者只需輸入一次手機號碼。此頁不會沿用上一位使用者的電話。</p>

        <div class="manual" id="manualBox">
          <p>請先輸入手機號碼。</p>
          <input id="phoneInput" type="text" placeholder="例如：0912345678" inputmode="numeric">
          <button class="btn primary" id="savePhoneBtn" type="button">套用手機號碼</button>
        </div>

        <div id="reader"></div>
        <div class="status" id="status">請先輸入正確手機號碼，再按啟動掃描。</div>

        <div class="actions" style="margin-top:14px;">
          <button class="btn primary" id="startBtn" type="button">啟動掃描</button>
          <button class="btn secondary" id="stopBtn" type="button">停止掃描</button>
        </div>

        <div class="result-box" id="resultBox">
          <p id="resultText">已掃描成功。</p>
          <button class="btn primary" id="goBtn" type="button">前往植物頁</button>
          <div class="result-url" id="resultUrl"></div>
        </div>

        <div class="actions">
          <a class="btn primary" id="queryBtn" href="#">查看我的進度</a>
          <a class="btn secondary" id="rewardBtn" href="#">查看可兌換獎勵</a>
          <a class="btn secondary" id="homeBtn" href="#">回首頁</a>
          <a class="btn secondary" id="logoutBtn" href="#">清除目前手機號碼</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    function normalizePhone(phone) {
      return String(phone || "").replace(/\D/g, "").trim();
    }

    function isValidMobile(phone) {
      return /^09\d{8}$/.test(String(phone || "").trim());
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function safeUrl(url) {
      try {
        return new URL(url).toString();
      } catch (e) {
        return "";
      }
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function cleanDecodedText(raw) {
      return String(raw || "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/\u00A0/g, " ")
        .trim();
    }

    function parsePlantQrUrl(rawUrl) {
      try {
        const cleaned = cleanDecodedText(rawUrl);
        const u = new URL(cleaned);
        const mode = u.searchParams.get("mode");
        const plant = u.searchParams.get("plant");

        if (mode !== "plant_go" || !plant) return null;

        return { plant: plant };
      } catch (e) {
        return null;
      }
    }

    function jsonpMarkPlantAndGetRedirect(plant, phone) {
      return new Promise(function(resolve, reject) {
        const callbackName = "__plantCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const url = new URL(APP_URL);
        url.searchParams.set("mode", "plant_mark_jsonp");
        url.searchParams.set("plant", plant);
        url.searchParams.set("phone", phone);
        url.searchParams.set("callback", callbackName);

        const script = document.createElement("script");
        let done = false;

        function cleanup() {
          try { delete window[callbackName]; } catch (e) {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        const timer = setTimeout(function() {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error("jsonp timeout"));
        }, 10000);

        window[callbackName] = function(data) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          cleanup();
          resolve(data || {});
        };

        script.onerror = function() {
          if (done) return;
          done = true;
          clearTimeout(timer);
          cleanup();
          reject(new Error("jsonp load error"));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    const homeParam = safeUrl(getParam("home"));

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");
    const goBtn = document.getElementById("goBtn");
    const resultUrl = document.getElementById("resultUrl");

    let html5QrCode = null;
    let isStartingScanner = false;
    let isStoppingScanner = false;
    let hasScannerStarted = false;
    let currentCameraId = "";
    let currentPhone = "";
    let pendingTargetUrl = "";

    function getCurrentPhone() {
      return normalizePhone(currentPhone);
    }

    function setCurrentPhone(phone) {
      currentPhone = normalizePhone(phone);
      refreshActionLinks();
    }

    function refreshActionLinks() {
      const phone = getCurrentPhone();
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      homeBtn.href = homeParam || buildUrl(APP_URL, { mode: "home", phone: phone });
      logoutBtn.href = "#";
    }

    function resetResultBox() {
      pendingTargetUrl = "";
      resultBox.style.display = "none";
      resultUrl.textContent = "";
    }

    async function stopScanner(silent) {
      if (!html5QrCode || isStoppingScanner) return;
      isStoppingScanner = true;

      try {
        if (hasScannerStarted) {
          await html5QrCode.stop();
        }
      } catch (e) {}

      try {
        await html5QrCode.clear();
      } catch (e) {}

      html5QrCode = null;
      hasScannerStarted = false;
      isStoppingScanner = false;

      if (!silent) {
        statusEl.textContent = "已停止掃描。";
      }
    }

    async function chooseCameraId_() {
      const cameras = await Html5Qrcode.getCameras();

      if (!cameras || !cameras.length) {
        throw new Error("找不到可用相機");
      }

      const rearCamera = cameras.find(function (camera) {
        return /back|rear|environment|後|背面/i.test(camera.label || "");
      });

      return (rearCamera || cameras[0]).id;
    }

    async function handleScanResult(rawUrl) {
      const phone = getCurrentPhone();

      if (!isValidMobile(phone)) {
        await stopScanner(true);
        statusEl.textContent = "目前手機號碼無效，請重新輸入 09xxxxxxxx。";
        return;
      }

      const parsed = parsePlantQrUrl(rawUrl);
      await stopScanner(true);

      if (!parsed) {
        statusEl.textContent = "這不是植物 QR code，請重新掃描。";
        return;
      }

      try {
        statusEl.textContent = "掃描成功，正在記錄點數…";

        const resp = await jsonpMarkPlantAndGetRedirect(parsed.plant, phone);
        const target = resp.redirectUrl || COLLECTION_URL;

        pendingTargetUrl = target;
        resultText.textContent = (resp.message || "已完成記點") + "，請點按鈕前往植物頁。";
        resultUrl.textContent = target;
        resultBox.style.display = "block";
        statusEl.textContent = "已完成記點，請點按鈕前往植物頁。";
      } catch (err) {
        const msg = err && err.message ? err.message : String(err || "unknown error");
        statusEl.textContent = "記點失敗：" + msg;
      }
    }

    async function startScanner() {
      if (isStartingScanner) return;
      isStartingScanner = true;

      const phone = getCurrentPhone();
      refreshActionLinks();
      resetResultBox();

      if (!isValidMobile(phone)) {
        statusEl.textContent = "請先輸入正確手機號碼，格式需為 09xxxxxxxx。";
        isStartingScanner = false;
        return;
      }

      try {
        statusEl.textContent = "正在請求相機權限…";
        currentCameraId = await chooseCameraId_();

        await stopScanner(true);

        html5QrCode = new Html5Qrcode("reader");
        statusEl.textContent = "正在啟動相機…";

        await html5QrCode.start(
          currentCameraId,
          {
            fps: 10,
            qrbox: { width: 240, height: 240 },
            aspectRatio: 1.333334
          },
          async function(decodedText) {
            await handleScanResult(decodedText);
          },
          function() {}
        );

        hasScannerStarted = true;
        statusEl.textContent = "請對準植物 QR code…";
      } catch (err) {
        const msg = err && err.message ? err.message : String(err || "unknown error");
        statusEl.textContent = "相機啟動失敗：" + msg;
      }

      isStartingScanner = false;
    }

    savePhoneBtn.addEventListener("click", function() {
      const phone = normalizePhone(phoneInput.value);

      if (!isValidMobile(phone)) {
        statusEl.textContent = "請輸入正確手機號碼，格式需為 09xxxxxxxx。";
        return;
      }

      setCurrentPhone(phone);
      statusEl.textContent = "已套用手機號碼，請按啟動掃描。";
      resetResultBox();
    });

    startBtn.addEventListener("click", function() {
      startScanner();
    });

    stopBtn.addEventListener("click", function() {
      stopScanner(false);
    });

    goBtn.addEventListener("click", function() {
      if (!pendingTargetUrl) {
        statusEl.textContent = "目前沒有可前往的植物頁網址。";
        return;
      }
      statusEl.textContent = "正在前往植物頁…";
      window.location.assign(pendingTargetUrl);
    });

    logoutBtn.addEventListener("click", async function(e) {
      e.preventDefault();
      await stopScanner(true);
      currentPhone = "";
      phoneInput.value = "";
      resetResultBox();
      statusEl.textContent = "已清除手機號碼，請重新輸入。";
      refreshActionLinks();
    });

    window.addEventListener("pagehide", function() {
      stopScanner(true);
    });

    refreshActionLinks();
  </script>
</body>
</html>
