<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    html,body{
      margin:0;
      padding:0;
      background:#edf5ec;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      color:#27352a;
    }
    .page{
      min-height:100vh;
      padding:24px 16px 32px;
      box-sizing:border-box;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
    }
    .hero{
      margin-bottom:18px;
      padding:28px 22px 24px;
      border-radius:26px;
      background:linear-gradient(145deg, rgba(89,124,94,.96), rgba(123,157,116,.94));
      color:#fff;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
      border:2px solid rgba(255,255,255,.18);
    }
    .hero h1{
      margin:0 0 10px;
      font-size:32px;
      font-weight:900;
    }
    .hero p{
      margin:0;
      line-height:1.8;
      color:rgba(255,255,255,.96);
    }
    .card{
      background:#fffef9;
      border:2px solid #d6e3d3;
      border-radius:22px;
      padding:20px;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
      margin-bottom:16px;
    }
    .section-title{
      font-size:13px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#71826f;
      margin-bottom:8px;
      font-weight:800;
    }
    h2{
      margin:0 0 12px;
      font-size:28px;
      font-weight:800;
      color:#2b3b2f;
    }
    p{
      margin:0 0 12px;
      line-height:1.8;
      color:#627063;
      font-size:17px;
    }
    #reader{
      width:100%;
      min-height:280px;
      border-radius:16px;
      overflow:hidden;
      background:#f4f8f2;
    }
    .status{
      margin-top:14px;
      padding:14px 16px;
      border-radius:14px;
      background:#f8fbf6;
      border:2px solid #d6e3d3;
      color:#405842;
      font-weight:700;
      line-height:1.7;
      word-break:break-word;
    }
    .manual{
      display:none;
      margin-top:16px;
    }
    input{
      width:100%;
      box-sizing:border-box;
      border-radius:16px;
      padding:16px 14px;
      font-size:18px;
      border:2px solid #d6e3d3;
      background:#fffefb;
      margin-top:10px;
    }
    .actions{
      display:grid;
      gap:12px;
      margin-top:18px;
    }
    a.btn,button.btn{
      width:100%;
      box-sizing:border-box;
      border-radius:16px;
      padding:16px 14px;
      font-size:18px;
      font-weight:800;
      text-decoration:none;
      border:0;
      text-align:center;
      display:block;
      cursor:pointer;
    }
    a.btn.primary,button.btn.primary{
      background:linear-gradient(135deg,#55795c,#3f5d45);
      color:#fff;
    }
    a.btn.secondary,button.btn.secondary{
      background:#eef5ea;
      color:#27352a;
      border:2px solid #d6e3d3;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="hero">
        <h1>QR 探索掃描站</h1>
        <p>請將鏡頭對準植物 QR code，系統會自動前往植物介紹頁。</p>
      </div>

      <div class="card">
        <div class="section-title">Scanner</div>
        <h2>開始掃描</h2>
        <p>請先點「啟動掃描」，再允許相機權限。</p>

        <div id="reader"></div>
        <div class="status" id="status">尚未啟動相機。</div>

        <div class="actions" style="margin-top:14px;">
          <button class="btn primary" id="startBtn" type="button">啟動掃描</button>
          <button class="btn secondary" id="stopBtn" type="button">停止掃描</button>
        </div>

        <div class="manual" id="manualBox">
          <p>找不到手機號碼，請先輸入。</p>
          <input id="phoneInput" type="text" placeholder="例如：0912345678" inputmode="numeric">
          <button class="btn primary" id="savePhoneBtn" type="button">儲存後開始掃描</button>
        </div>

        <div class="actions">
          <a class="btn primary" id="queryBtn" href="#">查看我的進度</a>
          <a class="btn secondary" id="rewardBtn" href="#">查看可兌換獎勵</a>
          <a class="btn secondary" id="homeBtn" href="#">回首頁</a>
          <a class="btn secondary" id="logoutBtn" href="#">切換使用者</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function safeUrl(url) {
      try {
        return new URL(url).toString();
      } catch (e) {
        return "";
      }
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function attachPhoneToUrl(rawUrl, phone) {
      try {
        const u = new URL(rawUrl);
        if (phone && !u.searchParams.get("phone")) {
          u.searchParams.set("phone", phone);
        }
        return u.toString();
      } catch (e) {
        return rawUrl;
      }
    }

    const homeParam = safeUrl(getParam("home"));
    const phoneParam = normalizePhone(getParam("phone"));
    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let html5QrCode = null;
    let alreadyJumped = false;
    let isStartingScanner = false;
    let isStoppingScanner = false;
    let hasScannerStarted = false;

    function getSavedPhone() {
      if (phoneParam) return phoneParam;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function refreshActionLinks() {
      const phone = getSavedPhone();
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      homeBtn.href = homeParam || buildUrl(APP_URL, { mode: "home", phone: phone });
      logoutBtn.href = buildUrl(APP_URL, { mode: "logout" });
    }

    async function stopScanner() {
      if (!html5QrCode || isStoppingScanner) return;
      isStoppingScanner = true;

      try {
        if (hasScannerStarted) {
          await html5QrCode.stop();
        }
      } catch (e) {}

      try {
        await html5QrCode.clear();
      } catch (e) {}

      html5QrCode = null;
      hasScannerStarted = false;
      isStoppingScanner = false;
      statusEl.textContent = "已停止掃描。";
    }

    async function goToTarget(rawUrl) {
      if (alreadyJumped) return;
      alreadyJumped = true;

      const phone = getSavedPhone();
      const target = attachPhoneToUrl(rawUrl, phone);

      statusEl.textContent = "已掃描成功，正在前往植物頁…";

      await stopScanner();

      setTimeout(function () {
        window.location.replace(target);
      }, 350);
    }

   async function startScanner() {
  if (isStartingScanner) return;
  isStartingScanner = true;

  const phone = getSavedPhone();
  refreshActionLinks();

  if (!phone) {
    statusEl.textContent = "請先輸入手機號碼。";
    manualBox.style.display = "block";
    isStartingScanner = false;
    return;
  }

  localStorage.setItem("savedPhone", phone);
  manualBox.style.display = "none";
  statusEl.textContent = "正在啟動相機…";

  await stopScanner();

  html5QrCode = new Html5Qrcode("reader");

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 240, height: 240 },
        aspectRatio: 1.333334
      },
      async function(decodedText) {
        await goToTarget(decodedText);
      },
      function() {}
    );

    hasScannerStarted = true;
    statusEl.textContent = "請對準植物 QR code…";
  } catch (err) {
    const msg = err && err.message ? err.message : String(err || "unknown error");
    statusEl.textContent = "相機啟動失敗：" + msg;
  }

  isStartingScanner = false;
}

    savePhoneBtn.addEventListener("click", function() {
      const phone = normalizePhone(phoneInput.value);
      if (!phone) {
        statusEl.textContent = "請輸入正確手機號碼。";
        return;
      }
      localStorage.setItem("savedPhone", phone);
      alreadyJumped = false;
      refreshActionLinks();
      startScanner();
    });

    startBtn.addEventListener("click", function() {
      alreadyJumped = false;
      startScanner();
    });

    stopBtn.addEventListener("click", function() {
      stopScanner();
    });

    logoutBtn.addEventListener("click", async function(e) {
      e.preventDefault();
      try { localStorage.removeItem("savedPhone"); } catch (e2) {}
      await stopScanner();
      window.location.href = buildUrl(APP_URL, { mode: "logout" });
    });

    window.addEventListener("pagehide", function() {
      stopScanner();
    });

    refreshActionLinks();

    // 不自動啟動，改成手動按鈕
    const initPhone = getSavedPhone();
    if (!initPhone) {
      manualBox.style.display = "block";
      statusEl.textContent = "請先輸入手機號碼，再按啟動掃描。";
    } else {
      statusEl.textContent = "請按「啟動掃描」開始。";
    }
  </script>
</body>
</html>
