<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <title>方舟植物展覽｜專屬探索 App</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4a7c59; --primary-dark: #2c4c3b; --solid-bg: #162419; --solid-border: #2a3d2e; --accent: #d4a373;}
    html, body { margin: 0; padding: 0; font-family: "Noto Sans TC", sans-serif; color: #fff; background-color:#111a13; touch-action: manipulation; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; overflow-x: hidden;}
    
    .bg-fixed { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; background: url('https://raw.githubusercontent.com/huisunnbgap2026-pixel/plant-qr-scanner/main/bg_main.jpg') center/cover no-repeat; z-index: -1; }

    .view { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; padding: 24px 16px 40px; box-sizing: border-box; }
    .view.active { display: flex; animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    .wrap { width: 100%; max-width: 400px; z-index: 10; margin: 0 auto; }
    
    .hero { margin-bottom: 24px; padding: 30px 25px; border-radius: 20px; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    .hero h1 { margin: 0 0 10px; font-size: 28px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
    .hero p { margin: 0; line-height: 1.6; color: rgba(255,255,255,.9); font-size: 15px;}

    .solid-card { width: 100%; box-sizing: border-box; background: rgba(22, 36, 25, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0, 0.6); border: 1px solid var(--solid-border); margin-bottom: 20px; text-align: center; }
    .section-title { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #8fa896; margin-bottom: 10px; font-weight: 700; }
    h2 { margin: 0 0 15px; font-size: 24px; font-weight: 700; color: #fff; }
    h3 { margin: 0 0 15px; font-size: 18px; font-weight: 800; color: #e8f0e8; }
    p { margin: 0 0 15px; line-height: 1.6; color: #a3b8a8; font-size: 15px; }
    .points { font-size: 45px; font-weight: 900; color: #d4a373; margin: 10px 0; }
    .notice { padding: 16px; border-radius: 16px; background: #0c140e; border: 1px solid var(--solid-border); font-size: 14px; margin-bottom: 15px; color: #fff;}

    #reader { width: 100%; min-height: 280px; border-radius: 16px; overflow: hidden; border: 2px dashed #ccc; display: none; background:#000; margin-bottom: 15px;}
    .status-box { padding: 16px; border-radius: 14px; background: #e8f0e8; color: var(--primary-dark); font-weight: 700; line-height: 1.6; font-size: 15px; margin-bottom: 15px;}
    
    button.btn, a.btn { width: 100%; box-sizing: border-box; border-radius: 16px; padding: 16px 14px; font-size: 18px; font-weight: 700; text-decoration: none; border: 0; text-align: center; display: block; cursor: pointer; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; margin-bottom:12px; }
    button.btn:active, a.btn:active { transform: scale(0.96); }
    .btn.primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); color: #fff !important; box-shadow: 0 4px 15px rgba(74, 124, 89, 0.3); }
    .btn.secondary { background: #233326; color: #fff !important; border: 1px solid var(--solid-border); }
    .btn.accent { background: linear-gradient(135deg, #d4a373, #a67c52); color: #fff !important; }

    /* API 資料呈現樣式 */
    .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .badge-card { background: #233326; border: 1px solid #4a6350; border-radius: 16px; padding: 15px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .history-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; background: #233326; border: 1px solid var(--solid-border); padding: 14px 16px; border-radius: 16px; text-align: left;}
    
    #ar-container { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    #ar-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    #ar-overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
    .ar-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 10; }
    .btn-capture { background: var(--accent); color: white; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    .btn-close-ar { position: absolute; top: 30px; left: 20px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; z-index: 15; font-weight: bold; cursor: pointer;}
    .btn-switch-cam { position: absolute; top: 30px; right: 20px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; z-index: 15; font-weight: bold; cursor: pointer;}
    #ar-result-screen { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; padding:20px; text-align:center;}
    #result-image { width: 100%; max-width: 400px; max-height: 60vh; object-fit: contain; border-radius: 10px; margin-bottom: 20px; }

    #global-loader { display: none; position: fixed; inset: 0; background: rgba(17, 26, 19, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4a7c59; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>
  <div id="global-loader"><div class="spinner"></div><h3 id="loader-text">載入中...</h3></div>

  <!-- 視圖 1: 掃描站 -->
  <div id="view-scan" class="view">
    <div class="wrap">
      <div class="hero">
        <h1>🔍 展區掃描站</h1>
        <p>請掃描展區內的植物與 AR 專屬 QR Code<br>系統將自動為您處理動作。</p>
      </div>

      <div class="solid-card">
        <div class="section-title">SCANNER</div>
        <div id="reader"></div>
        <div class="status-box" id="scan-status">相機已待命，請點擊下方按鈕啟動。</div>
        <button class="btn primary" id="startBtn" onclick="startScanner()">📷 點擊啟動相機</button>
        <button class="btn secondary" id="stopBtn" style="display:none;" onclick="stopScanner()">暫停掃描</button>
      </div>

      <div class="solid-card">
        <button class="btn primary" onclick="loadApiData('query')">🏆 查看我的進度</button>
        <button class="btn primary" onclick="loadApiData('rewards')">🎁 查看可兌換獎勵</button>
        <a class="btn secondary" href="index.html">🏠 回展場首頁</a>
      </div>
    </div>
  </div>

  <!-- 視圖 2: API 資料顯示 (進度/獎勵/兌換結果) -->
  <div id="view-api" class="view">
    <div class="wrap" id="api-content">
      <!-- 這裡的內容將由 JavaScript 動態生成 -->
    </div>
  </div>

  <!-- 視圖 3: AR 拍立得 -->
  <div id="ar-container">
    <button class="btn-close-ar" onclick="closeAr()">✖ 關閉</button>
    <button class="btn-switch-cam" onclick="switchArCam()">🔄 翻轉</button>
    <video id="ar-video" autoplay playsinline></video>
    <img id="ar-overlay" src="" crossorigin="anonymous">
    <div id="ar-controls" class="ar-controls"><button class="btn-capture" onclick="takeArPhoto()">📸</button></div>
    <div id="ar-result-screen">
      <div style="color:#fff; font-weight:bold; margin-bottom:15px; font-size:18px;">✨ 拍照成功！長按圖片即可儲存 ✨</div>
      <img id="result-image" src="">
      <div style="width:100%; max-width:300px; display:grid; gap:10px;">
        <button class="btn secondary" onclick="retakeAr()">🔄 重新拍攝</button>
        <button class="btn primary" onclick="closeAr()">✅ 完成並返回</button>
      </div>
    </div>
    <canvas id="ar-canvas" style="display:none;"></canvas>
  </div>

  <script>
    // ⚠️ 這裡填入你的 GAS 網址
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    function normalizePhone(phone) { return String(phone || "").replace(/\D/g, "").trim(); }
    function isValidMobile(phone) { return /^09\d{8}$/.test(String(phone || "").trim()); }
    function escapeHtml(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    const urlParams = new URLSearchParams(window.location.search);
    let currentPhone = sessionStorage.getItem("savedPhone") || "";
    let html5QrCode = null; let useFrontCam = false; let arStream = null;

    window.onload = () => {
      if(!currentPhone) { alert("請先登入手機號碼！"); window.location.href = "index.html"; return; }
      
      const viewToLoad = urlParams.get('view');
      if (viewToLoad === 'query') { loadApiData('query'); } 
      else if (viewToLoad === 'rewards') { loadApiData('rewards'); } 
      else { switchView('scan'); }
    };

    window.addEventListener("pageshow", function() {
      document.getElementById('global-loader').style.display = 'none';
      stopScanner(); 
    });

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      window.scrollTo(0,0);
    }

    function showLoader(text) { document.getElementById('loader-text').innerHTML = text; document.getElementById('global-loader').style.display = 'flex'; }
    function hideLoader() { document.getElementById('global-loader').style.display = 'none'; }

    // --- JSONP API 核心 ---
    function jsonpApi(mode, extraParams = {}) {
      return new Promise((resolve, reject) => {
        const cbName = "cb_" + Date.now() + Math.floor(Math.random()*1000);
        const url = new URL(APP_URL);
        url.searchParams.set("mode", mode);
        url.searchParams.set("phone", currentPhone);
        url.searchParams.set("callback", cbName);
        url.searchParams.set("t", Date.now());
        Object.keys(extraParams).forEach(k => url.searchParams.set(k, extraParams[k]));

        const script = document.createElement("script"); let done = false;
        const timer = setTimeout(() => { if(!done){ done=true; script.remove(); reject(new Error("Timeout")); } }, 15000);
        window[cbName] = (data) => { if(!done){ done=true; clearTimeout(timer); script.remove(); resolve(data); } };
        script.onerror = () => { if(!done){ done=true; clearTimeout(timer); script.remove(); reject(new Error("Network Error")); } };
        script.src = url.toString(); document.body.appendChild(script);
      });
    }

    // --- 載入進度與獎勵畫面 (100% 前端渲染，絕不白屏) ---
    async function loadApiData(mode, rewardId = '') {
      showLoader("正在同步資料庫...");
      stopScanner();
      try {
        const data = await jsonpApi(mode === 'redeem' ? 'api_redeem' : 'api_get_data', { reward_id: rewardId });
        if (!data.success && mode === 'api_redeem') throw new Error(data.message);
        
        let html = '';
        if (mode === 'query' || mode === 'redeem') {
          const m = data.summary;
          const bonusHtml = m.bonusList.length > 0 ? '<div class="badge-grid">' + m.bonusList.map(b => `<div class="badge-card"><div style="font-size:30px;">🎖️</div><div style="font-size:14px; font-weight:800; color:#fff; margin:5px 0;">${escapeHtml(b.bonusName)}</div><div style="font-size:12px; color:#d4a373; font-weight:700; background:#0c140e; display:inline-block; padding:4px 12px; border-radius:12px;">+${b.bonusPoints} 點</div></div>`).join('') + '</div>' : '<div class="notice">尚未解鎖任何成就，繼續掃描解鎖吧！</div>';
          const historyHtml = m.history.length > 0 ? '<div class="history-list">' + m.history.map(h => `<div class="history-item"><div style="display:flex; flex-direction:column; gap:4px;"><span style="font-size:15px; font-weight:700; color:#fff;">${escapeHtml(h.name)}</span><span style="font-size:12px; color:#8fa896;">${h.time}</span></div><div style="font-size:18px; font-weight:900; color:${h.points.includes('+') ? '#85c296' : '#e68a88'};">${h.points}</div></div>`).join('') + '</div>' : '<div class="notice">目前還沒有點數紀錄喔！</div>';
          
          let alertHtml = mode === 'redeem' ? `<div class="solid-card"><div class="section-title" style="color:#d4a373;">Success</div><h2 style="color:#d4edda;">兌換成功</h2><p>${escapeHtml(data.message)}</p></div>` : '';

          html = `${alertHtml}<div class="solid-card"><div class="section-title">Progress</div><h2>我的探索紀錄</h2><p style="margin-bottom:12px; color:#000; font-weight:800; background:#fff; display:inline-block; padding:6px 16px; border-radius:20px;">📱 手機：${currentPhone}</p><p style="margin-bottom:8px;">已蒐集植物：${m.collectedPlants} 種</p><p style="margin-bottom:0;">探索總章數：${m.totalStamps}</p><div class="points">${m.totalPoints}</div><p>目前可用點數</p></div><div class="solid-card"><div class="section-title">Achievements</div><h3>🌟 成就徽章</h3>${bonusHtml}</div><div class="solid-card"><div class="section-title">History</div><h3>📝 點數明細</h3>${historyHtml}</div><div class="solid-card"><button class="btn primary" onclick="loadApiData('rewards')">🎁 前往探索獎勵</button><button class="btn secondary" onclick="switchView('scan')">🔍 繼續探索植物</button><a class="btn secondary" href="index.html">🏠 返回展區首頁</a></div>`;
        } 
        else if (mode === 'rewards') {
          const pts = data.summary.totalPoints;
          const rewardHtml = data.rewards.map(r => { const can = pts >= r.requiredPoints; return `<div class="solid-card"><h3>${escapeHtml(r.rewardName)}</h3><p>${escapeHtml(r.rewardDesc)}</p><p style="color:#d4a373; font-weight:bold;">需要點數：${r.requiredPoints}</p><button class="btn ${can?'accent':'secondary'}" onclick="${can ? `loadApiData('redeem', '${r.rewardId}')` : ''}">${can?'我要兌換':'點數不足'}</button></div>`; }).join('');
          html = `<div class="solid-card"><div class="section-title">Rewards</div><h2>植物探索獎勵</h2><div class="points">${pts}</div><p>目前可用點數</p></div>${rewardHtml || '<div class="solid-card">目前沒有可兌換獎勵</div>'}<div class="solid-card"><button class="btn primary" onclick="switchView('scan')">🔍 繼續探索植物</button><button class="btn secondary" onclick="loadApiData('query')">🏆 返回探索進度</button><a class="btn secondary" href="index.html">🏠 返回展區首頁</a></div>`;
        }

        document.getElementById('api-content').innerHTML = html;
        hideLoader(); switchView('api');
      } catch (err) {
        hideLoader(); alert("讀取失敗：" + err.message);
      }
    }

    // --- 相機掃描 ---
    async function startScanner() {
      const statusEl = document.getElementById("scan-status");
      try {
        statusEl.innerHTML = "啟動中... <span style='font-size:12px;'>(若跳出提示請點允許)</span>";
        statusEl.style.background = "#2a3d2e";
        
        const cameras = await Html5Qrcode.getCameras();
        const rearCamera = cameras.find(c => /back|rear|environment|後/i.test(c.label || "")) || cameras[0];
        
        document.getElementById("reader").style.display = "block";
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(rearCamera.id, { fps: 5, qrbox: { width: 250, height: 250 }, aspectRatio: 1.333 }, handleScanResult, () => {});
        
        document.getElementById("startBtn").style.display = "none"; document.getElementById("stopBtn").style.display = "block";
        statusEl.innerHTML = "✅ 相機已啟動，請掃描 QR Code。"; statusEl.style.background = "#4a7c59";
      } catch (err) {
        document.getElementById("reader").style.display = "none";
        statusEl.innerHTML = "<b>無法啟動相機</b><br>請確認瀏覽器已允許相機權限。"; statusEl.style.background = "#8b2a2a";
      }
    }

    async function stopScanner() {
      if (html5QrCode) { try { await html5QrCode.stop(); await html5QrCode.clear(); } catch(e){} html5QrCode = null; }
      document.getElementById("reader").style.display = "none";
      document.getElementById("startBtn").style.display = "block"; document.getElementById("stopBtn").style.display = "none";
      document.getElementById("scan-status").innerHTML = "相機已待命，請點擊下方按鈕啟動。"; document.getElementById("scan-status").style.background = "#e8f0e8";
    }

    async function handleScanResult(rawUrl) {
      let urlObj, mode, plantId, spotId, picNum;
      try { urlObj = new URL(rawUrl.trim()); mode = urlObj.searchParams.get("mode"); plantId = urlObj.searchParams.get("plant"); spotId = urlObj.searchParams.get("spot"); picNum = urlObj.searchParams.get("pic"); } catch (err) { return; }

      if (mode === "ar" && picNum) { if (navigator.vibrate) navigator.vibrate(100); await stopScanner(); openAr(picNum); return; }
      if (mode !== "plant_go" && mode !== "stamp") return;

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      await stopScanner();
      
      showLoader("正在處理點數...<br><span style='font-size:14px;color:#aaa;'>(請稍候約 2 秒)</span>");
      
      try {
        let resp = await jsonpApi(mode === 'plant_go' ? 'plant_mark_jsonp' : 'spot_mark_jsonp', mode === 'plant_go' ? {plant: plantId} : {spot: spotId});
        hideLoader();

        const statusEl = document.getElementById("scan-status");
        if (mode === "plant_go") {
          statusEl.innerHTML = `🎉 <b>${resp.message || "已完成記點"}</b>`;
          statusEl.style.background = "#d4edda";
          window.open(resp.redirectUrl || COLLECTION_URL, '_blank'); 
          document.getElementById("startBtn").style.display = "block";
        } else {
          statusEl.innerHTML = `✅ <b>${resp.message || "展區打卡成功"}</b>`;
          statusEl.style.background = "#d4edda";
          document.getElementById("startBtn").style.display = "block";
        }
      } catch (err) {
        hideLoader();
        document.getElementById("scan-status").innerHTML = "<b>網路連線失敗</b>，請重新掃描。";
        document.getElementById("scan-status").style.background = "#f8d7da";
        document.getElementById("startBtn").style.display = "block";
      }
    }

    // --- AR 拍立得 ---
    async function openAr(picNum) {
      document.getElementById('ar-container').style.display = 'flex';
      document.getElementById('ar-overlay').src = `./ar_${picNum}.png`;
      const video = document.getElementById('ar-video');
      try {
        arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCam ? "user" : "environment", width: {ideal:1280}, height: {ideal:720} } });
        video.srcObject = arStream;
        video.style.transform = useFrontCam ? "scaleX(-1)" : "scaleX(1)";
        await video.play();
        document.getElementById('ar-overlay').style.display = 'block';
        document.getElementById('ar-controls').style.display = 'flex';
      } catch (err) { alert("無法開啟相機進行拍攝！"); closeAr(); }
    }
    function switchArCam() { useFrontCam = !useFrontCam; if (arStream) { arStream.getTracks().forEach(t => t.stop()); } openAr(document.getElementById('ar-overlay').src.match(/ar_(\d+)/)[1]); }
    function closeAr() { if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; } document.getElementById('ar-container').style.display = 'none'; document.getElementById('ar-overlay').style.display = 'none'; document.getElementById('ar-controls').style.display = 'none'; document.getElementById('ar-result-screen').style.display = 'none'; switchView('scan'); }
    function captureArPhoto() {
      const video = document.getElementById('ar-video'); const canvas = document.getElementById('ar-canvas'); const ctx = canvas.getContext('2d'); const overlay = document.getElementById('ar-overlay');
      canvas.width = video.offsetWidth; canvas.height = video.offsetHeight;
      function drawCover(source) { const sw = source.videoWidth||source.naturalWidth; const sh = source.videoHeight||source.naturalHeight; if(!sw) return; const sRatio = sw / sh; const cRatio = canvas.width / canvas.height; let dw, dh, sx, sy; if (sRatio > cRatio) { dh = canvas.height; dw = sw * (canvas.height / sh); sx = (canvas.width - dw) / 2; sy = 0; } else { dw = canvas.width; dh = sh * (canvas.width / sw); sx = 0; sy = (canvas.height - dh) / 2; } ctx.save(); if (useFrontCam && source === video) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); } ctx.drawImage(source, sx, sy, dw, dh); ctx.restore(); }
      drawCover(video); drawCover(overlay);
      document.getElementById('result-image').src = canvas.toDataURL('image/png', 0.9);
      document.getElementById('ar-controls').style.display = 'none'; document.getElementById('ar-result-screen').style.display = 'flex';
    }
    function retakeArPhoto() { document.getElementById('ar-result-screen').style.display = 'none'; document.getElementById('ar-controls').style.display = 'flex'; }
  </script>
</body>
</html>
