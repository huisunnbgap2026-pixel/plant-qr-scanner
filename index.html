<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方舟植物展覽</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    html,body{
      margin:0;
      padding:0;
      min-height:100vh;
      background:#edf5ec;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      color:#27352a;
    }
    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .box{
      width:min(92vw,460px);
      background:#fffef9;
      border:2px solid #d6e3d3;
      border-radius:18px;
      padding:22px 18px;
      text-align:center;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
    }
    h1{
      margin:0 0 12px;
      font-size:24px;
      color:#27352a;
    }
    p{
      margin:0 0 14px;
      font-size:16px;
      line-height:1.8;
      color:#627063;
    }
    a.btn{
      width:100%;
      box-sizing:border-box;
      border-radius:14px;
      padding:14px 12px;
      font-size:17px;
      margin-top:12px;
      text-decoration:none;
      display:block;
      text-align:center;
      background:linear-gradient(135deg,#55795c,#3f5d45);
      color:#fff;
      font-weight:700;
    }
    img{
      width:min(72vw,220px);
      max-width:220px;
      height:auto;
      display:block;
      margin:0 auto 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="box">
      <img src="./logo.png" alt="方舟植物展覽 logo">
      <h1>方舟植物展覽</h1>
      <p id="status">正在前往展覽首頁…</p>
      <a class="btn" id="goBtn" href="#">手動前往首頁</a>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function (key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    const statusEl = document.getElementById("status");
    const goBtn = document.getElementById("goBtn");

    const phoneFromUrl = normalizePhone(getParam("phone"));
    const savedPhone = normalizePhone(localStorage.getItem("savedPhone") || "");
    const finalPhone = phoneFromUrl || savedPhone;

    const target = buildUrl(APP_URL, finalPhone ? { mode: "home", phone: finalPhone } : { mode: "home" });

    goBtn.href = target;

    if (finalPhone) {
      try { localStorage.setItem("savedPhone", finalPhone); } catch (e) {}
    }

    statusEl.textContent = "正在前往展覽首頁…";

    setTimeout(function () {
      window.location.replace(target);
    }, 250);
  </script>
</body>
</html>
