<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <title>方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root { --primary: #4a7c59; --primary-dark: #2c4c3b; --solid-bg: #162419; --solid-border: #2a3d2e; --accent: #d4a373; }
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #fff; background-color: #111a13; overflow: hidden; }
    
    /* ★ 雙背景預載 */
    .bg-layer { position: fixed; inset: 0; width: 100vw; height: 100vh; background-size: cover; background-position: center; z-index: -1; transition: opacity 0.5s ease; opacity: 0; }
    #bg-misty { background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1080&auto=format&fit=crop'); }
    #bg-fern { background-image: url('https://images.unsplash.com/photo-1595180473268-2ddcc696e57a?q=80&w=1080&auto=format&fit=crop'); }

    .view { display: none; position: absolute; inset: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; overflow-y: auto; padding: 24px 16px 40px; }
    .view.active { display: flex; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    .wrap { width: 100%; max-width: 450px; z-index: 10; margin: auto; }
    .card { background: rgba(22, 36, 25, 0.95); border-radius: 28px; padding: 30px 25px; margin-bottom: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--solid-border); text-align: center; }
    .section-title { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: #8fa896; margin-bottom: 10px; font-weight: 800; }
    h1 { margin: 0 0 10px; font-size: 28px; font-weight: 900; letter-spacing: 2px; }
    p { margin: 0 0 20px; font-size: 16px; line-height: 1.6; color: #a3b8a8; }
    
    input[type="tel"] { width: 100%; box-sizing: border-box; padding: 18px; font-size: 22px; text-align: center; letter-spacing: 3px; border: 2px solid var(--solid-border); border-radius: 18px; margin-bottom: 20px; background: #0c140e; color: #fff; font-weight: bold; outline: none; }
    input[type="tel"]:focus { border-color: var(--primary); background: #111a13; }
    
    button.btn, a.btn { width: 100%; display: block; box-sizing: border-box; border-radius: 18px; padding: 16px 12px; font-size: 18px; font-weight: 700; text-decoration: none; border: 0; text-align: center; cursor: pointer; transition: 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; margin-bottom: 12px; }
    button.btn:active, a.btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); color: #fff; box-shadow: 0 8px 20px rgba(44, 76, 59, 0.4); }
    .btn-secondary { background: #233326; color: #fff; border: 1px solid var(--solid-border); }
    .btn-accent { background: linear-gradient(135deg, #d4a373, #a67c52); color: #fff; box-shadow: 0 8px 20px rgba(166, 124, 82, 0.4); }

    .collab-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; }
    .collab-logo { width: 140px; object-fit: contain; }
    .anim-item { opacity: 0; transform: translateY(20px); animation: fadeUp 1.5s forwards ease-out; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    #reader { width: 100%; min-height: 280px; border-radius: 16px; overflow: hidden; border: 2px dashed #ccc; display: none; background: #000; }
    .status-box { margin-top: 15px; padding: 15px; border-radius: 14px; background: #e8f0e8; color: var(--primary-dark); font-weight: 700; line-height: 1.5; font-size: 15px; }

    #ar-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
    #ar-overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; display: none; }
    #ar-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 10; display: none; }
    .btn-capture { background: var(--accent); color: white; width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .btn-close-ar { position: absolute; top: 30px; right: 20px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; z-index: 15; font-weight: bold; cursor: pointer;}
    
    #ar-result { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    #ar-result img { width: 100%; max-width: 400px; max-height: 65vh; object-fit: contain; border-radius: 10px; margin-bottom: 20px; }
    
    #global-loader { display: none; position: fixed; inset: 0; background: rgba(17, 26, 19, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4a7c59; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 雙背景切換 -->
  <div id="bg-misty" class="bg-layer"></div>
  <div id="bg-fern" class="bg-layer"></div>

  <div id="global-loader"><div class="spinner"></div><h3 id="loader-text">系統處理中...</h3></div>

  <!-- 視圖 1：開場動畫 -->
  <div id="view-splash" class="view">
    <div class="wrap" style="text-align:center;">
      <div class="collab-container">
        <img src="./logo_ark.png" class="collab-logo anim-item" style="animation-delay:0.2s">
        <span class="cross-mark anim-item" style="animation-delay:0.8s">✖</span>
        <img src="./logo_huisun.png" class="collab-logo anim-item" style="animation-delay:1.4s">
      </div>
      <h1 class="anim-item" style="animation-delay:2.2s; font-size:40px; letter-spacing:5px;">方舟計畫展覽</h1>
    </div>
  </div>

  <!-- 視圖 2：登入 -->
  <div id="view-login" class="view">
    <div class="wrap card">
      <h1>🌿 專屬通行證</h1>
      <p>請輸入手機號碼，開啟您的探索之旅。</p>
      <input id="phoneInput" type="tel" placeholder="09XXXXXXXX" maxlength="10" autocomplete="off">
      <button class="btn btn-primary" onclick="login()">登入展覽</button>
    </div>
  </div>

  <!-- 視圖 3：主選單 -->
  <div id="view-home" class="view">
    <div class="wrap card">
      <h1 style="font-size: 22px;">歡迎，<span id="displayPhone"></span></h1>
      <p style="margin-bottom: 25px;">請選擇您要進行的動作</p>
      <button class="btn btn-primary" onclick="switchView('scan')">🔍 進入展區掃描站</button>
      <button class="btn btn-secondary" onclick="openGasPage('query')">🏆 查看探索進度</button>
      <button class="btn btn-secondary" onclick="openGasPage('rewards')">🎁 兌換展覽獎勵</button>
      <button class="btn" style="background:transparent; color:#6d8c75; margin-top:15px;" onclick="logout()">登出切換帳號</button>
    </div>
  </div>

  <!-- 視圖 4：掃描站 -->
  <div id="view-scan" class="view">
    <div class="wrap card">
      <div class="section-title">SCANNER</div>
      <h2>展區掃描器</h2>
      <p style="font-size:14px; margin-bottom:15px;">請將相機對準植物旁的 QR Code。</p>
      
      <div id="reader"></div>
      
      <!-- ★ 保留最原始乾淨的狀態 -->
      <div id="scan-status" class="status-box">相機已就緒，請點擊下方按鈕啟動。</div>

      <div style="margin-top:20px;">
        <button class="btn btn-primary" id="btn-start-scan" onclick="startScanner()">📷 點擊啟動相機</button>
        <button class="btn btn-secondary" id="btn-stop-scan" style="display:none;" onclick="stopScanner()">暫停掃描</button>
        <button class="btn btn-secondary" onclick="stopScanner(); switchView('home');">🏠 返回主選單</button>
      </div>
    </div>
  </div>

  <!-- 視圖 5：GAS 動態內容容器 -->
  <div id="view-gas" class="view">
    <div id="gas-content" style="width:100%;"></div>
  </div>

  <!-- 視圖 6：AR 拍立得 -->
  <div id="view-ar" class="view" style="padding:0; background:#000;">
    <button class="btn-close-ar" onclick="closeArCamera()">✖ 結束拍攝</button>
    <video id="ar-video" autoplay playsinline></video>
    <img id="ar-overlay" src="" crossorigin="anonymous">
    <div id="ar-controls" class="controls">
      <button class="btn-capture" onclick="captureArPhoto()">📸</button>
    </div>
  </div>
  <div id="ar-result">
    <div style="color:#fff; font-weight:bold; margin-bottom:15px;">✨ 拍照成功！長按圖片儲存 ✨</div>
    <img id="result-image" src="">
    <div style="width:100%; max-width:300px;">
      <button class="btn btn-secondary" onclick="retakeArPhoto()">🔄 重拍</button>
      <button class="btn btn-primary" onclick="closeArCamera()">🏠 完成並返回掃描</button>
    </div>
  </div>
  <canvas id="ar-canvas" style="display:none;"></canvas>

  <script>
    // ⚠️ 填入你的 Google Apps Script 網址
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const COLLECTION_URL = "https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F";

    let currentPhone = sessionStorage.getItem("savedPhone") || "";
    let html5QrCode = null;
    let arStream = null;

    function setBackground(type) {
      document.getElementById('bg-misty').style.opacity = type === 'misty' ? '1' : '0';
      document.getElementById('bg-fern').style.opacity = type === 'fern' ? '1' : '0';
    }

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      window.scrollTo(0,0);
      if (viewId === 'login' || viewId === 'home' || viewId === 'splash') setBackground('misty');
      else if (viewId === 'scan') setBackground('fern');
    }

    window.onload = () => {
      const hasPlayed = sessionStorage.getItem("splashPlayed") === "true";
      if (!hasPlayed) {
        setBackground('misty');
        switchView('splash');
        sessionStorage.setItem("splashPlayed", "true");
        setTimeout(() => {
          if (currentPhone) initHome(); else switchView('login');
        }, 4000);
      } else {
        if (currentPhone) initHome(); else switchView('login');
      }
    };

    // ★ 取消靜默啟動相機機制，只要回到這頁，一定是要求手動開啟！
    window.addEventListener("pageshow", function(e) {
      hideLoader();
      if (currentPhone) {
        stopScanner();
        switchView('scan');
      }
    });

    function login() {
      let p = document.getElementById('phoneInput').value.replace(/\D/g, "");
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      if (/^09\d{8}$/.test(p)) {
        currentPhone = p;
        sessionStorage.setItem("savedPhone", currentPhone);
        initHome();
      } else { alert("格式錯誤，請輸入 09 開頭十碼數字！"); }
    }

    function logout() {
      currentPhone = ""; sessionStorage.removeItem("savedPhone");
      document.getElementById('phoneInput').value = "";
      switchView('login');
    }

    function initHome() {
      document.getElementById('displayPhone').innerText = currentPhone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
      switchView('home');
    }

    function openGasPage(mode) {
      showLoader("正在前往系統...");
      setTimeout(() => {
        window.location.href = `${APP_URL}?mode=${mode}&phone=${currentPhone}`;
      }, 50);
    }

    function showLoader(text) {
      document.getElementById('loader-text').innerHTML = text;
      document.getElementById('global-loader').style.display = 'flex';
    }
    function hideLoader() { document.getElementById('global-loader').style.display = 'none'; }

    // --- GAS 單頁抽換機制 ---
    function fetchGasData(mode, rewardId = '') {
      showLoader("正在載入系統資料...");
      stopScanner(); 
      const cbName = "gasCb_" + Date.now();
      const url = `${APP_URL}?mode=spa_html&page=${mode}&phone=${currentPhone}&reward_id=${rewardId}&callback=${cbName}`;
      const script = document.createElement("script");
      window[cbName] = (html) => {
        delete window[cbName]; script.remove();
        document.getElementById('gas-content').innerHTML = html;
        switchView('gas');
        hideLoader();
      };
      script.onerror = () => { hideLoader(); alert('載入失敗，請檢查網路'); };
      script.src = url; document.body.appendChild(script);
    }

    async function startScanner() {
      const statusEl = document.getElementById("scan-status");
      const startBtn = document.getElementById("btn-start-scan");
      const stopBtn = document.getElementById("btn-stop-scan");
      
      try {
        statusEl.innerHTML = "啟動中... <span style='font-size:12px;'>(若跳出提示請點允許)</span>";
        statusEl.style.background = "#e8f0e8";
        
        const cameras = await Html5Qrcode.getCameras();
        const rearCamera = cameras.find(c => /back|rear|environment|後/i.test(c.label || "")) || cameras[0];
        
        document.getElementById("reader").style.display = "block";
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(rearCamera.id, { fps: 5, qrbox: { width: 250, height: 250 }, aspectRatio: 1.333 }, handleScan);
        
        startBtn.style.display = "none";
        stopBtn.style.display = "block";
        statusEl.innerHTML = "✅ 相機已啟動，請掃描 QR Code。";
      } catch (err) {
        document.getElementById("reader").style.display = "none";
        statusEl.innerHTML = "<b>無法啟動相機</b><br>請確認瀏覽器已允許相機權限。";
        statusEl.style.background = "#f8d7da";
      }
    }

    // ★ 把畫面恢復成最原始未啟動的狀態
    async function stopScanner() {
      if (html5QrCode) {
        try { await html5QrCode.stop(); await html5QrCode.clear(); } catch(e){}
        html5QrCode = null;
      }
      document.getElementById("reader").style.display = "none";
      document.getElementById("btn-start-scan").style.display = "block";
      document.getElementById("btn-stop-scan").style.display = "none";
      
      document.getElementById("scan-status").innerHTML = "相機已待命，請點擊下方按鈕啟動。";
      document.getElementById("scan-status").style.background = "#e8f0e8";
    }

    async function handleScan(rawUrl) {
      let urlObj, mode, picNum;
      try { 
        urlObj = new URL(rawUrl.trim()); 
        mode = urlObj.searchParams.get("mode"); 
        picNum = urlObj.searchParams.get("pic");
      } catch (err) { return; }

      if (mode === "ar" && picNum) {
        if (navigator.vibrate) navigator.vibrate(100);
        await stopScanner();
        openArCamera(picNum);
        return;
      }

      if (mode !== "plant_go" && mode !== "stamp") return;

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      await stopScanner();
      
      showLoader("正在存入點數...<br><span style='font-size:14px;color:#aaa;'>(請稍候約 2 秒)</span>");
      
      try {
        if (mode === "plant_go") {
          const plantId = urlObj.searchParams.get("plant");
          let resp = await jsonpCall(plantId, currentPhone);
          const target = resp.redirectUrl || COLLECTION_URL;
          
          document.getElementById("scan-status").innerHTML = `🎉 <b>${resp.message || "已完成記點"}</b>`;
          document.getElementById("scan-status").style.background = "#d4edda";
          
          hideLoader();
          // 開新分頁看介紹，這樣返回時本頁不會刷新，不會再次報錯
          window.open(target, '_blank'); 
          document.getElementById("btn-start-scan").style.display = "block";

        } else if (mode === "stamp") {
          urlObj.searchParams.set("phone", currentPhone);
          window.location.href = urlObj.toString();
        }
      } catch (err) {
        hideLoader();
        document.getElementById("scan-status").innerHTML = "<b>網路連線失敗</b>，請重新掃描。";
        document.getElementById("scan-status").style.background = "#f8d7da";
      }
    }

    function jsonpCall(plant, phone) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now();
        const url = `${APP_URL}?mode=plant_mark_jsonp&plant=${plant}&phone=${phone}&callback=${cb}`;
        const script = document.createElement("script");
        let done = false;
        const timer = setTimeout(() => { if(!done){ done=true; reject(new Error("Timeout")); } }, 10000);
        window[cb] = (data) => { if(!done){ done=true; clearTimeout(timer); resolve(data); } };
        script.onerror = () => { if(!done){ done=true; clearTimeout(timer); reject(new Error("Error")); } };
        script.src = url; document.body.appendChild(script);
      });
    }

    async function openArCamera(picNum) {
      document.getElementById('ar-overlay').src = `./ar_${picNum}.png`;
      switchView('ar');
      
      const video = document.getElementById('ar-video');
      try {
        arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal:1280}, height: {ideal:720} } });
        video.srcObject = arStream;
        video.style.display = 'block';
        document.getElementById('ar-overlay').style.display = 'block';
        document.getElementById('ar-controls').style.display = 'flex';
      } catch (err) {
        alert("無法開啟相機進行拍攝！");
        closeArCamera();
      }
    }

    function closeArCamera() {
      if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
      document.getElementById('ar-video').style.display = 'none';
      document.getElementById('ar-overlay').style.display = 'none';
      document.getElementById('ar-controls').style.display = 'none';
      document.getElementById('ar-result').style.display = 'none';
      switchView('scan'); 
    }

    function captureArPhoto() {
      const video = document.getElementById('ar-video');
      const canvas = document.getElementById('ar-canvas');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('ar-overlay');
      
      canvas.width = video.offsetWidth; canvas.height = video.offsetHeight;
      
      function drawCover(source) {
        const sRatio = (source.videoWidth||source.naturalWidth) / (source.videoHeight||source.naturalHeight);
        const cRatio = canvas.width / canvas.height;
        let dw, dh, sx, sy;
        if (sRatio > cRatio) { dh = canvas.height; dw = (source.videoWidth||source.naturalWidth) * (canvas.height / (source.videoHeight||source.naturalHeight)); sx = (canvas.width - dw) / 2; sy = 0; } 
        else { dw = canvas.width; dh = (source.videoHeight||source.naturalHeight) * (canvas.width / (source.videoWidth||source.naturalWidth)); sx = 0; sy = (canvas.height - dh) / 2; }
        ctx.drawImage(source, sx, sy, dw, dh);
      }

      drawCover(video);
      drawCover(overlay);

      document.getElementById('result-image').src = canvas.toDataURL('image/png', 0.9);
      document.getElementById('ar-controls').style.display = 'none';
      document.getElementById('ar-result').style.display = 'flex';
    }

    function retakeArPhoto() {
      document.getElementById('ar-result').style.display = 'none';
      document.getElementById('ar-controls').style.display = 'flex';
    }
  </script>
</body>
</html>
