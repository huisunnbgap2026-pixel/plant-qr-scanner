<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root{
      --bg1:#f7f4ea;
      --bg2:#eef3e8;
      --card:#ffffff;
      --text:#203024;
      --muted:#5f6f62;
      --primary:#3f6e49;
      --primary-dark:#2f5838;
      --soft:#e8f0e4;
      --border:#cfdccc;
      --shadow:0 8px 20px rgba(40,60,40,.08);
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      padding:20px 14px 36px;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(168,196,140,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122,160,110,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      font-size:18px;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
    }

    .hero{
      margin-bottom:18px;
      padding:26px 24px 22px;
      border-radius:24px;
      background:linear-gradient(135deg, rgba(79,122,87,.97), rgba(121,158,106,.93));
      color:#fff;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero:before,
    .hero:after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,.08);
    }

    .hero:before{
      width:170px;
      height:170px;
      top:-50px;
      right:-30px;
    }

    .hero:after{
      width:100px;
      height:100px;
      bottom:-20px;
      left:-10px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.25;
      position:relative;
      z-index:1;
    }

    .hero p{
      margin:0;
      font-size:18px;
      line-height:1.9;
      color:rgba(255,255,255,.96);
      position:relative;
      z-index:1;
    }

    .card{
      background:var(--card);
      border:2px solid var(--border);
      border-radius:22px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .section-title{
      font-size:14px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    h2{
      margin:0 0 12px;
      font-size:28px;
      line-height:1.35;
    }

    p{
      margin:0 0 14px;
      line-height:1.9;
      color:var(--muted);
      font-size:18px;
    }

    .lead{
      font-size:19px;
      color:var(--text);
    }

    .feature{
      border:2px solid #d7e3d3;
      background:#f6faf3;
      border-radius:18px;
      padding:18px;
    }

    .feature p{
      margin-bottom:0;
      font-size:18px;
      color:var(--text);
    }

    #reader{
      width:100%;
      max-width:560px;
      margin:0 auto;
      overflow:hidden;
      border-radius:18px;
    }

    button, a.btn{
      width:100%;
      display:block;
      box-sizing:border-box;
      border-radius:18px;
      padding:18px 16px;
      font-size:20px;
      margin-top:14px;
      text-decoration:none;
      border:0;
      text-align:center;
    }

    button.primary, a.btn.primary{
      background:linear-gradient(135deg, var(--primary), var(--primary-dark));
      color:#fff;
      box-shadow:0 6px 16px rgba(63,110,73,.18);
      cursor:pointer;
      font-weight:700;
    }

    button.secondary, a.btn.secondary{
      background:var(--soft);
      color:var(--text);
      border:2px solid #d7e3d3;
      font-weight:700;
    }

    #stopBtn{
      display:none;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:8px;
    }

    @media (max-width:700px){
      body{ padding:16px 12px 28px; }
      .hero{ padding:22px 18px 18px; border-radius:20px; }
      .hero h1{ font-size:28px; }
      .hero p{ font-size:17px; }
      .card{ padding:18px; border-radius:18px; }
      h2{ font-size:24px; }
      p{ font-size:17px; }
      button, a.btn{ font-size:19px; padding:17px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>QR 探索掃描站</h1>
      <p>請使用後置鏡頭掃描植物牌或展區任務點。掃描成功後，系統會自動帶你前往對應的植物介紹或探索內容。</p>
    </div>

    <div class="card">
      <div class="section-title">Scanner</div>
      <h2>開始掃描探索標記</h2>
      <p class="lead" id="status">按下下方按鈕後，系統會優先開啟後置鏡頭。</p>

      <button id="startBtn" class="primary">啟動後置鏡頭</button>
      <button id="stopBtn" class="secondary">停止掃描</button>

      <div id="reader" style="margin-top:18px;"></div>

      <div class="feature" style="margin-top:16px;">
        <p>若無法開啟鏡頭，請改用 Safari 或 Chrome，並確認網站已允許相機權限。</p>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Navigation</div>
      <h2>探索捷徑</h2>
      <div class="grid">
        <a id="scanAgainBtn" class="btn primary" href="#" target="_top">繼續探索植物</a>
        <a id="homeBtn" class="btn secondary" href="#" target="_top">返回展區首頁</a>
        <a id="queryBtn" class="btn secondary" href="#" target="_top">查看探索進度</a>
        <a id="rewardBtn" class="btn secondary" href="#" target="_top">查看探索獎勵</a>
        <a id="collectionBtn" class="btn secondary" href="https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F" target="_top">瀏覽目前館藏</a>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/index.html";

    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    const scanAgainBtn = document.getElementById("scanAgainBtn");
    const homeBtn = document.getElementById("homeBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function getUrlPhone() {
      const params = new URLSearchParams(window.location.search);
      return normalizePhone(params.get("phone") || "");
    }

    function getCurrentPhone() {
      const urlPhone = getUrlPhone();
      if (urlPhone) return urlPhone;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function syncPhoneFromUrl() {
      const urlPhone = getUrlPhone();
      if (urlPhone) {
        localStorage.setItem("savedPhone", urlPhone);
      }
    }

    function setNavLinks() {
      const phone = getCurrentPhone();
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, {
        phone: phone,
        home: homeUrl
      });

      scanAgainBtn.href = scanUrl;
      homeBtn.href = homeUrl;
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
    }

    async function handlePlantGoViaApi(urlObj, phone) {
      const plantId = (urlObj.searchParams.get("plant") || "").trim();
      if (!plantId) {
        window.top.location.href = urlObj.toString();
        return;
      }

      const apiUrl = buildUrl(APP_URL, {
        mode: "plant_go_api",
        plant: plantId,
        phone: phone
      });

      statusEl.textContent = "已掃描成功，正在記錄植物探索…";

      const res = await fetch(apiUrl, { method: "GET" });
      const data = await res.json();

      if (!data || !data.pageUrl) {
        throw new Error((data && data.message) || "植物探索記錄失敗");
      }

      statusEl.textContent = "探索紀錄完成，正在前往植物介紹頁…";
      window.top.location.href = data.pageUrl;
    }

    async function onScanSuccess(decodedText) {
      if (scannerRunning && html5QrCode) {
        html5QrCode.stop().catch(() => {});
        scannerRunning = false;
      }

      const phone = getCurrentPhone();
      if (!phone) {
        statusEl.textContent = "找不到手機號碼，請先回首頁登入。";
        return;
      }

      try {
        const url = new URL(decodedText);
        const isAppsScriptTarget =
          url.origin === "https://script.google.com" &&
          url.pathname.indexOf("/macros/s/") !== -1;

        if (!isAppsScriptTarget) {
          statusEl.textContent = "已掃描成功，正在開啟內容…";
          window.top.location.href = decodedText;
          return;
        }

        const mode = (url.searchParams.get("mode") || "").trim().toLowerCase();

        if (mode === "plant_go") {
          try {
            await handlePlantGoViaApi(url, phone);
            return;
          } catch (err) {
            url.searchParams.set("phone", phone);
            statusEl.textContent = "正在切換備援模式開啟植物頁…";
            window.top.location.href = url.toString();
            return;
          }
        }

        if ((mode === "stamp" || mode === "home" || mode === "query" || mode === "rewards") &&
            !normalizePhone(url.searchParams.get("phone") || "")) {
          url.searchParams.set("phone", phone);
        }

        statusEl.textContent = "已掃描成功，正在開啟內容…";
        window.top.location.href = url.toString();
      } catch (e) {
        statusEl.textContent = "已掃描成功，正在開啟內容…";
        window.top.location.href = decodedText;
      }
    }

    async function startScanner() {
      if (scannerRunning) return;

      statusEl.textContent = "正在啟動後置鏡頭…";
      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess
        );

        scannerRunning = true;
        startBtn.style.display = "none";
        stopBtn.style.display = "block";
        statusEl.textContent = "後置鏡頭已啟動，請將 QR code 對準框內。";
        return;
      } catch (err1) {
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
          );

          scannerRunning = true;
          startBtn.style.display = "none";
          stopBtn.style.display = "block";
          statusEl.textContent = "鏡頭已啟動，請將 QR code 對準框內。";
          return;
        } catch (err2) {
          statusEl.textContent = "無法開啟後置鏡頭，請確認相機權限是否允許，或改用 Safari / Chrome。";
        }
      }
    }

    async function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;

      try {
        await html5QrCode.stop();
      } catch (e) {}

      scannerRunning = false;
      stopBtn.style.display = "none";
      startBtn.style.display = "block";
      statusEl.textContent = "已停止掃描。";
    }

    syncPhoneFromUrl();
    setNavLinks();

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);
  </script>
</body>
</html>
