<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <title>方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('phone')) {
        sessionStorage.setItem('savedPhone', urlParams.get('phone'));
        sessionStorage.setItem('splashPlayed', 'true');
        window.history.replaceState({}, document.title, window.location.pathname);
      }
      if (urlParams.get('action') === 'logout') {
        sessionStorage.removeItem("savedPhone");
        sessionStorage.setItem("splashPlayed", "true");
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>
  <style>
    :root { --primary: #4a7c59; --solid-bg: #162419; --solid-border: #2a3d2e; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: "Noto Sans TC", sans-serif; color: #fff; overflow: hidden; background-color: #111a13; touch-action: manipulation; -webkit-text-size-adjust: 100%; text-size-adjust: 100%;}
    
    .bg-fixed { 
      position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; 
      background: url('https://raw.githubusercontent.com/huisunnbgap2026-pixel/plant-qr-scanner/main/bg_misty.jpg') center/cover no-repeat; 
      z-index: -1; 
    }

    .screen { display: none; position: absolute; inset: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 24px; box-sizing: border-box; z-index: 10; }
    .screen.active { display: flex; z-index: 20; animation: fadeIn 0.5s forwards; }

    #splash-screen { background: rgba(17, 26, 19, 0.85); }
    /* ★ 改成強制絕對網址，保證圖片 100% 出現 */
    .collab-container { display: flex; align-items: center; justify-content: center; gap: 4vw; margin-bottom: 40px; width: 100%; max-width: 350px; margin: 0 auto 40px;}
    .collab-logo { width: 30%; max-width: 100px; height: auto; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
    .cross-mark { font-size: clamp(16px, 4vw, 24px); color: rgba(255,255,255,0.6); }
    .title-large { font-size: clamp(28px, 8vw, 42px); font-weight: 900; letter-spacing: 4px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin: 0; text-align: center; width: 100%;}
    
    .anim-item { opacity: 0; transform: translateY(25px); animation: fadeUp 2s forwards ease-out; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .item-1 { animation-delay: 0.6s; } .item-2 { animation-delay: 1.6s; } .item-3 { animation-delay: 2.6s; } .item-4 { animation-delay: 3.6s; } .item-5 { animation-delay: 4.6s; } .item-6 { animation-delay: 6.0s; }

    .solid-card { width: 100%; box-sizing: border-box; background: rgba(22, 36, 25, 0.95); border-radius: 28px; padding: 40px 25px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); border: 1px solid var(--solid-border); margin: 0 auto; max-width: 400px; }
    h1 { margin: 0 0 10px; font-size: 28px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    p { margin: 0 0 25px; font-size: 16px; line-height: 1.6; color: #a3b8a8; }

    input[type="tel"] { width: 100%; box-sizing: border-box; padding: 18px; font-size: 22px; text-align: center; letter-spacing: 3px; border: 2px solid var(--solid-border); border-radius: 18px; margin-bottom: 20px; background: #0c140e; color: #fff; font-weight: bold; outline: none; transition: 0.3s; }
    input[type="tel"]:focus { border-color: var(--primary); background: #111a13; }
    input[type="tel"]::placeholder { color: #4a6350; }

    .btn { width: 100%; box-sizing: border-box; border-radius: 18px; padding: 16px 12px; margin-bottom: 12px; font-size: 18px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; background: #233326; color: #ffffff !important; cursor: pointer; border: 1px solid var(--solid-border); transition: 0.3s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); border: none; box-shadow: 0 8px 20px rgba(44, 76, 59, 0.4); color: #fff;}
    
    #global-loader { display: none; position: fixed; inset: 0; background: rgba(17, 26, 19, 1); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4a7c59; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>

  <!-- 開場動畫 -->
  <div id="splash-screen" class="screen">
    <div class="collab-container">
      <img src="https://raw.githubusercontent.com/huisunnbgap2026-pixel/plant-qr-scanner/main/logo_ark.png" class="collab-logo anim-item item-1">
      <span class="cross-mark anim-item item-2">✖</span>
      <img src="https://raw.githubusercontent.com/huisunnbgap2026-pixel/plant-qr-scanner/main/logo_nchu.png" class="collab-logo anim-item item-3">
      <span class="cross-mark anim-item item-4">✖</span>
      <img src="https://raw.githubusercontent.com/huisunnbgap2026-pixel/plant-qr-scanner/main/logo_huisun.png" class="collab-logo anim-item item-5">
    </div>
    <h1 class="title-large anim-item item-6">方舟計畫展覽</h1>
  </div>

  <!-- 輸入電話頁面 -->
  <div id="login-screen" class="screen">
    <div class="solid-card">
      <h1>🌿 專屬探索通行證</h1>
      <p>請輸入手機號碼，開啟您的植物集點之旅。</p>
      <input id="phoneInput" type="tel" placeholder="09XXXXXXXX" maxlength="10" autocomplete="off" name="phone-no-autofill">
      <button class="btn primary" id="loginBtn">登入展覽</button>
    </div>
  </div>

  <div id="global-loader"><div class="spinner"></div><h3 id="loader-text">載入中...</h3></div>

  <script>
    // ★ 這裡請填寫你最新的 GAS 網址！
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) { let p = String(phone || "").replace(/\D/g, "").trim(); if (p.length === 9 && p.startsWith("9")) p = "0" + p; return p; }
    
    let userPhone = normalizePhone(sessionStorage.getItem("savedPhone") || "");

    window.onload = () => {
      const hasPlayed = sessionStorage.getItem("splashPlayed") === "true";
      if (hasPlayed) {
        if (userPhone) { gotoGasApp(); } 
        else { document.getElementById('login-screen').classList.add('active'); }
      } else {
        document.getElementById('splash-screen').classList.add('active');
        sessionStorage.setItem("splashPlayed", "true");
        setTimeout(() => {
          document.getElementById('splash-screen').classList.remove('active');
          if (userPhone) { gotoGasApp(); } 
          else { document.getElementById('login-screen').classList.add('active'); }
        }, 8500);
      }
    };

    document.getElementById('loginBtn').addEventListener('click', () => {
      const input = normalizePhone(document.getElementById('phoneInput').value);
      if (input.length === 10 && input.startsWith("09")) {
        userPhone = input; sessionStorage.setItem("savedPhone", userPhone);
        gotoGasApp();
      } else { alert("格式錯誤，請輸入正確的 09 開頭手機號碼！"); }
    });

    function gotoGasApp() {
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('loader-text').innerHTML = "正在進入系統...";
      document.getElementById('global-loader').style.display = 'flex';
      setTimeout(() => {
        window.location.href = APP_URL + "?mode=app&phone=" + userPhone;
      }, 300);
    }
  </script>
</body>
</html>
