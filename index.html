<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: #2f3a2f;
      background:
        radial-gradient(circle at top left, rgba(168,196,140,0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(122,160,110,0.16), transparent 24%),
        linear-gradient(180deg, #f8f5ec 0%, #f2ede0 100%);
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    .hero {
      margin-bottom: 18px;
      padding: 22px 22px 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(90,130,94,0.94), rgba(127,162,112,0.90));
      color: #fff;
      box-shadow: 0 10px 30px rgba(69,89,63,0.12);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -20px;
      top: -20px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      color: #fff;
      font-size: 13px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.93);
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(79,122,87,0.12);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(69,89,63,0.12);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6c7a67;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.35;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.8;
      color: #6c7a67;
      font-size: 16px;
    }

    #reader {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 18px;
    }

    button, a.btn {
      width: 100%;
      box-sizing: border-box;
      display: block;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      margin-top: 12px;
      text-decoration: none;
      border: 0;
      text-align: center;
      cursor: pointer;
    }

    button.primary, a.btn.primary {
      background: linear-gradient(135deg, #4f7a57, #3e6245);
      color: #fff;
    }

    button.secondary, a.btn.secondary {
      background: #e7efe4;
      color: #2f3a2f;
    }

    #stopBtn { display: none; }
    .muted { color: #6c7a67; font-size: 14px; }

    @media (max-width: 640px) {
      body { padding: 18px 12px 32px; }
      .hero { padding: 18px 18px 16px; border-radius: 20px; }
      .hero h1 { font-size: 24px; }
      .card { padding: 18px; border-radius: 18px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">植物導覽集章</div>
      <h1>QR 探索掃描站</h1>
      <p>請使用後置鏡頭掃描植物牌或展區任務點，開啟對應的植物介紹或探索內容。</p>
    </div>

    <div class="card">
      <div class="section-title">Scanner</div>
      <h2>開始掃描探索標記</h2>
      <p id="status">按下下方按鈕後，系統會優先開啟後置鏡頭，開始掃描植物與展區標記。</p>

      <button id="startBtn" class="primary">啟動後置鏡頭</button>
      <button id="stopBtn" class="secondary">停止掃描</button>

      <div id="reader" style="margin-top:16px;"></div>
      <p class="muted" style="margin-top:12px;">
        若無法開啟鏡頭，請改用 Safari 或 Chrome，並確認網站已允許相機權限。
      </p>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    function onScanSuccess(decodedText) {
      if (scannerRunning && html5QrCode) {
        html5QrCode.stop().catch(() => {});
        scannerRunning = false;
      }
      statusEl.textContent = "已掃描成功，正在開啟內容…";
      window.top.location.href = decodedText;
    }

    async function startScanner() {
      if (scannerRunning) return;

      statusEl.textContent = "正在啟動後置鏡頭…";
      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess
        );

        scannerRunning = true;
        startBtn.style.display = "none";
        stopBtn.style.display = "block";
        statusEl.textContent = "後置鏡頭已啟動，請將 QR code 對準框內。";
        return;
      } catch (err1) {
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
          );

          scannerRunning = true;
          startBtn.style.display = "none";
          stopBtn.style.display = "block";
          statusEl.textContent = "鏡頭已啟動，請將 QR code 對準框內。";
          return;
        } catch (err2) {
          statusEl.textContent = "無法開啟後置鏡頭，請確認相機權限是否允許，或改用 Safari / Chrome。";
        }
      }
    }

    async function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;

      try {
        await html5QrCode.stop();
      } catch (e) {}

      scannerRunning = false;
      stopBtn.style.display = "none";
      startBtn.style.display = "block";
      statusEl.textContent = "已停止掃描。";
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);
  </script>
</body>
</html>
