<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <meta name="format-detection" content="telephone=no">
  <title>方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4a7c59; --solid-bg: #162419; --solid-border: #2a3d2e; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: "Noto Sans TC", sans-serif; color: #fff; background-color: #111a13; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; touch-action: manipulation;}
    
    .bg-fixed { position: fixed; inset: 0; width: 100vw; height: 100vh; background: url('https://i.imgur.com/gK1qB0U.jpeg') center/cover no-repeat; z-index: -1; }

    .screen { display: none; position: absolute; inset: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 24px; box-sizing: border-box; z-index: 10; overflow-y: auto; }
    .screen.active { display: flex; z-index: 20; }

    #splash-screen { background: rgba(17, 26, 19, 0.95); }
    .collab-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; width: 100%; }
    .collab-logo { width: 110px; height: auto; object-fit: contain; }
    .cross-mark { font-size: 20px; color: rgba(255,255,255,0.6); }
    .title-large { font-size: 36px; font-weight: 900; letter-spacing: 4px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin: 0; text-align: center; }
    
    .solid-card { width: 100%; box-sizing: border-box; background: rgba(22, 36, 25, 0.95); border-radius: 28px; padding: 40px 25px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); border: 1px solid var(--solid-border); margin: 0 auto; max-width: 400px; }
    h1 { margin: 0 0 10px; font-size: 26px; font-weight: 900; letter-spacing: 2px; }
    p { margin: 0 0 25px; font-size: 15px; line-height: 1.6; color: #a3b8a8; }

    input[type="tel"] { width: 100%; box-sizing: border-box; padding: 18px; font-size: 22px; text-align: center; letter-spacing: 3px; border: 2px solid var(--solid-border); border-radius: 18px; margin-bottom: 20px; background: #0c140e; color: #fff; font-weight: bold; outline: none; }
    input[type="tel"]:focus { border-color: var(--primary); }

    .btn { width: 100%; box-sizing: border-box; border-radius: 18px; padding: 16px 12px; margin-bottom: 12px; font-size: 18px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; background: #233326; color: #fff; cursor: pointer; border: 1px solid var(--solid-border); }
    .btn.primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); border: none; }
    .btn.accent { background: linear-gradient(135deg, #d4a373, #a67c52); border: none; }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>

  <!-- 開場動畫 -->
  <div id="splash-screen" class="screen active">
    <div class="collab-container">
      <img src="./logo_ark.png" class="collab-logo" onerror="this.style.display='none'">
      <span class="cross-mark">✖</span>
      <img src="./logo_nchu.png" class="collab-logo" onerror="this.style.display='none'">
      <span class="cross-mark">✖</span>
      <img src="./logo_huisun.png" class="collab-logo" onerror="this.style.display='none'">
    </div>
    <h1 class="title-large">方舟計畫展覽</h1>
  </div>

  <!-- 登入頁面 -->
  <div id="login-screen" class="screen">
    <div class="solid-card">
      <h1>🌿 專屬通行證</h1>
      <p>請輸入手機號碼，開啟您的探索之旅。</p>
      <input id="phoneInput" type="tel" placeholder="09XXXXXXXX" maxlength="10" autocomplete="off">
      <button class="btn primary" onclick="login()">登入展覽</button>
    </div>
  </div>

  <!-- 主選單 -->
  <div id="home-screen" class="screen">
    <div class="solid-card">
      <h1 style="font-size: 24px;">歡迎，<span id="displayPhone"></span></h1>
      <p style="margin-bottom: 30px;">請選擇您要進行的動作</p>
      <button class="btn primary" onclick="window.location.href='scanner.html'">🔍 進入展區掃描站</button>
      <a href="https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F" class="btn accent" style="background: linear-gradient(135deg, #7c9885, #4a6350);">🌳 瀏覽目前館藏</a>
      <button class="btn primary" onclick="gotoGas('query')">🏆 查看探索進度</button>
      <button class="btn primary" onclick="gotoGas('rewards')">🎁 查看兌換獎勵</button>
      <button class="btn" style="background:transparent; color:#6d8c75; border:none;" onclick="logout()">登出切換帳號</button>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    function normalizePhone(phone) { let p = String(phone || "").replace(/\D/g, "").trim(); if (p.length === 9 && p.startsWith("9")) p = "0" + p; return p; }
    
    let currentPhone = sessionStorage.getItem("savedPhone") || "";

    function switchView(viewId) {
      document.getElementById('splash-screen').classList.remove('active');
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('home-screen').classList.remove('active');
      document.getElementById(viewId + '-screen').classList.add('active');
    }

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('phone')) currentPhone = urlParams.get('phone');
      if (urlParams.get('action') === 'logout') currentPhone = "";
      
      if (currentPhone) {
        sessionStorage.setItem("savedPhone", currentPhone);
        document.getElementById('displayPhone').innerText = currentPhone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
        switchView('home');
      } else {
        sessionStorage.removeItem("savedPhone");
        const hasPlayed = sessionStorage.getItem("splashPlayed");
        if (hasPlayed) {
          switchView('login');
        } else {
          sessionStorage.setItem("splashPlayed", "true");
          setTimeout(() => { switchView('login'); }, 3000);
        }
      }
    };

    function login() {
      const input = normalizePhone(document.getElementById('phoneInput').value);
      if (input.length === 10 && input.startsWith("09")) {
        currentPhone = input;
        sessionStorage.setItem("savedPhone", currentPhone);
        document.getElementById('displayPhone').innerText = currentPhone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
        switchView('home');
      } else {
        alert("格式錯誤，請輸入正確的 09 開頭手機號碼！");
      }
    }

    function logout() {
      currentPhone = "";
      sessionStorage.removeItem("savedPhone");
      switchView('login');
    }

    function gotoGas(mode) {
      window.location.href = `${APP_URL}?mode=${mode}&phone=${currentPhone}`;
    }
  </script>
</body>
</html>
