<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方舟植物展覽｜綠意探索</title>
    <style>
        :root {
            --primary: #2c4c3b;
            --bg: #f4f7f4;
            --text: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang TC', 'Noto Sans TC', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* 1. 開場動畫 (Splash Screen) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--primary); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: opacity 0.8s ease;
        }
        .leaf-logo { font-size: 80px; animation: float 2s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .fade-out { opacity: 0; pointer-events: none; }

        /* 共用容器 */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: none; flex-direction: column; justify-content: center; }
        .active-container { display: flex; }

        /* 2. 登入畫面 (長輩友善大字體) */
        h1 { font-size: 28px; color: var(--primary); text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; font-size: 18px; color: #666; margin-bottom: 30px; }
        input[type="tel"] {
            width: 100%; padding: 18px; font-size: 22px; text-align: center;
            border: 2px solid #ccc; border-radius: 12px; margin-bottom: 20px;
        }
        .btn {
            width: 100%; padding: 18px; font-size: 20px; font-weight: bold;
            background: var(--primary); color: white; border: none; border-radius: 12px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.98); }

        /* 3. 登入後的主畫面 */
        .dashboard-card {
            background: white; border-radius: 16px; padding: 30px 20px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .user-phone { font-size: 16px; color: #888; margin-bottom: 15px; }
        .instruction { background: #e8f0e8; padding: 20px; border-radius: 12px; margin-bottom: 20px; font-size: 18px; line-height: 1.6;}
        
        .action-grid { display: grid; gap: 15px; }
        .btn-outline {
            background: white; color: var(--primary); border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

    <!-- 開場動畫區 -->
    <div id="splash-screen">
        <div class="leaf-logo">🌿</div>
        <h2 style="margin-top: 20px; letter-spacing: 2px;">方舟植物展覽</h2>
        <p style="margin-top: 10px; opacity: 0.8;">即將進入探索...</p>
    </div>

    <!-- 登入區 -->
    <div id="login-container" class="container">
        <h1>歡迎來到方舟植物展</h1>
        <p class="subtitle">請輸入手機號碼<br><small>（系統將自動為您保留集點紀錄）</small></p>
        <input type="tel" id="phoneInput" placeholder="例如：0912345678" maxlength="10">
        <button class="btn" onclick="saveLogin()">開始探索 🚀</button>
    </div>

    <!-- 首頁區 -->
    <div id="home-container" class="container">
        <div class="dashboard-card">
            <h1>我的探險日誌</h1>
            <p class="user-phone">登入帳號：<span id="display-phone"></span> <a href="#" onclick="logout()" style="color:#aaa; text-decoration:underline; font-size:14px; margin-left:10px;">切換</a></p>
        </div>

        <div class="instruction">
            <strong>📸 如何集點？</strong><br>
            請直接打開您的 <b>LINE 掃碼器</b> 或 <b>手機相機</b>，掃描展場中植物旁邊的 QR Code，點數就會自動加進來喔！
        </div>

        <div class="action-grid">
            <!-- 這些按鈕會帶上 phone 參數，導向你的 GAS 後端 -->
            <button class="btn" onclick="goToGAS('query')">🏆 查看我的點數與紀錄</button>
            <button class="btn btn-outline" onclick="goToGAS('rewards')">🎁 前往兌換獎品</button>
            <button class="btn btn-outline" onclick="window.open('https://sites.google.com/view/nat-bot-gard-nchu/', '_blank')">📖 觀看線上植物館藏</button>
        </div>
    </div>

    <script>
        // 你的 Google Apps Script 部署網址（請替換成你實際的 Web App URL）
        const GAS_URL = "https://script.google.com/macros/s/AKfycby_你的GAS_ID/exec";

        // 1. 處理開場動畫與登入狀態檢查
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
                checkLoginStatus();
            }, 2000); // 動畫顯示 2 秒
        };

        function checkLoginStatus() {
            const phone = localStorage.getItem('ark_exhibition_phone');
            if (phone) {
                document.getElementById('display-phone').innerText = phone;
                document.getElementById('login-container').classList.remove('active-container');
                document.getElementById('home-container').classList.add('active-container');
            } else {
                document.getElementById('login-container').classList.add('active-container');
                document.getElementById('home-container').classList.remove('active-container');
            }
        }

        // 2. 儲存手機號碼（長輩不用每次重新輸入）
        function saveLogin() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (phone.length >= 9) {
                localStorage.setItem('ark_exhibition_phone', phone);
                checkLoginStatus();
            } else {
                alert('請輸入完整的手機號碼喔！');
            }
        }

        function logout() {
            localStorage.removeItem('ark_exhibition_phone');
            checkLoginStatus();
        }

        // 3. 導向 GAS 後端頁面（帶入手機號碼參數）
        function goToGAS(mode) {
            const phone = localStorage.getItem('ark_exhibition_phone');
            window.location.href = `${GAS_URL}?mode=${mode}&phone=${phone}`;
        }
    </script>
</body>
</html>
