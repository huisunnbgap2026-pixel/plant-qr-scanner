<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  
  <!-- ★ 終極防閃爍黑科技：在畫面畫出來之前，瞬間決定該顯示哪個框，消滅載入空窗期 ★ -->
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    
    // 1. 如果從 GAS 帶電話跳轉回來，瞬間記住
    if (urlParams.get('phone')) {
      sessionStorage.setItem('savedPhone', urlParams.get('phone'));
      sessionStorage.setItem('splashPlayed', 'true');
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    
    // 2. 如果是按了登出回來，瞬間清除記憶
    if (urlParams.get('action') === 'logout') {
      sessionStorage.removeItem("savedPhone");
      sessionStorage.setItem("splashPlayed", "true");
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 3. 瞬間判斷初始畫面，並注入強制顯示的 CSS
    const hasPlayedSplash = sessionStorage.getItem("splashPlayed");
    const savedPhone = sessionStorage.getItem("savedPhone");
    let initialScreen = '#splash-screen';
    
    if (hasPlayedSplash === "true") {
      initialScreen = savedPhone ? '#home-screen' : '#login-screen';
    }

    document.write('<style id="anti-flicker-style">' +
      initialScreen + ' { opacity: 1 !important; visibility: visible !important; z-index: 20 !important; transition: none !important; } ' +
      (hasPlayedSplash === "true" ? '#splash-screen { display: none !important; }' : '') +
    '</style>');
  </script>

  <style>
    :root { --primary: #4a7c59; --glass-bg: rgba(20, 35, 25, 0.65); --glass-border: rgba(255, 255, 255, 0.15); }
    html, body { margin: 0; padding: 0; min-height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #fff; overflow: hidden; }
    
    /* 解決背景跳動黑科技 */
    .bg-fixed { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('https://images.unsplash.com/photo-1502085671122-2d218cd434e6?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat; z-index: -1; }

    .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; box-sizing: border-box; opacity: 0; visibility: hidden; transition: opacity 0.5s ease; z-index: 10; }
    .screen.active { opacity: 1; visibility: visible; z-index: 20; }

    #splash-screen { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
    .collab-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; }
    
    .collab-logo { width: 160px; height: auto; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
    .cross-mark { font-size: 26px; color: rgba(255,255,255,0.6); }
    
    .title-large { font-size: 42px; font-weight: 900; letter-spacing: 4px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin: 0; }
    .anim-item { opacity: 0; transform: translateY(25px); animation: fadeUp 2s forwards ease-out; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    
    .item-1 { animation-delay: 0.6s; } .item-2 { animation-delay: 1.6s; } .item-3 { animation-delay: 2.6s; } .item-4 { animation-delay: 3.6s; } .item-5 { animation-delay: 4.6s; } .item-6 { animation-delay: 6.0s; }

    .glass-card { 
      width: 100%; max-width: 400px; background: var(--glass-bg); 
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
      border-radius: 28px; padding: 40px 30px; text-align: center; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
      /* ★ 開啟 GPU 硬體加速，讓安卓渲染毛玻璃不再卡頓 */
      transform: translateZ(0); will-change: transform;
    }
    
    h1 { margin: 0 0 10px; font-size: 28px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    p { margin: 0 0 25px; font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.8); }

    input[type="tel"] { width: 100%; box-sizing: border-box; padding: 18px; font-size: 22px; text-align: center; letter-spacing: 3px; border: 2px solid rgba(255,255,255,0.3); border-radius: 18px; margin-bottom: 20px; background: rgba(0,0,0,0.4); color: #fff; font-weight: bold; outline: none; transition: 0.3s; }
    input[type="tel"]:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); }
    input[type="tel"]::placeholder { color: rgba(255,255,255,0.4); }

    .btn { width: 100%; box-sizing: border-box; border-radius: 18px; padding: 18px 12px; margin-bottom: 12px; font-size: 18px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; border: 1px solid var(--glass-border); transition: 0.3s; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); border: none; box-shadow: 0 8px 20px rgba(44, 76, 59, 0.4); }
    .btn.accent { background: linear-gradient(135deg, #d4a373, #a67c52); border: none; }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>

  <!-- 開場動畫 -->
  <div id="splash-screen" class="screen">
    <div class="collab-container">
      <img src="./logo_ark.png" class="collab-logo anim-item item-1" onerror="this.style.display='none'">
      <span class="cross-mark anim-item item-2">✖</span>
      <img src="./logo_nchu.png" class="collab-logo anim-item item-3" onerror="this.style.display='none'">
      <span class="cross-mark anim-item item-4">✖</span>
      <img src="./logo_huisun.png" class="collab-logo anim-item item-5" onerror="this.style.display='none'">
    </div>
    <h1 class="title-large anim-item item-6">方舟計畫展覽</h1>
  </div>

  <!-- 輸入電話頁面 -->
  <div id="login-screen" class="screen">
    <div class="glass-card">
      <h1>🌿 專屬探索通行證</h1>
      <p>請輸入手機號碼，開啟您的植物集點之旅。</p>
      <input id="phoneInput" type="tel" placeholder="09XXXXXXXX" maxlength="10" autocomplete="off" name="phone-no-autofill">
      <button class="btn primary" id="loginBtn">登入展覽</button>
    </div>
  </div>

  <!-- 主選單 -->
  <div id="home-screen" class="screen">
    <div class="glass-card">
      <h1 style="font-size: 24px;">歡迎，<span id="displayPhone"></span></h1>
      <p style="margin-bottom: 30px;">請選擇您要進行的探索動作</p>
      
      <a href="scanner.html" class="btn primary">🔍 啟動 QR 掃描器</a>
      <a href="ar_camera.html?v=4" class="btn accent">📸 專屬紀念拍立得</a>
      <button id="navQueryBtn" class="btn">🏆 查看探索進度</button>
      <button id="navRewardBtn" class="btn">🎁 查看兌換獎勵</button>
      <button id="logoutBtn" class="btn" style="margin-top:20px; background:transparent; color:#aaa; border-color:transparent;">登出切換帳號</button>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) { let p = String(phone || "").replace(/\D/g, "").trim(); if (p.length === 9 && p.startsWith("9")) p = "0" + p; return p; }
    function buildUrl(base, params) { const u = new URL(base); Object.keys(params).forEach(key => { if (params[key]) u.searchParams.set(key, params[key]); }); return u.toString(); }

    const splashScreen = document.getElementById('splash-screen');
    const loginScreen = document.getElementById('login-screen');
    const homeScreen = document.getElementById('home-screen');
    let userPhone = normalizePhone(sessionStorage.getItem("savedPhone") || "");

    // 資料綁定
    function bindHomeData() {
      document.getElementById('displayPhone').innerText = userPhone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
      document.getElementById('navQueryBtn').onclick = (e) => { e.target.innerHTML = "⏳ 載入中..."; window.location.href = buildUrl(APP_URL, { mode: "query", phone: userPhone }); };
      document.getElementById('navRewardBtn').onclick = (e) => { e.target.innerHTML = "⏳ 載入中..."; window.location.href = buildUrl(APP_URL, { mode: "rewards", phone: userPhone }); };
    }

    // 處理顯示邏輯 (平滑交接給 Anti-Flicker 腳本)
    const isSplashPlayed = sessionStorage.getItem("splashPlayed");
    if (isSplashPlayed === "true") {
      if (userPhone) {
        homeScreen.classList.add('active');
        bindHomeData();
      } else {
        loginScreen.classList.add('active');
      }
      // 安全移除防閃爍標籤
      setTimeout(() => { const antiFlicker = document.getElementById('anti-flicker-style'); if(antiFlicker) antiFlicker.remove(); }, 50);
    } else {
      splashScreen.classList.add('active');
      setTimeout(() => { const antiFlicker = document.getElementById('anti-flicker-style'); if(antiFlicker) antiFlicker.remove(); }, 50);
      
      sessionStorage.setItem("splashPlayed", "true"); 
      setTimeout(() => {
        splashScreen.classList.remove('active');
        setTimeout(() => { 
          splashScreen.style.display = "none"; 
          if (userPhone) { homeScreen.classList.add('active'); bindHomeData(); } 
          else { loginScreen.classList.add('active'); }
        }, 500); 
      }, 9000);
    }

    // 登入按鈕
    document.getElementById('loginBtn').addEventListener('click', () => {
      const input = normalizePhone(document.getElementById('phoneInput').value);
      if (input.length === 10 && input.startsWith("09")) {
        userPhone = input; sessionStorage.setItem("savedPhone", userPhone);
        loginScreen.style.opacity = "0"; // 平滑切換
        setTimeout(() => {
          loginScreen.classList.remove('active');
          loginScreen.style.opacity = "";
          homeScreen.classList.add('active');
          bindHomeData();
        }, 300);
      } else { alert("格式錯誤，請輸入正確的 09 開頭手機號碼！"); }
    });

    // 登出按鈕
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem("savedPhone"); userPhone = ""; document.getElementById('phoneInput').value = "";
      homeScreen.style.opacity = "0"; // 平滑切換
      setTimeout(() => {
        homeScreen.classList.remove('active');
        homeScreen.style.opacity = "";
        loginScreen.classList.add('active');
      }, 300);
    });
  </script>
</body>
</html>
