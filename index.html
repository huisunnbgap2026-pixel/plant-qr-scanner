<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4a7c59;
      --glass-bg: rgba(20, 35, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.15);
    }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      /* 高質感深色植物背景 */
      background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
      color: #fff; overflow: hidden;
    }

    /* 共用全螢幕容器 */
    .screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 24px; box-sizing: border-box;
      opacity: 0; visibility: hidden; transition: opacity 0.8s ease;
      z-index: 10;
    }
    .screen.active { opacity: 1; visibility: visible; z-index: 20; }

    /* --- 開場動畫 (滿版、無白框、Logo放大) --- */
    #splash-screen { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
    .collab-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
    .collab-logo { width: 110px; height: auto; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
    .cross-mark { font-size: 24px; color: rgba(255,255,255,0.7); }
    
    .anim-item { opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .item-1 { animation-delay: 0.2s; }
    .item-2 { animation-delay: 0.6s; }
    .item-3 { animation-delay: 1.0s; }
    .item-4 { animation-delay: 1.4s; }
    .item-5 { animation-delay: 1.8s; }
    .item-6 { animation-delay: 2.5s; }

    /* --- 毛玻璃卡片設計 (適用於登入與主選單) --- */
    .glass-card {
      width: 100%; max-width: 400px;
      background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 28px; padding: 40px 30px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--glass-border);
    }
    h1 { margin: 0 0 10px; font-size: 28px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    p { margin: 0 0 25px; font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.8); }

    /* --- 輸入框與按鈕 --- */
    input[type="tel"] {
      width: 100%; box-sizing: border-box; padding: 18px; font-size: 22px; text-align: center; letter-spacing: 3px;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 18px; margin-bottom: 20px; 
      background: rgba(0,0,0,0.3); color: #fff; font-weight: bold; outline: none; transition: 0.3s;
    }
    input[type="tel"]:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
    input[type="tel"]::placeholder { color: rgba(255,255,255,0.3); }

.btn {
      width: 100%; box-sizing: border-box; border-radius: 18px; padding: 18px 12px; margin-bottom: 12px;
      font-size: 18px; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; border: 1px solid var(--glass-border); transition: 0.3s;
      
      /* 加入這三行，取消手機點擊延遲 */
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: linear-gradient(135deg, #5c8d6b, #2c4c3b); border: none; box-shadow: 0 8px 20px rgba(44, 76, 59, 0.4); }
    .btn.accent { background: linear-gradient(135deg, #d4a373, #a67c52); border: none; }
  </style>
</head>
<body>

  <!-- 1. 開場動畫 -->
  <div id="splash-screen" class="screen active">
    <div class="collab-container">
      <img src="./logo_ark.png" class="collab-logo anim-item item-1" onerror="this.style.display='none'">
      <span class="cross-mark anim-item item-2">✖</span>
      <img src="./logo_nchu.png" class="collab-logo anim-item item-3" onerror="this.style.display='none'">
      <span class="cross-mark anim-item item-4">✖</span>
      <img src="./logo_huisun.png" class="collab-logo anim-item item-5" onerror="this.style.display='none'">
    </div>
    <h1 class="anim-item item-6">方舟計畫展覽</h1>
  </div>

  <!-- 2. 輸入電話頁面 -->
  <div id="login-screen" class="screen">
    <div class="glass-card">
      <h1>🌿 專屬探索通行證</h1>
      <p>請輸入手機號碼，開啟您的植物集點之旅。</p>
      <input id="phoneInput" type="tel" placeholder="09XXXXXXXX" maxlength="10">
      <button class="btn primary" id="loginBtn">登入展覽</button>
    </div>
  </div>

  <!-- 3. 全新主選單 (整合 AR 拍立得) -->
  <div id="home-screen" class="screen">
    <div class="glass-card">
      <h1 style="font-size: 24px;">歡迎，<span id="displayPhone"></span></h1>
      <p style="margin-bottom: 30px;">請選擇您要進行的探索動作</p>
      
      <a href="scanner.html" class="btn primary">🔍 啟動 QR 掃描器</a>
      <a href="ar_camera.html" class="btn accent">📸 專屬紀念拍立得</a>
      <button id="navQueryBtn" class="btn">🏆 查看探索進度</button>
      <button id="navRewardBtn" class="btn">🎁 查看兌換獎勵</button>
      <button id="logoutBtn" class="btn" style="margin-top:20px; background:transparent; color:#aaa; border-color:transparent;">登出切換帳號</button>
    </div>
  </div>

  <script>
    // 你的 GAS 網址 (請確認這個網址是正確的)
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }
    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(key => { if (params[key]) u.searchParams.set(key, params[key]); });
      return u.toString();
    }

    const splashScreen = document.getElementById('splash-screen');
    const loginScreen = document.getElementById('login-screen');
    const homeScreen = document.getElementById('home-screen');
    let userPhone = normalizePhone(localStorage.getItem("savedPhone") || "");

    window.onload = () => {
      // 播放動畫 3.5 秒後進入下一個畫面
      setTimeout(() => {
        splashScreen.classList.remove('active');
        
        if (userPhone) {
          // 如果以前登入過，自動填入號碼，進入主選單
          document.getElementById('phoneInput').value = userPhone;
          showHomeScreen();
        } else {
          // 沒登入過，進入輸入電話頁面
          loginScreen.classList.add('active');
        }
      }, 3500);
    };

    // 點擊登入
    document.getElementById('loginBtn').addEventListener('click', () => {
      const input = normalizePhone(document.getElementById('phoneInput').value);
      if (input.length === 10 && input.startsWith("09")) {
        userPhone = input;
        localStorage.setItem("savedPhone", userPhone);
        loginScreen.classList.remove('active');
        showHomeScreen();
      } else {
        alert("格式錯誤，請輸入正確的 09 開頭手機號碼！");
      }
    });

    // 顯示主選單並綁定 GAS 網址
    function showHomeScreen() {
      document.getElementById('displayPhone').innerText = userPhone.replace(/(\d{4})(\d{3})(\d{3})/, '$1-$2-$3');
      homeScreen.classList.add('active');
      
      // 動態產生前往 GAS 的網址
      document.getElementById('navQueryBtn').onclick = () => window.location.href = buildUrl(APP_URL, { mode: "query", phone: userPhone });
      document.getElementById('navRewardBtn').onclick = () => window.location.href = buildUrl(APP_URL, { mode: "rewards", phone: userPhone });
    }

    // 登出按鈕
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem("savedPhone");
      userPhone = "";
      document.getElementById('phoneInput').value = "";
      homeScreen.classList.remove('active');
      loginScreen.classList.add('active');
    });
  </script>
</body>
</html>
