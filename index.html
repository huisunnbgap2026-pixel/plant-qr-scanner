<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物探索導覽站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#edf5ec;
      --card:#fffef9;
      --card-soft:#f8fbf6;
      --text:#27352a;
      --muted:#627063;
      --primary:#55795c;
      --primary-dark:#3f5d45;
      --line:#d6e3d3;
      --shadow:0 8px 20px rgba(63,93,66,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:22px 14px 38px;
      font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(122,158,120,.07), transparent 18%),
        radial-gradient(circle at 88% 14%, rgba(122,158,120,.07), transparent 18%),
        radial-gradient(circle at 15% 85%, rgba(122,158,120,.06), transparent 18%),
        radial-gradient(circle at 82% 88%, rgba(122,158,120,.06), transparent 16%),
        var(--bg);
      position:relative;
      overflow-x:hidden;
    }
    body:before,
    body:after{
      content:"";
      position:fixed;
      pointer-events:none;
      z-index:0;
      opacity:.18;
      width:130px;
      height:130px;
      background-repeat:no-repeat;
      background-size:contain;
    }
    body:before{
      left:6px;
      top:70px;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><g fill='none' stroke='%2382a07a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M30 118c17-25 27-45 33-66'/><path d='M62 51c-16-5-28-16-33-33 21 2 34 12 41 29'/><path d='M68 66c15-8 32-10 49-3-10 17-25 27-45 27'/><path d='M54 92c-12 2-21 10-26 22 14 1 25-4 34-15'/></g></svg>");
    }
    body:after{
      right:8px;
      bottom:36px;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><g fill='none' stroke='%2382a07a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M89 117c-8-28-14-49-15-75'/><path d='M73 44c17-5 31-15 41-33-23 2-38 12-46 28'/><path d='M70 67c-14-10-31-15-49-11 9 21 24 34 45 36'/><path d='M78 95c11 2 20 11 24 24-14 0-25-6-32-18'/></g></svg>");
    }
    .wrap{
      max-width:860px;
      margin:0 auto;
      position:relative;
      z-index:1;
    }
    .hero{
      margin-bottom:18px;
      padding:28px 22px 24px;
      border-radius:26px;
      background:linear-gradient(145deg, rgba(89,124,94,.96), rgba(123,157,116,.94));
      color:#fff;
      box-shadow:var(--shadow);
      border:2px solid rgba(255,255,255,.18);
      position:relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:68px;
      opacity:.12;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 120' preserveAspectRatio='none'><path d='M0 93c37-29 76-43 117-43s80 14 118 43c28-18 55-27 83-27s54 9 80 27c35-34 71-51 109-51s72 17 104 51c28-17 56-26 85-26 31 0 61 9 89 28 34-27 70-40 108-40 40 0 78 15 115 44 29-18 58-27 88-27s60 9 91 28V120H0Z' fill='%23000000'/></svg>");
      background-repeat:no-repeat;
      background-size:cover;
      background-position:center bottom;
    }
    .hero h1{
      margin:0 0 10px;
      font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
      font-size:36px;
      font-weight:900;
      line-height:1.2;
      letter-spacing:1px;
      position:relative;
      z-index:1;
    }
    .hero p{
      margin:0;
      font-size:18px;
      line-height:1.95;
      color:rgba(255,255,255,.96);
      position:relative;
      z-index:1;
    }
    .hero-ornaments{
      display:flex;
      gap:10px;
      margin-top:16px;
      position:relative;
      z-index:1;
      flex-wrap:wrap;
    }
    .hero-ornaments span{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:42px;
      height:42px;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      font-size:21px;
    }
    .card{
      background:var(--card);
      border:2px solid var(--line);
      border-radius:22px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
      position:relative;
    }
    .card:after{
      content:"";
      position:absolute;
      inset:8px;
      border:1px dashed rgba(126,153,120,.18);
      border-radius:16px;
      pointer-events:none;
    }
    .section-title{
      font-size:13px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#71826f;
      margin-bottom:8px;
      font-weight:800;
    }
    h2{
      margin:0 0 12px;
      font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
      font-size:29px;
      font-weight:700;
      line-height:1.35;
      color:#2b3b2f;
    }
    p{
      margin:0 0 14px;
      line-height:1.95;
      color:var(--muted);
      font-size:18px;
    }
    .lead{
      font-size:19px;
      color:var(--text);
    }
    .status-box{
      margin-top:14px;
      padding:16px 18px;
      border-radius:18px;
      background:var(--card-soft);
      border:2px solid var(--line);
      text-align:left;
    }
    .status-label{
      font-size:16px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }
    .status-text{
      font-size:22px;
      color:var(--text);
      line-height:1.8;
      font-weight:700;
    }
    .feature{
      border:2px solid var(--line);
      background:var(--card-soft);
      border-radius:18px;
      padding:18px;
    }
    .feature p{
      margin-bottom:0;
      color:var(--text);
    }
    .forest-row{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }
    .forest-pill{
      border-radius:16px;
      background:linear-gradient(135deg,#f7fbf6,#edf5eb);
      border:2px solid var(--line);
      padding:12px 10px;
      text-align:center;
      font-size:16px;
      color:#405842;
      font-weight:700;
    }
    input,button,a.btn{
      width:100%;
      display:block;
      box-sizing:border-box;
      border-radius:16px;
      padding:18px 16px;
      font-size:19px;
      font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      font-weight:700;
      letter-spacing:.6px;
      margin-top:14px;
      text-decoration:none;
      border:0;
      text-align:center;
    }
    input{
      background:#fffefb;
      border:2px solid var(--line);
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.03);
    }
    input:focus{
      border-color:#8aa282;
      box-shadow:0 0 0 4px rgba(121,158,106,.10);
    }
    button.primary,a.btn.primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(63,110,73,.18);
    }
    a.btn.secondary{
      background:#eef5ea;
      color:var(--text);
      border:2px solid var(--line);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:8px;
    }
    #manualBox,#actionBox{
      display:none;
    }
    @media (max-width:700px){
      body{padding:16px 12px 28px}
      .hero{padding:24px 18px 20px;border-radius:20px}
      .hero h1{font-size:30px}
      .hero p{font-size:17px}
      .card{padding:18px;border-radius:18px}
      h2{font-size:25px}
      p{font-size:17px}
      .status-text{font-size:20px}
      input,button,a.btn{font-size:18px;padding:16px 14px}
      .forest-row{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>植物探索導覽站</h1>
      <p>系統會先完成探索紀錄，再帶你前往植物介紹頁面。</p>
      <div class="hero-ornaments">
        <span>🌿</span>
        <span>🍃</span>
        <span>🌱</span>
        <span>🌼</span>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Plant Guide</div>
      <h2>植物探索入口</h2>
      <p class="lead">掃描植物牌後，會先記錄探索，再前往植物介紹頁。</p>

      <div class="status-box">
        <div class="status-label">目前狀態</div>
        <div id="status" class="status-text">正在準備導覽…</div>
      </div>

      <div id="manualBox">
        <div class="feature" style="margin-top:16px;">
          <p>請先輸入你的手機號碼，系統會用來累積植物蒐集與植物達人認證。</p>
        </div>

        <div class="forest-row">
          <div class="forest-pill">🌿 植物蒐集</div>
          <div class="forest-pill">🪴 導覽任務</div>
          <div class="forest-pill">🏅 達人認證</div>
          <div class="forest-pill">📚 展覽瀏覽</div>
        </div>

        <label for="phoneInput" style="display:block; margin-top:18px; margin-bottom:8px; font-size:16px; color:#5f6f62; font-weight:700;">手機號碼</label>
        <input id="phoneInput" type="text" placeholder="例如：0912345678" inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button id="savePhoneBtn" class="primary" type="button">開始植物探索</button>
      </div>

      <div id="actionBox">
        <a id="goBtn" class="btn primary" href="#" target="_top">重新前往植物介紹頁</a>
        <div class="grid">
          <a id="scanBtn" class="btn secondary" href="#" target="_top">繼續探索植物</a>
          <a id="queryBtn" class="btn secondary" href="#" target="_top">查看探索進度</a>
          <a id="rewardBtn" class="btn secondary" href="#" target="_top">查看探索獎勵</a>
          <a id="homeBtn" class="btn secondary" href="#" target="_top">返回展區首頁</a>
        </div>
        <div class="feature" style="margin-top:16px;">
          <p>若沒有自動跳轉，可直接按上方按鈕重新進入植物介紹頁。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/index.html";
    const AUTO_KEY = "plant_auto_opened_";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function normalizePageUrl(url) {
      let u = String(url || "").trim();
      if (!u) return "";

      try { u = decodeURIComponent(u); } catch (e) {}

      u = u.replace(/\s+/g, "");

      if (/^sites\.google\.com\//i.test(u)) {
        u = "https://" + u;
      }
      if (/^\/view\//i.test(u)) {
        u = "https://sites.google.com" + u;
      }

      if (!/^https?:\/\//i.test(u)) return "";

      return u;
    }

    function openTarget(url) {
      if (!url) return;
      try { window.top.location.href = url; }
      catch (e) { window.location.href = url; }
    }

    const plantId = getParam("plant");
    const pageUrl = normalizePageUrl(getParam("page"));
    const phoneFromUrl = normalizePhone(getParam("phone"));

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const actionBox = document.getElementById("actionBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");

    const goBtn = document.getElementById("goBtn");
    const scanBtn = document.getElementById("scanBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");

    let redirected = false;
    let pendingScript = null;
    let pendingCallbackName = null;
    let pendingTimer = null;
    let redirectTimer = null;

    function getCurrentPhone() {
      if (phoneFromUrl) return phoneFromUrl;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function syncPhone() {
      const phone = getCurrentPhone();
      if (phone) localStorage.setItem("savedPhone", phone);
      return phone;
    }

    function getAutoKey(phone) {
      return AUTO_KEY + plantId + "_" + normalizePhone(phone);
    }

    function setActionLinks(phone) {
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const queryUrl = buildUrl(APP_URL, { mode: "query", phone: phone });
      const rewardUrl = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, {
        phone: phone,
        home: homeUrl
      });

      goBtn.href = pageUrl || "#";
      scanBtn.href = scanUrl;
      queryBtn.href = queryUrl;
      rewardBtn.href = rewardUrl;
      homeBtn.href = homeUrl;
    }

    function showActionBox() {
      actionBox.style.display = "block";
    }

    function cleanupPending() {
      if (pendingTimer) {
        clearTimeout(pendingTimer);
        pendingTimer = null;
      }
      if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
      }
      if (pendingScript && pendingScript.parentNode) {
        pendingScript.parentNode.removeChild(pendingScript);
      }
      pendingScript = null;
      if (pendingCallbackName && window[pendingCallbackName]) {
        try { delete window[pendingCallbackName]; }
        catch (e) { window[pendingCallbackName] = undefined; }
      }
      pendingCallbackName = null;
    }

    function redirectToPlantPage(delayMs) {
      if (redirected) return;
      redirected = true;
      cleanupPending();
      statusEl.textContent = "正在前往植物介紹頁…";
      redirectTimer = setTimeout(function() {
        openTarget(pageUrl);
      }, delayMs || 0);
    }

    function startJsonpRecord(phone) {
      const callbackName = "plantMarkDone_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      pendingCallbackName = callbackName;

      window[callbackName] = function(data) {
        statusEl.textContent = "探索紀錄完成，正在前往植物介紹頁…";
        redirectToPlantPage(120);
      };

      const jsonpUrl = buildUrl(APP_URL, {
        mode: "plant_mark_jsonp",
        plant: plantId,
        phone: phone,
        callback: callbackName,
        _: Date.now().toString()
      });

      const script = document.createElement("script");
      pendingScript = script;
      script.src = jsonpUrl;

      script.onerror = function() {
        statusEl.textContent = "正在前往植物介紹頁…";
        redirectToPlantPage(250);
      };

      document.body.appendChild(script);

      pendingTimer = setTimeout(function() {
        statusEl.textContent = "正在前往植物介紹頁…";
        redirectToPlantPage(250);
      }, 2500);
    }

    function startWithPhone(phone) {
      const normalizedPhone = normalizePhone(phone);

      if (!normalizedPhone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      if (!plantId) {
        statusEl.textContent = "缺少 plant 參數，請重新掃描 QR code。";
        return;
      }

      if (!pageUrl) {
        statusEl.textContent = "植物頁網址無效，請檢查 QR code 的 page 參數。";
        return;
      }

      localStorage.setItem("savedPhone", normalizedPhone);
      setActionLinks(normalizedPhone);
      showActionBox();

      const alreadyAutoOpened = sessionStorage.getItem(getAutoKey(normalizedPhone)) === "1";
      if (alreadyAutoOpened) {
        statusEl.textContent = "你已回到植物探索站，可重新進入植物介紹，或使用下方功能按鈕。";
        return;
      }

      sessionStorage.setItem(getAutoKey(normalizedPhone), "1");
      statusEl.textContent = "正在記錄探索並開啟植物介紹頁…";
      startJsonpRecord(normalizedPhone);
    }

    function start() {
      if (phoneInput) phoneInput.value = "";

      if (!plantId) {
        statusEl.textContent = "缺少 plant 參數，請重新掃描 QR code。";
        return;
      }

      if (!pageUrl) {
        statusEl.textContent = "植物頁網址無效，請檢查 QR code 的 page 參數。";
        return;
      }

      const currentPhone = syncPhone();
      if (!currentPhone) {
        statusEl.textContent = "請先輸入手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      startWithPhone(currentPhone);
    }

    savePhoneBtn.addEventListener("click", function() {
      const phone = normalizePhone(phoneInput.value);
      if (!phone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        return;
      }
      manualBox.style.display = "none";
      startWithPhone(phone);
    });

    window.addEventListener("load", start);
  </script>
</body>
</html>
