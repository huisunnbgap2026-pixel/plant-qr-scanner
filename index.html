<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 探索掃描站</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#edf5ec;
      --card:#fffef9;
      --card-soft:#f8fbf6;
      --text:#27352a;
      --muted:#627063;
      --primary:#55795c;
      --primary-dark:#3f5d45;
      --line:#d6e3d3;
      --shadow:0 8px 20px rgba(63,93,66,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;padding:22px 14px 38px;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(122,158,120,.07), transparent 18%),
        radial-gradient(circle at 88% 14%, rgba(122,158,120,.07), transparent 18%),
        radial-gradient(circle at 15% 85%, rgba(122,158,120,.06), transparent 18%),
        radial-gradient(circle at 82% 88%, rgba(122,158,120,.06), transparent 16%),
        var(--bg);position:relative;overflow-x:hidden
    }
    body:before, body:after{content:"";position:fixed;pointer-events:none;z-index:0;opacity:.18;width:130px;height:130px;background-repeat:no-repeat;background-size:contain}
    body:before{left:6px;top:70px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><g fill='none' stroke='%2382a07a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M30 118c17-25 27-45 33-66'/><path d='M62 51c-16-5-28-16-33-33 21 2 34 12 41 29'/><path d='M68 66c15-8 32-10 49-3-10 17-25 27-45 27'/><path d='M54 92c-12 2-21 10-26 22 14 1 25-4 34-15'/></g></svg>")}
    body:after{right:8px;bottom:36px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><g fill='none' stroke='%2382a07a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='M89 117c-8-28-14-49-15-75'/><path d='M73 44c17-5 31-15 41-33-23 2-38 12-46 28'/><path d='M70 67c-14-10-31-15-49-11 9 21 24 34 45 36'/><path d='M78 95c11 2 20 11 24 24-14 0-25-6-32-18'/></g></svg>")}
    .wrap{max-width:860px;margin:0 auto;position:relative;z-index:1}
    .hero{margin-bottom:18px;padding:28px 22px 24px;border-radius:26px;background:linear-gradient(145deg, rgba(89,124,94,.96), rgba(123,157,116,.94));color:#fff;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.18);position:relative;overflow:hidden}
    .hero:before{content:"";position:absolute;inset:auto 0 0 0;height:68px;opacity:.12;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 120' preserveAspectRatio='none'><path d='M0 93c37-29 76-43 117-43s80 14 118 43c28-18 55-27 83-27s54 9 80 27c35-34 71-51 109-51s72 17 104 51c28-17 56-26 85-26 31 0 61 9 89 28 34-27 70-40 108-40 40 0 78 15 115 44 29-18 58-27 88-27s60 9 91 28V120H0Z' fill='%23000000'/></svg>");background-repeat:no-repeat;background-size:cover;background-position:center bottom}
    .hero h1{margin:0 0 10px;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;font-size:36px;font-weight:900;line-height:1.2;letter-spacing:1px;position:relative;z-index:1}
    .hero p{margin:0;font-size:18px;line-height:1.95;color:rgba(255,255,255,.96);position:relative;z-index:1}
    .hero-ornaments{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
    .hero-ornaments span{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.14);font-size:21px}
    .card{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px;position:relative}
    .card:after{content:"";position:absolute;inset:8px;border:1px dashed rgba(126,153,120,.18);border-radius:16px;pointer-events:none}
    .section-title{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#71826f;margin-bottom:8px;font-weight:800}
    h2{margin:0 0 12px;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;font-size:29px;font-weight:700;line-height:1.35;color:#2b3b2f}
    p{margin:0 0 14px;line-height:1.95;color:var(--muted);font-size:18px}
    .lead{font-size:19px;color:var(--text)}
    .feature{border:2px solid var(--line);background:var(--card-soft);border-radius:18px;padding:18px}
    .feature p{margin-bottom:0;color:var(--text)}
    .forest-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
    .forest-pill{border-radius:16px;background:linear-gradient(135deg,#f7fbf6,#edf5eb);border:2px solid var(--line);padding:12px 10px;text-align:center;font-size:16px;color:#405842;font-weight:700}
    #reader{width:100%;max-width:560px;margin:0 auto;overflow:hidden;border-radius:18px;border:2px solid var(--line);background:var(--card-soft);min-height:40px}
    button,a.btn{width:100%;display:block;box-sizing:border-box;border-radius:16px;padding:18px 16px;font-size:19px;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;font-weight:700;letter-spacing:.6px;margin-top:14px;text-decoration:none;border:0;text-align:center}
    button.primary,a.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 8px 18px rgba(63,110,73,.18);cursor:pointer}
    button.secondary,a.btn.secondary{background:#eef5ea;color:var(--text);border:2px solid var(--line)}
    #stopBtn{display:none}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:8px}
    @media (max-width:700px){
      body{padding:16px 12px 28px}.hero{padding:24px 18px 20px;border-radius:20px}.hero h1{font-size:30px}.hero p{font-size:17px}.card{padding:18px;border-radius:18px}h2{font-size:25px}p{font-size:17px}button,a.btn{font-size:18px;padding:16px 14px}.forest-row{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>QR 探索掃描站</h1>
      <p>走進方舟植物展覽探索路徑，掃描植物牌或任務點，系統會帶你前往植物介紹與探索內容。</p>
      <div class="hero-ornaments"><span>🌿</span><span>🍃</span><span>🌱</span><span>🌼</span></div>
    </div>

    <div class="card">
      <div class="section-title">Scanner</div>
      <h2>開始掃描探索標記</h2>
      <p class="lead" id="status">按下下方按鈕後，系統會優先開啟後置鏡頭。</p>
      <button id="startBtn" class="primary">啟動後置鏡頭</button>
      <button id="stopBtn" class="secondary">停止掃描</button>
      <div id="reader" style="margin-top:18px;"></div>
      <div class="feature" style="margin-top:16px;">
        <p>若無法開啟鏡頭，請改用 Safari 或 Chrome，並確認網站已允許相機權限。</p>
      </div>
      <div class="forest-row">
        <div class="forest-pill">🌿 植物蒐集</div>
        <div class="forest-pill">🪴 導覽任務</div>
        <div class="forest-pill">🏅 達人認證</div>
        <div class="forest-pill">📚 展覽瀏覽</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Navigation</div>
      <h2>探索捷徑</h2>
      <div class="grid">
        <a id="scanAgainBtn" class="btn primary" href="#" target="_top">繼續探索植物</a>
        <a id="homeBtn" class="btn secondary" href="#" target="_top">返回展區首頁</a>
        <a id="queryBtn" class="btn secondary" href="#" target="_top">查看探索進度</a>
        <a id="rewardBtn" class="btn secondary" href="#" target="_top">查看探索獎勵</a>
        <a id="collectionBtn" class="btn secondary" href="https://sites.google.com/view/nat-bot-gard-nchu/%E9%A6%96%E9%A0%81/%E7%9B%AE%E5%89%8D%E9%A4%A8%E8%97%8F" target="_top">瀏覽目前館藏</a>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/index.html";

    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const scanAgainBtn = document.getElementById("scanAgainBtn");
    const homeBtn = document.getElementById("homeBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function getUrlPhone() {
      const params = new URLSearchParams(window.location.search);
      return normalizePhone(params.get("phone") || "");
    }

    function getCurrentPhone() {
      const urlPhone = getUrlPhone();
      if (urlPhone) return urlPhone;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function syncPhoneFromUrl() {
      const urlPhone = getUrlPhone();
      if (urlPhone) localStorage.setItem("savedPhone", urlPhone);
    }

    function setNavLinks() {
      const phone = getCurrentPhone();
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, { phone: phone, home: homeUrl });
      scanAgainBtn.href = scanUrl;
      homeBtn.href = homeUrl;
      queryBtn.href = buildUrl(APP_URL, { mode: "query", phone: phone });
      rewardBtn.href = buildUrl(APP_URL, { mode: "rewards", phone: phone });
    }

    function openTarget(url) {
      try { window.location.replace(url); }
      catch (e) { window.location.href = url; }
    }

    function patchPhoneToUrl(urlString) {
      const phone = getCurrentPhone();
      if (!phone) return urlString;

      try {
        const url = new URL(urlString);
        const isPlantHtml = /\/plant\.html$/i.test(url.pathname);
        const isAppsScript = url.origin === "https://script.google.com" && /\/macros\/s\//.test(url.pathname);

        if (isPlantHtml || isAppsScript) {
          if (!normalizePhone(url.searchParams.get("phone") || "")) {
            url.searchParams.set("phone", phone);
          }
        }
        return url.toString();
      } catch (e) {
        return urlString;
      }
    }

    async function onScanSuccess(decodedText) {
      if (scannerRunning && html5QrCode) {
        html5QrCode.stop().catch(() => {});
        scannerRunning = false;
      }
      statusEl.textContent = "已掃描成功，正在開啟內容…";
      openTarget(patchPhoneToUrl(decodedText));
    }

    async function startScanner() {
      if (scannerRunning) return;
      statusEl.textContent = "正在啟動後置鏡頭…";
      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: { exact: "environment" } },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess
        );
        scannerRunning = true;
        startBtn.style.display = "none";
        stopBtn.style.display = "block";
        statusEl.textContent = "後置鏡頭已啟動，請將 QR code 對準框內。";
        return;
      } catch (err1) {
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
          );
          scannerRunning = true;
          startBtn.style.display = "none";
          stopBtn.style.display = "block";
          statusEl.textContent = "鏡頭已啟動，請將 QR code 對準框內。";
          return;
        } catch (err2) {
          statusEl.textContent = "無法開啟後置鏡頭，請確認相機權限是否允許，或改用 Safari / Chrome。";
        }
      }
    }

    async function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;
      try { await html5QrCode.stop(); } catch (e) {}
      scannerRunning = false;
      stopBtn.style.display = "none";
      startBtn.style.display = "block";
      statusEl.textContent = "已停止掃描。";
    }

    syncPhoneFromUrl();
    setNavLinks();
    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);
  </script>
</body>
</html>
