<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>方舟植物展覽｜專屬紀念拍立得</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2c4c3b; --accent: #d4a373; }
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: "Noto Sans TC", sans-serif; overflow: hidden; }
    
    #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
    #overlay-graphic { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; display: none; }
    
    /* ★ 安全啟動畫面背景：發光蕨類 */
    #start-screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: url('https://images.unsplash.com/photo-1595180473268-2ddcc696e57a?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat; z-index: 50; }
    .start-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:-1;}
    .btn-start-cam { background: var(--accent); color: white; padding: 18px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); cursor: pointer; }
    
    .frame-selector { position: absolute; top: 30px; left: 0; width: 100%; z-index: 10; display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px; box-sizing: border-box; scrollbar-width: none; -ms-overflow-style: none; display: none; }
    .frame-selector::-webkit-scrollbar { display: none; }
    .frame-thumb { width: 70px; height: 70px; flex-shrink: 0; object-fit: cover; border-radius: 12px; border: 3px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); transition: 0.2s; cursor: pointer; }
    .frame-thumb.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    .controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px 40px; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index: 10; display: flex; justify-content: center; align-items: center; display: none; }
    .btn-capture { background: var(--accent); color: white; width: 80px; height: 80px; border-radius: 50%; padding: 0; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; transition: 0.2s; z-index: 10; touch-action: manipulation; -webkit-tap-highlight-color: transparent;}
    .btn-capture:active { transform: scale(0.9); }
    
    .btn-home { position: absolute; bottom: 40px; left: 30px; z-index: 15; background: rgba(255,255,255,0.8); color: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; text-decoration: none; touch-action: manipulation; display: none;}
    .btn-switch { position: absolute; bottom: 40px; right: 30px; z-index: 15; background: rgba(255,255,255,0.8); color: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; touch-action: manipulation; display: none;}
    
    #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-modal { display: flex; flex-direction: column; align-items: center; width: 85%; max-width: 400px; }
    .hint { color: #fff; font-size: 16px; font-weight: 700; margin-bottom: 20px; letter-spacing: 1px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    #result-image { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 30px; }
    
    .btn-retake { background: #fff; color: #333; border: none; border-radius: 25px; padding: 16px 0; width: 100%; font-size: 18px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; margin-bottom: 15px; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .btn-home-text { background: transparent; color: #aaa; border: none; font-size: 15px; text-decoration: underline; cursor: pointer; touch-action: manipulation; }
    
    #canvas { display: none; }
  </style>
</head>
<body>

  <!-- ★ 安全啟動畫面 -->
  <div id="start-screen">
    <div class="start-overlay"></div>
    <button class="btn-start-cam" id="initCameraBtn">📷 點擊允許啟動相機</button>
    <a href="index.html" style="color:#aaa; margin-top:20px; text-decoration:none;">返回首頁</a>
  </div>

  <a class="btn-home" href="index.html" id="uiHome">🏠</a>
  <button class="btn-switch" id="switchCameraBtn">🔄</button>
  
  <video id="camera-feed" autoplay playsinline></video>
  <img id="overlay-graphic" src="./ar_1.png" crossorigin="anonymous">

  <div class="frame-selector" id="frameSelector">
    <img class="frame-thumb active" src="./ar_1.png" onclick="changeFrame(1, this)">
    <img class="frame-thumb" src="./ar_2.png" onclick="changeFrame(2, this)" onerror="this.style.display='none'">
    <img class="frame-thumb" src="./ar_3.png" onclick="changeFrame(3, this)" onerror="this.style.display='none'">
    <img class="frame-thumb" src="./ar_4.png" onclick="changeFrame(4, this)" onerror="this.style.display='none'">
  </div>

  <div class="controls" id="controls">
    <button class="btn-capture" id="captureBtn">📸</button>
  </div>

  <div id="result-screen">
    <div class="result-modal">
      <div class="hint">請輕觸長按下載或分享照片</div>
      <img id="result-image" src="" alt="合成結果">
      <button class="btn-retake" id="retakeBtn">重新拍攝</button>
      <button class="btn-home-text" onclick="window.location.href='index.html'">回到展區首頁</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const overlay = document.getElementById('overlay-graphic');
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const captureBtn = document.getElementById('captureBtn');
    const resultScreen = document.getElementById('result-screen');
    const resultImage = document.getElementById('result-image');
    const retakeBtn = document.getElementById('retakeBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    
    let currentStream = null;
    let useFrontCamera = false;

    function changeFrame(num, element) {
      overlay.src = `./ar_${num}.png`;
      document.querySelectorAll('.frame-thumb').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
    }

    async function startCamera() {
      if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
      const constraints = { video: { facingMode: useFrontCamera ? "user" : "environment", width: { ideal: 1280 }, height: { ideal: 720 } } };
      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
        
        document.getElementById('start-screen').style.display = 'none';
        video.style.display = 'block';
        overlay.style.display = 'block';
        document.getElementById('frameSelector').style.display = 'flex';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('uiHome').style.display = 'flex';
        switchCameraBtn.style.display = 'flex';

      } catch (err) { 
        alert("無法開啟相機，請確認是否已給予瀏覽器相機權限！"); 
      }
    }

    document.getElementById('initCameraBtn').addEventListener('click', startCamera);

    switchCameraBtn.addEventListener('click', () => {
      useFrontCamera = !useFrontCamera;
      startCamera();
    });

    function drawImageCover(ctx, source, canvasWidth, canvasHeight, isMirror = false) {
      const sourceWidth = source.videoWidth || source.naturalWidth;
      const sourceHeight = source.videoHeight || source.naturalHeight;
      if (!sourceWidth || !sourceHeight) return;

      const sourceRatio = sourceWidth / sourceHeight;
      const canvasRatio = canvasWidth / canvasHeight;
      let drawWidth, drawHeight, startX, startY;

      if (sourceRatio > canvasRatio) {
        drawHeight = canvasHeight;
        drawWidth = sourceWidth * (canvasHeight / sourceHeight);
        startX = (canvasWidth - drawWidth) / 2;
        startY = 0;
      } else {
        drawWidth = canvasWidth;
        drawHeight = sourceHeight * (canvasWidth / sourceWidth);
        startX = 0;
        startY = (canvasHeight - drawHeight) / 2;
      }

      ctx.save();
      if (isMirror) { ctx.translate(canvasWidth, 0); ctx.scale(-1, 1); }
      ctx.drawImage(source, startX, startY, drawWidth, drawHeight);
      ctx.restore();
    }

    captureBtn.addEventListener('click', () => {
      canvas.width = video.offsetWidth; canvas.height = video.offsetHeight;
      drawImageCover(ctx, video, canvas.width, canvas.height, useFrontCamera);
      drawImageCover(ctx, overlay, canvas.width, canvas.height, false);

      const dataUrl = canvas.toDataURL('image/png', 0.9);
      resultImage.src = dataUrl;
      
      document.getElementById('controls').style.display = 'none';
      document.getElementById('frameSelector').style.display = 'none';
      overlay.style.display = 'none';
      switchCameraBtn.style.display = 'none';
      document.getElementById('uiHome').style.display = 'none';
      resultScreen.style.display = 'flex';
    });

    retakeBtn.addEventListener('click', () => {
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('frameSelector').style.display = 'flex';
      overlay.style.display = 'block';
      switchCameraBtn.style.display = 'flex';
      document.getElementById('uiHome').style.display = 'flex';
      resultScreen.style.display = 'none';
    });
  </script>
</body>
</html>
