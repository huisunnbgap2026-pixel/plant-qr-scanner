<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>方舟植物展覽｜專屬紀念拍立得</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #2c4c3b; --accent: #d4a373; }
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; font-family: "Noto Sans TC", sans-serif; overflow: hidden; }
    
    #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    /* ★ 移除了半透明效果，請務必使用去背 PNG 當相框 ★ */
    #overlay-graphic { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
    
    .frame-selector {
      position: absolute; top: 30px; left: 0; width: 100%; z-index: 10;
      display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px; box-sizing: border-box;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .frame-selector::-webkit-scrollbar { display: none; }
    .frame-thumb {
      width: 70px; height: 70px; flex-shrink: 0; object-fit: cover; border-radius: 12px;
      border: 3px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
      transition: 0.2s; cursor: pointer;
    }
    .frame-thumb.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    .controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px 40px; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index: 10; display: flex; justify-content: center; align-items: center; }
    .btn-capture { background: var(--accent); color: white; width: 80px; height: 80px; border-radius: 50%; padding: 0; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-size: 35px; cursor: pointer; transition: 0.2s; z-index: 10;}
    .btn-capture:active { transform: scale(0.9); }
    
    /* ★ 左下角回首頁按鈕 ★ */
    .btn-home { position: absolute; bottom: 40px; left: 30px; z-index: 15; background: rgba(255,255,255,0.8); color: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; text-decoration: none; touch-action: manipulation; }
    .btn-switch { position: absolute; bottom: 40px; right: 30px; z-index: 15; background: rgba(255,255,255,0.8); color: var(--primary); border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; touch-action: manipulation; }
    
    #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; }
    #result-image { width: 100%; height: 100%; object-fit: cover; }
    
    .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; pointer-events: none; }
    .hint { background: rgba(0,0,0,0.6); color: white; padding: 12px 20px; border-radius: 30px; font-size: 18px; font-weight: bold; text-align: center; margin: 0 auto; pointer-events: auto; backdrop-filter: blur(5px); }
    .result-actions { display: flex; gap: 15px; justify-content: center; pointer-events: auto; margin-bottom: 20px;}
    .btn { background: #fff; color: var(--primary); border: none; border-radius: 20px; padding: 16px 24px; font-size: 18px; font-weight: 700; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; text-decoration: none; }
    
    #canvas { display: none; }
  </style>
</head>
<body>

  <!-- 左下角與右下角的控制按鈕 -->
  <a class="btn-home" href="index.html">🏠</a>
  <button class="btn-switch" id="switchCameraBtn">🔄</button>
  
  <video id="camera-feed" autoplay playsinline></video>
  <img id="overlay-graphic" src="./ar_1.png" crossorigin="anonymous">

  <div class="frame-selector" id="frameSelector">
    <img class="frame-thumb active" src="./ar_1.png" onclick="changeFrame(1, this)">
    <img class="frame-thumb" src="./ar_2.png" onclick="changeFrame(2, this)" onerror="this.style.display='none'">
    <img class="frame-thumb" src="./ar_3.png" onclick="changeFrame(3, this)" onerror="this.style.display='none'">
    <img class="frame-thumb" src="./ar_4.png" onclick="changeFrame(4, this)" onerror="this.style.display='none'">
  </div>

  <div class="controls" id="controls">
    <button class="btn-capture" id="captureBtn">📸</button>
  </div>

  <div id="result-screen">
    <img id="result-image" src="" alt="合成結果">
    <div class="result-overlay">
      <div class="hint">✨ 拍照成功！長按圖片即可儲存 ✨</div>
      <div class="result-actions">
        <button class="btn" id="retakeBtn">🔄 重拍</button>
        <button class="btn" style="background:var(--primary); color:white;" onclick="window.location.href='index.html'">🏠 回首頁</button>
      </div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const overlay = document.getElementById('overlay-graphic');
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const captureBtn = document.getElementById('captureBtn');
    const resultScreen = document.getElementById('result-screen');
    const resultImage = document.getElementById('result-image');
    const retakeBtn = document.getElementById('retakeBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    
    let currentStream = null;
    let useFrontCamera = false;

    function changeFrame(num, element) {
      overlay.src = `./ar_${num}.png`;
      document.querySelectorAll('.frame-thumb').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
    }

    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      const constraints = { video: { facingMode: useFrontCamera ? "user" : "environment" } };
      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
      } catch (err) { 
        alert("無法開啟相機，請確認是否已給予瀏覽器權限！"); 
      }
    }

    switchCameraBtn.addEventListener('click', () => {
      useFrontCamera = !useFrontCamera;
      startCamera();
    });

    function drawImageCover(ctx, source, canvasWidth, canvasHeight, isMirror = false) {
      const sourceWidth = source.videoWidth || source.naturalWidth;
      const sourceHeight = source.videoHeight || source.naturalHeight;
      if (!sourceWidth || !sourceHeight) return;

      const sourceRatio = sourceWidth / sourceHeight;
      const canvasRatio = canvasWidth / canvasHeight;
      let drawWidth, drawHeight, startX, startY;

      if (sourceRatio > canvasRatio) {
        drawHeight = canvasHeight;
        drawWidth = sourceWidth * (canvasHeight / sourceHeight);
        startX = (canvasWidth - drawWidth) / 2;
        startY = 0;
      } else {
        drawWidth = canvasWidth;
        drawHeight = sourceHeight * (canvasWidth / sourceWidth);
        startX = 0;
        startY = (canvasHeight - drawHeight) / 2;
      }

      ctx.save();
      if (isMirror) {
        ctx.translate(canvasWidth, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(source, startX, startY, drawWidth, drawHeight);
      ctx.restore();
    }

    captureBtn.addEventListener('click', () => {
      canvas.width = video.offsetWidth; 
      canvas.height = video.offsetHeight;
      
      // 畫上相機畫面
      drawImageCover(ctx, video, canvas.width, canvas.height, useFrontCamera);

      // 畫上相框 (已移除半透明，直接疊加)
      drawImageCover(ctx, overlay, canvas.width, canvas.height, false);

      const dataUrl = canvas.toDataURL('image/png', 0.9);
      resultImage.src = dataUrl;
      
      document.getElementById('controls').style.display = 'none';
      document.getElementById('frameSelector').style.display = 'none';
      overlay.style.display = 'none';
      switchCameraBtn.style.display = 'none';
      document.querySelector('.btn-home').style.display = 'none';
      resultScreen.style.display = 'flex';
    });

    retakeBtn.addEventListener('click', () => {
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('frameSelector').style.display = 'flex';
      overlay.style.display = 'block';
      switchCameraBtn.style.display = 'flex';
      document.querySelector('.btn-home').style.display = 'flex';
      resultScreen.style.display = 'none';
    });

    window.onload = startCamera;
  </script>
</body>
</html>
