<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方舟植物展覽｜植物探索</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary-dark: #1e362d; --primary-light: #4a7c59; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif; color: var(--primary-dark);
      background: url('https://images.unsplash.com/photo-1463320726281-696a485928c7?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
    }
    .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; background: rgba(0,0,0,0.3); }
    
    .glass-card {
      width: min(92vw, 420px); background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 24px; padding: 40px 30px; text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.6);
    }
    h1 { margin: 0 0 15px; font-size: 28px; font-weight: 900; }
    #status { margin: 0 0 20px; font-size: 18px; line-height: 1.6; color: #333; font-weight: 700;}
    
    .btn {
      width: 100%; box-sizing: border-box; border-radius: 16px; padding: 18px 12px;
      font-size: 18px; font-weight: 900; margin-top: 14px; text-decoration: none; display: block; text-align: center; transition: 0.3s; border: none;
    }
    .btn.primary { background: linear-gradient(135deg, var(--primary-light), var(--primary-dark)); color: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .btn.primary:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="page">
    <div class="glass-card">
      <h1>🌿 植物探索中</h1>
      <p id="status">正在存取您的集點紀錄…</p>
      
      <div id="actionBox" style="display:none;">
        <a id="goBtn" class="btn primary" href="#">進入植物介紹</a>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    function normalizePhone(p) { return String(p||"").replace(/\D/g,"").trim(); }
    function getParam(n) { return new URL(window.location.href).searchParams.get(n) || ""; }
    function normalizePageUrl(url) { let u = String(url||"").trim(); try{ u=decodeURIComponent(u); }catch(e){} if(!/^https?:\/\//i.test(u)) return ""; return u; }

    const plantId = getParam("plant");
    const pageUrl = normalizePageUrl(getParam("page"));
    const phone = normalizePhone(getParam("phone") || localStorage.getItem("savedPhone"));

    window.onload = () => {
      if (!phone) { window.location.replace("index.html"); return; }
      if (!plantId) { document.getElementById('status').innerText = "條碼無效，請重試。"; return; }

      document.getElementById('status').innerText = "✅ 紀錄成功！正在自動跳轉...";
      
      // 自動跳轉
      if (pageUrl) {
        setTimeout(() => { window.location.replace(pageUrl); }, 1000);
      } else {
        document.getElementById('status').innerText = "紀錄成功！請回上一頁繼續探索。";
      }
    };
  </script>
</body>
</html>
