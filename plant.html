<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>紀錄成功</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #fff; background-color: #111a13; display: flex; flex-direction: column; justify-content: center; align-items: center;}
    .bg-fixed { position: fixed; inset: 0; width: 100vw; height: 100vh; background: url('https://i.imgur.com/8QoN3Wl.jpeg') center/cover no-repeat; z-index: -1; opacity: 0.8; }
    .card { width: 90%; max-width: 350px; background: rgba(22, 36, 25, 0.95); border-radius: 28px; padding: 40px 30px; text-align: center; border: 1px solid #2a3d2e; }
    .icon { font-size: 50px; margin-bottom: 15px; }
    h1 { margin: 0 0 10px; font-size: 24px; font-weight: 900; color: #d4edda; }
    p { margin: 0; font-size: 15px; color: #a3b8a8; }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #d4a373; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto 0; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>
  <div class="card">
    <div class="icon">🎉</div>
    <h1 id="titleText">探索紀錄成功</h1>
    <p id="subText">正在為您開啟植物介紹頁面...</p>
    <div class="spinner" id="spinner"></div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');
    const msg = urlParams.get('msg');

    if (msg) document.getElementById('titleText').innerText = decodeURIComponent(msg);

    // ★ 只要按上一頁回到這裡，立刻退回掃描站，不准停留
    window.addEventListener("pageshow", function(e) {
      if (e.persisted || sessionStorage.getItem('justVisitedPlant') === 'true') {
        sessionStorage.removeItem('justVisitedPlant');
        window.location.replace("scanner.html");
      }
    });

    window.onload = () => {
      if (targetUrl) {
        setTimeout(() => {
          sessionStorage.setItem('justVisitedPlant', 'true');
          window.location.href = decodeURIComponent(targetUrl);
        }, 1200);
      } else {
        document.getElementById('subText').innerText = "點數已發送！準備返回相機...";
        setTimeout(() => { window.location.replace("scanner.html"); }, 1500);
      }
    };
  </script>
</body>
</html>
