<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物探索導覽站</title>
  <style>
    :root{
      --bg1:#f6f2e8;
      --bg2:#e8f1e4;
      --bg3:#d8e6d1;
      --card:#ffffff;
      --text:#213227;
      --muted:#5f6f62;
      --primary:#3f6e49;
      --primary-dark:#2f5838;
      --soft:#eef5ea;
      --border:#d5e0d0;
      --shadow:0 10px 24px rgba(43,70,47,.08);
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      padding:22px 14px 38px;
      font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(130,165,110,.18), transparent 18%),
        radial-gradient(circle at 92% 14%, rgba(110,150,100,.14), transparent 18%),
        radial-gradient(circle at 18% 88%, rgba(170,190,130,.15), transparent 16%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg3) 100%);
      font-size:18px;
      position:relative;
      overflow-x:hidden;
    }

    body:before,
    body:after{
      position:fixed;
      pointer-events:none;
      opacity:.12;
      z-index:0;
      font-size:88px;
      line-height:1;
    }

    body:before{
      content:"🍃";
      left:10px;
      top:68px;
      transform:rotate(-8deg);
    }

    body:after{
      content:"🌿";
      right:14px;
      bottom:42px;
      transform:rotate(10deg);
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      position:relative;
      z-index:1;
    }

    .hero{
      margin-bottom:18px;
      padding:28px 24px 24px;
      border-radius:28px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.14), transparent 24%),
        linear-gradient(140deg, rgba(54,92,61,.98), rgba(92,133,94,.94) 52%, rgba(131,164,110,.92) 100%);
      color:#fff;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:auto -30px -36px -30px;
      height:92px;
      background:
        radial-gradient(circle at 8% 100%, rgba(34,56,38,.28) 0 16%, transparent 17%),
        radial-gradient(circle at 22% 100%, rgba(34,56,38,.22) 0 17%, transparent 18%),
        radial-gradient(circle at 40% 100%, rgba(34,56,38,.18) 0 18%, transparent 19%),
        radial-gradient(circle at 58% 100%, rgba(34,56,38,.22) 0 16%, transparent 17%),
        radial-gradient(circle at 76% 100%, rgba(34,56,38,.24) 0 16%, transparent 17%),
        radial-gradient(circle at 92% 100%, rgba(34,56,38,.2) 0 15%, transparent 16%);
    }

    .hero h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.25;
      position:relative;
      z-index:1;
    }

    .hero p{
      margin:0;
      font-size:18px;
      line-height:1.9;
      color:rgba(255,255,255,.96);
      position:relative;
      z-index:1;
    }

    .hero-ornaments{
      display:flex;
      gap:10px;
      margin-top:16px;
      position:relative;
      z-index:1;
      flex-wrap:wrap;
    }

    .hero-ornaments span{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:42px;
      height:42px;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      font-size:21px;
    }

    .card{
      background:rgba(255,255,255,.94);
      border:2px solid var(--border);
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
      backdrop-filter:blur(2px);
    }

    .section-title{
      font-size:14px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    h2{
      margin:0 0 12px;
      font-size:28px;
      line-height:1.35;
    }

    p{
      margin:0 0 14px;
      line-height:1.9;
      color:var(--muted);
      font-size:18px;
    }

    .lead{
      font-size:19px;
      color:var(--text);
    }

    .status-box{
      margin-top:14px;
      padding:16px 18px;
      border-radius:20px;
      background:#f8fbf5;
      border:2px solid #dbe6d6;
      text-align:left;
    }

    .status-label{
      font-size:16px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .status-text{
      font-size:22px;
      color:var(--text);
      line-height:1.8;
      font-weight:700;
    }

    .feature{
      border:2px solid #dbe6d6;
      background:#f8fbf5;
      border-radius:20px;
      padding:18px;
    }

    .feature p{
      margin-bottom:0;
      font-size:18px;
      color:var(--text);
    }

    .forest-row{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
      margin-top:16px;
    }

    .forest-pill{
      border-radius:18px;
      background:linear-gradient(135deg, #f7fbf4, #edf5e8);
      border:2px solid #dbe6d6;
      padding:12px 10px;
      text-align:center;
      font-size:16px;
      color:#39543f;
      font-weight:700;
    }

    input, button, a.btn{
      width:100%;
      display:block;
      box-sizing:border-box;
      border-radius:18px;
      padding:18px 16px;
      font-size:20px;
      margin-top:14px;
      text-decoration:none;
      border:0;
      text-align:center;
    }

    input{
      background:#fffefb;
      border:2px solid #d8e1d2;
      color:var(--text);
      outline:none;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.03);
    }

    input:focus{
      border-color:#89a57d;
      box-shadow:0 0 0 4px rgba(121,158,106,.12);
    }

    button.primary, a.btn.primary{
      background:linear-gradient(135deg, var(--primary), var(--primary-dark));
      color:#fff;
      cursor:pointer;
      font-weight:700;
      box-shadow:0 8px 18px rgba(63,110,73,.18);
    }

    a.btn.secondary{
      background:var(--soft);
      color:var(--text);
      border:2px solid #dbe6d6;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:8px;
    }

    #manualBox{ display:none; }
    #actionBox{ display:none; }

    @media (max-width:700px){
      body{ padding:16px 12px 28px; }
      .hero{ padding:24px 18px 20px; border-radius:22px; }
      .hero h1{ font-size:28px; }
      .hero p{ font-size:17px; }
      .card{ padding:18px; border-radius:20px; }
      h2{ font-size:24px; }
      p{ font-size:17px; }
      .status-text{ font-size:20px; }
      input, button, a.btn{ font-size:19px; padding:17px 14px; }
      .forest-row{ grid-template-columns:repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>植物探索導覽站</h1>
      <p>走進森林植物路徑，系統會先完成探索紀錄，再帶你前往植物介紹頁面。</p>
      <div class="hero-ornaments">
        <span>🌿</span>
        <span>🍃</span>
        <span>🌱</span>
        <span>🌼</span>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Plant Guide</div>
      <h2>植物探索入口</h2>
      <p class="lead">掃描植物牌後，會先記錄探索，再前往植物介紹頁。</p>

      <div class="status-box">
        <div class="status-label">目前狀態</div>
        <div id="status" class="status-text">正在準備導覽…</div>
      </div>

      <div id="manualBox">
        <div class="feature" style="margin-top:16px;">
          <p>🌲 進入森林探索前，請先輸入你的手機號碼，系統會用來累積植物蒐集與植物達人認證。</p>
        </div>

        <div class="forest-row">
          <div class="forest-pill">🌲 森林入口</div>
          <div class="forest-pill">🍀 植物蒐集</div>
          <div class="forest-pill">🪴 導覽任務</div>
          <div class="forest-pill">🏅 達人認證</div>
        </div>

        <label for="phoneInput" style="display:block; margin-top:18px; margin-bottom:8px; font-size:16px; color:#5f6f62; font-weight:700;">
          手機號碼
        </label>
        <input id="phoneInput" type="text" placeholder="例如：0912345678" inputmode="numeric" autocomplete="off" autocorrect="off" autocapitalize="off">
        <button id="savePhoneBtn" class="primary">開始森林探索</button>
      </div>

      <div id="actionBox">
        <a id="goBtn" class="btn primary" href="#" target="_top">重新前往植物介紹頁</a>

        <div class="grid">
          <a id="scanBtn" class="btn secondary" href="#" target="_top">繼續探索植物</a>
          <a id="queryBtn" class="btn secondary" href="#" target="_top">查看探索進度</a>
          <a id="rewardBtn" class="btn secondary" href="#" target="_top">查看探索獎勵</a>
          <a id="homeBtn" class="btn secondary" href="#" target="_top">返回展區首頁</a>
        </div>

        <div class="feature" style="margin-top:16px;">
          <p>若沒有自動跳轉，可直接按上方按鈕重新進入植物介紹頁。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";
    const SCANNER_URL = "https://huisunnbgap2026-pixel.github.io/plant-qr-scanner/index.html";
    const AUTO_KEY = "plant_auto_opened_";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function openTarget(url) {
      try {
        window.location.replace(url);
      } catch (e) {
        window.location.href = url;
      }
    }

    const plantId = getParam("plant");
    const pageUrl = getParam("page");
    const phoneFromUrl = normalizePhone(getParam("phone"));

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const actionBox = document.getElementById("actionBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");

    const goBtn = document.getElementById("goBtn");
    const scanBtn = document.getElementById("scanBtn");
    const queryBtn = document.getElementById("queryBtn");
    const rewardBtn = document.getElementById("rewardBtn");
    const homeBtn = document.getElementById("homeBtn");

    let redirected = false;
    let pendingScript = null;
    let pendingCallbackName = null;
    let pendingTimer = null;
    let redirectTimer = null;

    function getCurrentPhone() {
      if (phoneFromUrl) return phoneFromUrl;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function syncPhone() {
      const phone = getCurrentPhone();
      if (phone) localStorage.setItem("savedPhone", phone);
      return phone;
    }

    function getAutoKey(phone) {
      return AUTO_KEY + plantId + "_" + normalizePhone(phone);
    }

    function setActionLinks(phone) {
      const homeUrl = buildUrl(APP_URL, { mode: "home", phone: phone });
      const queryUrl = buildUrl(APP_URL, { mode: "query", phone: phone });
      const rewardUrl = buildUrl(APP_URL, { mode: "rewards", phone: phone });
      const scanUrl = buildUrl(SCANNER_URL, {
        phone: phone,
        home: homeUrl
      });

      goBtn.href = pageUrl;
      scanBtn.href = scanUrl;
      queryBtn.href = queryUrl;
      rewardBtn.href = rewardUrl;
      homeBtn.href = homeUrl;
    }

    function showActionBox() {
      actionBox.style.display = "block";
    }

    function cleanupPending() {
      if (pendingTimer) {
        clearTimeout(pendingTimer);
        pendingTimer = null;
      }

      if (redirectTimer) {
        clearTimeout(redirectTimer);
        redirectTimer = null;
      }

      if (pendingScript && pendingScript.parentNode) {
        pendingScript.parentNode.removeChild(pendingScript);
      }
      pendingScript = null;

      if (pendingCallbackName && window[pendingCallbackName]) {
        try {
          delete window[pendingCallbackName];
        } catch (e) {
          window[pendingCallbackName] = undefined;
        }
      }
      pendingCallbackName = null;
    }

    function redirectToPlantPage(delayMs) {
      if (redirected) return;
      redirected = true;
      cleanupPending();

      statusEl.textContent = "正在前往植物介紹頁…";

      redirectTimer = setTimeout(function() {
        openTarget(pageUrl);
      }, delayMs || 0);
    }

    function startJsonpRecord(phone) {
      const callbackName = "plantMarkDone_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      pendingCallbackName = callbackName;

      window[callbackName] = function(data) {
        statusEl.textContent = "探索紀錄完成，正在前往植物介紹頁…";
        redirectToPlantPage(120);
      };

      const jsonpUrl = buildUrl(APP_URL, {
        mode: "plant_mark_jsonp",
        plant: plantId,
        phone: phone,
        callback: callbackName,
        _: Date.now().toString()
      });

      const script = document.createElement("script");
      pendingScript = script;
      script.src = jsonpUrl;

      script.onerror = function() {
        statusEl.textContent = "正在前往植物介紹頁…";
        redirectToPlantPage(250);
      };

      document.body.appendChild(script);

      pendingTimer = setTimeout(function() {
        statusEl.textContent = "正在前往植物介紹頁…";
        redirectToPlantPage(250);
      }, 2500);
    }

    function startWithPhone(phone) {
      const normalizedPhone = normalizePhone(phone);
      if (!normalizedPhone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      if (!plantId || !pageUrl) {
        statusEl.textContent = "缺少植物資料，請重新掃描 QR code。";
        return;
      }

      localStorage.setItem("savedPhone", normalizedPhone);
      setActionLinks(normalizedPhone);
      showActionBox();

      const alreadyAutoOpened = sessionStorage.getItem(getAutoKey(normalizedPhone)) === "1";
      if (alreadyAutoOpened) {
        statusEl.textContent = "你已回到植物探索站，可重新進入植物介紹，或使用下方功能按鈕。";
        return;
      }

      sessionStorage.setItem(getAutoKey(normalizedPhone), "1");
      statusEl.textContent = "正在記錄探索並開啟植物介紹頁…";
      startJsonpRecord(normalizedPhone);
    }

    function start() {
      if (!plantId || !pageUrl) {
        statusEl.textContent = "缺少植物資料，請重新掃描 QR code。";
        return;
      }

      window.addEventListener("load", function () {
        if (phoneInput) phoneInput.value = "";
      });

      const currentPhone = syncPhone();

      if (!currentPhone) {
        statusEl.textContent = "請先輸入手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      startWithPhone(currentPhone);
    }

    savePhoneBtn.addEventListener("click", function () {
      const phone = normalizePhone(phoneInput.value);
      if (!phone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        return;
      }

      manualBox.style.display = "none";
      startWithPhone(phone);
    });

    start();
  </script>
</body>
</html>
