<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>紀錄成功｜方舟植物展覽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #fff; background-color: #111a13; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden;}
    .bg-fixed { position: fixed; inset: 0; width: 100vw; height: 100vh; background: url('https://i.imgur.com/gK1qB0U.jpeg') center/cover no-repeat; z-index: -1; opacity: 0.6; }
    .card { width: 90%; max-width: 350px; background: rgba(22, 36, 25, 0.95); border-radius: 28px; padding: 40px 30px; text-align: center; border: 1px solid #2a3d2e; }
    .icon { font-size: 50px; margin-bottom: 15px; }
    h1 { margin: 0 0 10px; font-size: 24px; font-weight: 900; color: #d4edda; }
    p { margin: 0; font-size: 15px; color: #a3b8a8; }
  </style>
</head>
<body>
  <div class="bg-fixed"></div>
  <div class="card">
    <div class="icon">🎉</div>
    <h1 id="titleText">紀錄成功</h1>
    <p id="subText">正在為您開啟植物介紹頁面...</p>
  </div>
  <script>
    window.addEventListener("pageshow", function(e) {
      if (e.persisted || sessionStorage.getItem('justVisitedPlant') === 'true') {
        sessionStorage.removeItem('justVisitedPlant');
        document.getElementById('titleText').innerText = "準備繼續探索...";
        document.getElementById('subText').innerText = "正在返回相機";
        window.location.replace("scanner.html");
      }
    });

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const targetUrl = urlParams.get('url');
      const msg = urlParams.get('msg');
      if (msg) document.getElementById('titleText').innerText = decodeURIComponent(msg);
      if (targetUrl) {
        setTimeout(() => {
          sessionStorage.setItem('justVisitedPlant', 'true');
          window.location.href = decodeURIComponent(targetUrl);
        }, 1500); // 停頓 1.5 秒後跳轉
      } else {
        setTimeout(() => { window.location.replace("scanner.html"); }, 1500);
      }
    };
  </script>
</body>
</html>
