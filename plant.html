<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>植物探索導覽站</title>
  <style>
    html,body{
      margin:0;
      padding:0;
      background:#edf5ec;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    }
    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .box{
      width:min(92vw,460px);
      background:#fffef9;
      border:2px solid #d6e3d3;
      border-radius:18px;
      padding:22px 18px;
      text-align:center;
      box-shadow:0 8px 20px rgba(63,93,66,.08);
    }
    h1{
      margin:0 0 12px;
      font-size:24px;
      color:#27352a;
    }
    p{
      margin:0 0 14px;
      font-size:16px;
      line-height:1.8;
      color:#627063;
    }
    input,button,a.btn{
      width:100%;
      box-sizing:border-box;
      border-radius:14px;
      padding:14px 12px;
      font-size:17px;
      margin-top:12px;
      text-decoration:none;
      display:block;
      text-align:center;
    }
    input{
      border:2px solid #d6e3d3;
      background:#fff;
    }
    button, a.btn.primary{
      border:0;
      background:linear-gradient(135deg,#55795c,#3f5d45);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    a.btn.secondary{
      background:#eef5ea;
      color:#27352a;
      border:2px solid #d6e3d3;
    }
    #manualBox,#actionBox{
      display:none;
      margin-top:16px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="box">
      <h1>植物探索中</h1>
      <p id="status">正在處理植物探索紀錄…</p>

      <div id="manualBox">
        <p>請先輸入手機號碼，再前往植物介紹頁。</p>
        <input id="phoneInput" type="text" placeholder="例如：0912345678" inputmode="numeric">
        <button id="savePhoneBtn" type="button">繼續</button>
      </div>

      <div id="actionBox">
        <a id="goBtn" class="btn primary" href="#">前往植物介紹頁</a>
        <a id="homeBtn" class="btn secondary" href="#">回首頁</a>
      </div>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyoFlYdQfjyJUu0onsq2DOI5wZJmRcNI2maSEbU7b5uKiSQmajfFRJGYL8OisrhhNUYKg/exec";

    function normalizePhone(phone) {
      let p = String(phone || "").replace(/\D/g, "").trim();
      if (p.length === 9 && p.startsWith("9")) p = "0" + p;
      return p;
    }

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    function buildUrl(base, params) {
      const u = new URL(base);
      Object.keys(params).forEach(function(key) {
        if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
          u.searchParams.set(key, params[key]);
        }
      });
      return u.toString();
    }

    function normalizePageUrl(url) {
      let u = String(url || "").trim();
      if (!u) return "";
      try { u = decodeURIComponent(u); } catch (e) {}
      u = u.replace(/\s+/g, "");
      if (/^sites\.google\.com\//i.test(u)) u = "https://" + u;
      if (/^\/view\//i.test(u)) u = "https://sites.google.com" + u;
      if (!/^https?:\/\//i.test(u)) return "";
      return u;
    }

    function go(url) {
      if (!url) return;
      try { window.top.location.replace(url); }
      catch (e) { window.location.replace(url); }
    }

    const plantId = getParam("plant");
    const pageUrl = normalizePageUrl(getParam("page"));
    const phoneFromUrl = normalizePhone(getParam("phone"));

    const statusEl = document.getElementById("status");
    const manualBox = document.getElementById("manualBox");
    const actionBox = document.getElementById("actionBox");
    const phoneInput = document.getElementById("phoneInput");
    const savePhoneBtn = document.getElementById("savePhoneBtn");
    const goBtn = document.getElementById("goBtn");
    const homeBtn = document.getElementById("homeBtn");

    let pendingScript = null;
    let pendingCallbackName = null;
    let pendingTimer = null;
    let finished = false;

    function cleanupPending() {
      if (pendingTimer) {
        clearTimeout(pendingTimer);
        pendingTimer = null;
      }
      if (pendingScript && pendingScript.parentNode) {
        pendingScript.parentNode.removeChild(pendingScript);
      }
      pendingScript = null;
      if (pendingCallbackName && window[pendingCallbackName]) {
        try { delete window[pendingCallbackName]; }
        catch (e) { window[pendingCallbackName] = undefined; }
      }
      pendingCallbackName = null;
    }

    function getCurrentPhone() {
      if (phoneFromUrl) return phoneFromUrl;
      return normalizePhone(localStorage.getItem("savedPhone") || "");
    }

    function showActions(phone) {
      actionBox.style.display = "block";
      goBtn.href = pageUrl || "#";
      homeBtn.href = buildUrl(APP_URL, { mode: "home", phone: phone });
    }

    function finishAndGo(phone, text) {
      if (finished) return;
      finished = true;
      cleanupPending();
      statusEl.textContent = text || "正在前往植物介紹頁…";
      showActions(phone);
      setTimeout(function() {
        go(pageUrl);
      }, 250);
    }

    function startJsonpRecord(phone) {
      const callbackName = "plantMarkDone_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
      pendingCallbackName = callbackName;

      window[callbackName] = function(data) {
        if (data && data.success === false) {
          finishAndGo(phone, data.message || "已記錄探索，正在前往植物介紹頁…");
          return;
        }
        finishAndGo(phone, "探索紀錄完成，正在前往植物介紹頁…");
      };

      const jsonpUrl = buildUrl(APP_URL, {
        mode: "plant_mark_jsonp",
        plant: plantId,
        phone: phone,
        callback: callbackName,
        _: Date.now().toString()
      });

      const script = document.createElement("script");
      pendingScript = script;
      script.src = jsonpUrl;

      script.onerror = function() {
        finishAndGo(phone, "已送出探索紀錄，正在前往植物介紹頁…");
      };

      document.body.appendChild(script);

      pendingTimer = setTimeout(function() {
        finishAndGo(phone, "正在前往植物介紹頁…");
      }, 2200);
    }

    function startWithPhone(phone) {
      const normalizedPhone = normalizePhone(phone);

      if (!normalizedPhone) {
        statusEl.textContent = "請先輸入正確手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      if (!plantId) {
        statusEl.textContent = "缺少 plant 參數，請重新掃描 QR code。";
        return;
      }

      if (!pageUrl) {
        statusEl.textContent = "植物頁網址無效，請檢查 QR code。";
        showActions(normalizedPhone);
        return;
      }

      localStorage.setItem("savedPhone", normalizedPhone);
      statusEl.textContent = "正在處理植物探索紀錄…";
      showActions(normalizedPhone);
      startJsonpRecord(normalizedPhone);
    }

    savePhoneBtn.addEventListener("click", function() {
      startWithPhone(phoneInput.value);
    });

    (function init() {
      if (!plantId) {
        statusEl.textContent = "缺少 plant 參數，請重新掃描 QR code。";
        return;
      }

      const currentPhone = getCurrentPhone();
      if (!currentPhone) {
        statusEl.textContent = "請先輸入手機號碼。";
        manualBox.style.display = "block";
        return;
      }

      startWithPhone(currentPhone);
    })();
  </script>
</body>
</html>
